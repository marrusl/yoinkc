name: Package release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-srpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install build dependencies
        run: >-
          dnf install -y
          rpm-build
          python3-devel
          python3-setuptools
          python3-wheel
          pyproject-rpm-macros

      - name: Build SRPM
        run: |
          SPEC_VERSION=$(sed -n 's/^Version:[[:space:]]*//p' inspectah.spec)
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$SPEC_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "Version mismatch: inspectah.spec=$SPEC_VERSION pyproject.toml=$PYPROJECT_VERSION" >&2
            exit 1
          fi
          VERSION=$SPEC_VERSION
          mkdir -p ~/rpmbuild/SOURCES
          tar czf ~/rpmbuild/SOURCES/inspectah-${VERSION}.tar.gz \
            --transform "s,^\.,inspectah-${VERSION}," --exclude-vcs .
          rpmbuild -bs inspectah.spec
          cp ~/rpmbuild/SRPMS/*.src.rpm .

      - name: Upload SRPM to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                per_page: 100,
              }
            );
            for (const file of fs.readdirSync('.')) {
              if (!file.endsWith('.src.rpm')) continue;
              const existing = assets.find((asset) => asset.name === file);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                name: file,
                data: fs.readFileSync(file),
              });
            }

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: srpm
          path: "*.src.rpm"

  build-rpm:
    needs: build-srpm
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: "fedora", container: "fedora:latest" }
          - { name: "el9", container: "quay.io/centos/centos:stream9" }
          - { name: "el10", container: "quay.io/centos/centos:stream10" }
    container: ${{ matrix.target.container }}
    steps:
      - name: Download SRPM
        uses: actions/download-artifact@v4
        with:
          name: srpm

      - name: Enable EPEL and CRB repositories
        if: matrix.target.name != 'fedora'
        run: |
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled crb

      - name: Install build tools
        run: dnf install -y rpm-build dnf-plugins-core

      - name: Build RPM
        run: |
          dnf builddep -y *.src.rpm
          rpmbuild --rebuild *.src.rpm || {
            echo "=== Installing dynamic BuildRequires from %pyproject_buildrequires ==="
            dnf builddep -y ~/rpmbuild/SRPMS/*.buildreqs.nosrc.rpm
            rpmbuild --rebuild *.src.rpm
          }
          cp ~/rpmbuild/RPMS/noarch/*.rpm .

      - name: Upload RPM to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                per_page: 100,
              }
            );
            for (const file of fs.readdirSync('.')) {
              if (!file.endsWith('.rpm') || file.endsWith('.src.rpm')) continue;
              const existing = assets.find((asset) => asset.name === file);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                name: file,
                data: fs.readFileSync(file),
              });
            }

  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Compute source tarball metadata
        id: source_tarball
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/archive/refs/tags/${RELEASE_TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          VERSION="${RELEASE_TAG#v}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: marrusl/homebrew-inspectah
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.source_tarball.outputs.version }}
          SHA256: ${{ steps.source_tarball.outputs.sha256 }}
        working-directory: homebrew-tap
        run: |
          sed -i \
            -e "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            Formula/inspectah.rb
          echo "Updated formula to v${VERSION} (sha256: ${SHA256})"

      - name: Open PR against tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        working-directory: homebrew-tap
        run: |
          TAG="${{ github.event.release.tag_name }}"
          BRANCH="update-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH":"refs/remotes/origin/$BRANCH" || true
          git checkout -B "$BRANCH"
          git add Formula/inspectah.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi
          git commit -m "Update inspectah to ${TAG}"
          git push -u origin "HEAD:${BRANCH}" --force-with-lease
          PR_BODY="Automated formula update from [inspectah ${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG})."
          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" \
              --title "Update inspectah to ${TAG}" \
              --body "$PR_BODY"
          else
            gh pr create \
              --title "Update inspectah to ${TAG}" \
              --body "$PR_BODY"
          fi
