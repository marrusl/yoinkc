name: Go CLI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/inspectah/**'
      - '.github/workflows/go-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/inspectah/**'
      - '.github/workflows/go-cli.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/inspectah
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o /dev/null .

      - name: Test
        run: go test ./... -v

      - name: Vet
        run: go vet ./...
