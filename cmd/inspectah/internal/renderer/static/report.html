<script>{{.CodeMirrorJS}}</script>
<script>
const SNAPSHOT = {{.SnapshotJSON}};
const INITIAL_CONTAINERFILE = {{.Containerfile}};
const TRIAGE_MANIFEST = {{.TriageManifest}};

// ── Display-only check (manifest-based) ──
function isDisplayOnly(key) {
  for (var i = 0; i < App.triageManifest.length; i++) {
    if (App.triageManifest[i].key === key) {
      return App.triageManifest[i].display_only || false;
    }
  }
  return false;
}

// ── App state ──
var App = {
  snapshot: SNAPSHOT,
  containerfile: typeof INITIAL_CONTAINERFILE === 'string' ? INITIAL_CONTAINERFILE : '',
  triageManifest: TRIAGE_MANIFEST || [],
  mode: 'static',
  renderId: '',
  revision: 0,
  reviewStates: {},    // sectionId -> 'unreviewed' | 'in-progress' | 'reviewed'
  prevInventories: {}, // sectionId -> sorted key string for rebuild comparison
  decisions: {},       // key -> true (decided). Presence means user acted; snapshot holds actual value.
  priorValues: {},     // key -> prior include value before makeDecision (for undo)
  secretDecisions: {}, // key -> {include: bool, kind: string} for three-state secret cards
  activeSection: 'overview',
  tierExpanded: {},    // sectionId-tier -> boolean
  groupPriorState: {},  // groupName -> {key: priorInclude} for toggle restore
  expandedDep: null
};

// ── Decided-state helper ──
// Returns true if an item has been decided — either because the user acted
// on it in this session (App.decisions) OR because the snapshot's current
// include value differs from its original default (handles reload/session
// resume). Three cases:
//   1. Started true, user excluded → current=false, default=true → decided
//   2. Started false (fleet), never touched → current=false, default=false → undecided
//   3. Started false, user re-included → current=true, default=false → decided
function isPassiveItem(item) {
  if (item.display_only) return true;
  return false;
}

function isItemDecided(item) {
  if (App.decisions[item.key]) return true;
  // Display-only items are "decided" when acknowledged in the snapshot
  if (item.display_only) {
    return getSnapshotAcknowledged(item.key);
  }
  // Notification items are "decided" when acknowledged
  if (item.card_type === 'notification') {
    return getSnapshotAcknowledged(item.key);
  }
  var current = getSnapshotInclude(item.key);
  var original = item.default_include;
  if (original === undefined || original === null) original = true;
  return current !== original;
}

// ── Change counter ──
var changeCount = 0;

function incrementChangeCounter() {
  changeCount++;
  var badge = document.getElementById('changes-badge');
  if (badge) {
    badge.style.display = '';
    badge.textContent = changeCount + ' change' + (changeCount !== 1 ? 's' : '') +
      ' pending — rebuild to update preview';
  }
}

function decrementChangeCounter() {
  changeCount = Math.max(0, changeCount - 1);
  var badge = document.getElementById('changes-badge');
  if (badge) {
    if (changeCount === 0) {
      badge.style.display = 'none';
    } else {
      badge.textContent = changeCount + ' change' + (changeCount !== 1 ? 's' : '') +
        ' pending — rebuild to update preview';
    }
  }
}

function resetChangeCounter() {
  changeCount = 0;
  var badge = document.getElementById('changes-badge');
  if (badge) badge.style.display = 'none';
}

// Migration sections for the sidebar
var MIGRATION_SECTIONS = [
  {id: 'overview',   label: 'Overview',       tracked: false},
  {id: 'packages',   label: 'Packages',       tracked: true},
  {id: 'config',     label: 'Configuration',  tracked: true},
  {id: 'runtime',    label: 'Runtime',         tracked: true},
  {id: 'containers', label: 'Containers',      tracked: true},
  {id: 'nonrpm',     label: 'Non-RPM Software', tracked: false, countBadge: true},
  {id: 'identity',   label: 'Identity',        tracked: true},
  {id: 'system',     label: 'System & Security', tracked: true},
  {id: 'secrets',    label: 'Secrets',         tracked: true},
  {id: 'version-changes', label: 'Version Changes', tracked: false, infoBadge: true},
  {id: 'editor',    label: 'Edit Files',      tracked: false}
];

// ── Boot sequence ──
function boot() {
  detectMode();
  renderSidebar();
  renderContainerfilePreview();
  renderAllSections();
  navigateTo('overview');
}

function detectMode() {
  // file:// protocol -> static mode immediately
  if (window.location.protocol === 'file:') {
    enableStaticMode();
    return;
  }
  // Otherwise try /api/health to see if refine server is running
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/health', true);
    xhr.timeout = 2000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data.re_render) {
            enableRefineMode();
          } else {
            enableStaticMode();
          }
        } catch (e) {
          enableStaticMode();
        }
      } else {
        enableStaticMode();
      }
    };
    xhr.onerror = function() { enableStaticMode(); };
    xhr.ontimeout = function() { enableStaticMode(); };
    xhr.send();
  } catch (e) {
    enableStaticMode();
  }
}

function enableStaticMode() {
  App.mode = 'static';
  // Add static banner to main content
  var main = document.getElementById('main-content');
  if (main) {
    var existing = document.getElementById('static-banner');
    if (!existing) {
      var banner = document.createElement('div');
      banner.id = 'static-banner';
      banner.className = 'static-banner';
      banner.setAttribute('role', 'status');
      banner.textContent = 'Static report — decisions are read-only. Run inspectah refine to enable interactive triage.';
      main.insertBefore(banner, main.firstChild);
    }
  }
  // Disable decision buttons
  disableAllDecisionButtons();
}

function enableRefineMode() {
  App.mode = 'refine';

  // Show rebuild bar
  var rebuildBar = document.getElementById('rebuild-bar');
  if (rebuildBar) rebuildBar.classList.add('active');

  // Fetch the live snapshot from the server
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/snapshot', true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          App.snapshot = data.snapshot || data;
          App.revision = data.revision || 0;
          App.renderId = data.render_id || '';
          if (data.triage_manifest) {
            App.triageManifest = data.triage_manifest;
          }
          renderAllSections();
          initEditor();
        } catch (e) {
          // keep embedded data
          initEditor();
        }
      } else {
        initEditor();
      }
    };
    xhr.onerror = function() { initEditor(); };
    xhr.send();
  } catch (e) {
    // keep embedded data
    initEditor();
  }
}

function disableAllDecisionButtons() {
  // Ensure the describedby target exists
  if (!document.getElementById('static-mode-desc')) {
    var desc = document.createElement('span');
    desc.id = 'static-mode-desc';
    desc.className = 'sr-only';
    desc.textContent = 'Disabled in static mode. Run inspectah refine to enable.';
    document.body.appendChild(desc);
  }

  var buttons = document.querySelectorAll('.card-actions button, .undo-link, .item-toggle');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].setAttribute('aria-disabled', 'true');
    buttons[i].setAttribute('aria-describedby', 'static-mode-desc');
    buttons[i].disabled = true;
  }
  // Also disable mark-reviewed buttons
  var reviewBtns = document.querySelectorAll('.mark-reviewed-btn');
  for (var j = 0; j < reviewBtns.length; j++) {
    reviewBtns[j].setAttribute('aria-disabled', 'true');
    reviewBtns[j].setAttribute('aria-describedby', 'static-mode-desc');
    reviewBtns[j].disabled = true;
  }
}

// ── Sidebar ──
function renderSidebar() {
  var nav = document.getElementById('section-nav');
  if (!nav) return;

  var list = document.createElement('ul');
  list.className = 'pf-v6-c-nav__list';
  list.setAttribute('role', 'list');

  MIGRATION_SECTIONS.forEach(function(section) {
    // Conditionally hide version-changes if no data
    if (section.id === 'version-changes') {
      var snap = App.snapshot;
      if (!snap.rpm || !snap.rpm.version_changes || snap.rpm.version_changes.length === 0) {
        return; // skip this sidebar entry entirely
      }
    }

    var li = document.createElement('li');
    li.className = 'pf-v6-c-nav__item';

    var a = document.createElement('a');
    a.className = 'pf-v6-c-nav__link';
    a.href = '#section-' + section.id;
    a.setAttribute('data-section', section.id);
    a.onclick = function(e) {
      e.preventDefault();
      navigateTo(section.id);
    };

    // Only tracked sections get a review dot
    if (section.tracked) {
      var dot = document.createElement('span');
      dot.className = 'review-dot';
      dot.id = 'dot-' + section.id;
      dot.setAttribute('aria-hidden', 'true');
      a.appendChild(dot);
    }

    var text = document.createElement('span');
    text.textContent = section.label;
    a.appendChild(text);

    // Badge container for tier counts
    if (section.tracked) {
      var badge = document.createElement('span');
      badge.id = 'badge-' + section.id;
      badge.className = 'triage-badge';
      badge.style.display = 'none';
      a.appendChild(badge);
    }

    // Count badge for non-tracked sections with item counts (nonrpm)
    if (section.countBadge) {
      var countBadge = document.createElement('span');
      countBadge.className = 'nav-badge';
      countBadge.id = 'nonrpm-badge';
      countBadge.style.cssText = 'font-size:11px;padding:1px 6px;border-radius:8px;background:var(--pf-t--global--background--color--secondary-default);margin-left:auto;';
      a.appendChild(countBadge);
    }

    // Info badge for non-triage sections (version-changes)
    if (section.infoBadge) {
      var infoBadge = document.createElement('span');
      infoBadge.className = 'vc-sidebar-badge';
      infoBadge.textContent = 'info';
      a.appendChild(infoBadge);
    }

    li.appendChild(a);
    list.appendChild(li);
  });

  nav.appendChild(list);

  // Keyboard navigation: ArrowDown/ArrowUp within the nav list
  list.addEventListener('keydown', function(e) {
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    var links = list.querySelectorAll('.pf-v6-c-nav__link');
    var current = Array.prototype.indexOf.call(links, document.activeElement);
    if (current === -1) return;
    e.preventDefault();
    if (e.key === 'ArrowDown' && current < links.length - 1) {
      links[current + 1].focus();
    } else if (e.key === 'ArrowUp' && current > 0) {
      links[current - 1].focus();
    }
  });

  updateAllBadges();
}

// ── SPA Navigation ──
function navigateTo(sectionId) {
  // Editor dirty-state guard
  if (editorState.mode === 'editing-dirty') {
    editorState.pendingNavAction = function() {
      exitEditModeClean();
      navigateTo(sectionId);
    };
    showUnsavedModal();
    return;
  }
  if (editorState.mode.startsWith('editing')) exitEditModeClean();

  App.activeSection = sectionId;

  // Update aria-current on sidebar links
  var links = document.querySelectorAll('.pf-v6-c-nav__link');
  for (var i = 0; i < links.length; i++) {
    if (links[i].getAttribute('data-section') === sectionId) {
      links[i].setAttribute('aria-current', 'page');
    } else {
      links[i].removeAttribute('aria-current');
    }
  }

  // Show/hide sections
  var sections = document.querySelectorAll('.report-section');
  for (var j = 0; j < sections.length; j++) {
    if (sections[j].id === 'section-' + sectionId) {
      sections[j].classList.add('active');
    } else {
      sections[j].classList.remove('active');
    }
  }

  // Lazy-render countBadge sections on first navigation
  var sectionDiv = document.getElementById('section-' + sectionId);
  if (sectionDiv && sectionDiv.children.length === 0) {
    var sectionMeta = null;
    for (var ms = 0; ms < MIGRATION_SECTIONS.length; ms++) {
      if (MIGRATION_SECTIONS[ms].id === sectionId) { sectionMeta = MIGRATION_SECTIONS[ms]; break; }
    }
    if (sectionMeta && (sectionMeta.tracked || sectionMeta.countBadge)) renderTriageSection(sectionId);
  }

  // Focus to section heading
  var heading = document.getElementById('heading-' + sectionId);
  if (heading) {
    heading.focus();
  }
}

// ── Progress & Badges ──
function updateProgressBar() {
  var reviewed = 0;
  var total = 0;
  MIGRATION_SECTIONS.forEach(function(s) {
    if (!s.tracked) return;
    total++;
    if (App.reviewStates[s.id] === 'reviewed') reviewed++;
  });

  var text = document.getElementById('review-progress-text');
  var fill = document.getElementById('review-progress-fill');
  if (text) text.textContent = 'Review progress: ' + reviewed + ' / ' + total;
  if (fill) fill.style.width = (total > 0 ? (reviewed / total * 100) : 0) + '%';
}

function updateSidebarDot(sectionId) {
  var dot = document.getElementById('dot-' + sectionId);
  if (!dot) return;
  var state = App.reviewStates[sectionId] || 'unreviewed';
  dot.className = 'review-dot';
  if (state === 'in-progress') {
    dot.classList.add('in-progress');
  } else if (state === 'reviewed') {
    dot.classList.add('reviewed');
  }
}

function updateBadge(sectionId) {
  var badge = document.getElementById('badge-' + sectionId);
  if (!badge) return;

  var items = getManifestItemsForSection(sectionId);
  var undecided3 = 0;
  var undecided2 = 0;
  for (var i = 0; i < items.length; i++) {
    if (isPassiveItem(items[i])) continue;
    if (isItemDecided(items[i])) continue;  // user has acted on this item
    // Items included by default get collapsed card treatment — not "undecided"
    var isSecretItem = items[i].is_secret || items[i].section === 'secrets';
    if (!isSecretItem && items[i].tier !== 3 && getSnapshotInclude(items[i].key) === true) continue;
    if (items[i].tier === 3) undecided3++;
    else if (items[i].tier === 2) undecided2++;
  }

  if (undecided3 > 0) {
    badge.style.display = '';
    badge.className = 'triage-badge tier-3';
    badge.textContent = undecided3;
  } else if (undecided2 > 0) {
    badge.style.display = '';
    badge.className = 'triage-badge tier-2';
    badge.textContent = undecided2;
  } else {
    badge.style.display = 'none';
  }
}

function updateAllBadges() {
  MIGRATION_SECTIONS.forEach(function(s) {
    if (s.tracked) updateBadge(s.id);
    if (s.countBadge) updateNonRpmSidebarBadge();
  });
}

function findNonRpmItem(snap, key) {
  if (!snap || !snap.non_rpm_software || !snap.non_rpm_software.items) return null;
  var nrName = key.substring(7);
  for (var i = 0; i < snap.non_rpm_software.items.length; i++) {
    var item = snap.non_rpm_software.items[i];
    var itemName = item.path || item.name;
    if (itemName === nrName) return item;
  }
  return null;
}

function updateNonRpmSidebarBadge() {
  var snap = App.snapshot;
  if (!snap || !snap.non_rpm_software || !snap.non_rpm_software.items) return;
  var unreviewed = 0;
  for (var i = 0; i < snap.non_rpm_software.items.length; i++) {
    var item = snap.non_rpm_software.items[i];
    if (!item.review_status || item.review_status === 'not_reviewed') unreviewed++;
  }
  var navItem = document.querySelector('[data-section="nonrpm"] .nav-badge');
  if (navItem) {
    if (unreviewed > 0) { navItem.textContent = unreviewed; navItem.style.display = ''; }
    else { navItem.style.display = 'none'; }
  }
}

// ── Manifest helpers ──
function getManifestItemsForSection(sectionId) {
  var items = [];
  for (var i = 0; i < App.triageManifest.length; i++) {
    if (App.triageManifest[i].section === sectionId) {
      items.push(App.triageManifest[i]);
    }
  }
  return items;
}

function groupByTier(items) {
  var groups = {3: [], 2: [], 1: []};
  for (var i = 0; i < items.length; i++) {
    var t = items[i].tier;
    if (!groups[t]) groups[t] = [];
    groups[t].push(items[i]);
  }
  return groups;
}

// ── Overview Section ──
function renderOverview() {
  var container = document.getElementById('section-overview');
  if (!container) return;
  container.innerHTML = '';

  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-overview';
  heading.setAttribute('tabindex', '-1');
  heading.textContent = 'Overview';
  container.appendChild(heading);

  // Stats grid
  var stats = document.createElement('div');
  stats.className = 'overview-stats';

  var snap = App.snapshot;

  // Count items by type
  var pkgCount = 0;
  if (snap.rpm && snap.rpm.packages_added) pkgCount = snap.rpm.packages_added.length;

  var cfgCount = 0;
  if (snap.config && snap.config.files) cfgCount = snap.config.files.length;

  var svcCount = 0;
  if (snap.services && snap.services.state_changes) svcCount = snap.services.state_changes.length;

  var secretCount = 0;
  if (snap.redactions) secretCount = snap.redactions.length;

  var manifestTotal = App.triageManifest.length;
  var tier3Count = 0;
  var tier2IncludedCount = 0;
  var tier2DecideCount = 0;
  var tier1Count = 0;
  for (var i = 0; i < App.triageManifest.length; i++) {
    var mi = App.triageManifest[i];
    if (mi.tier === 3) tier3Count++;
    else if (mi.tier === 2 && mi.default_include === false) tier2DecideCount++;
    else if (mi.tier === 2) tier2IncludedCount++;
    else tier1Count++;
  }

  var statItems = [
    {label: 'Total Items', value: manifestTotal},
    {label: 'Flagged', value: tier3Count},
    {label: 'Needs Decision', value: tier2DecideCount},
    {label: 'Included', value: tier2IncludedCount},
    {label: 'Auto-included', value: tier1Count},
    {label: 'Packages Added', value: pkgCount},
    {label: 'Config Files', value: cfgCount},
    {label: 'Service Changes', value: svcCount},
    {label: 'Secrets Found', value: secretCount}
  ];

  for (var j = 0; j < statItems.length; j++) {
    var card = document.createElement('div');
    card.className = 'stat-card';
    var val = document.createElement('div');
    val.className = 'stat-value';
    val.textContent = statItems[j].value;
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = statItems[j].label;
    card.appendChild(val);
    card.appendChild(lbl);
    stats.appendChild(card);
  }
  container.appendChild(stats);

  // System info
  if (snap.os_release) {
    var sysInfo = document.createElement('div');
    sysInfo.style.marginBottom = '1rem';
    sysInfo.style.fontSize = '0.85rem';
    sysInfo.style.opacity = '0.8';
    var osr = snap.os_release;
    sysInfo.textContent = 'System: ' + (osr.pretty_name || osr.name || 'Unknown') +
      ' | Type: ' + (snap.system_type || 'unknown');
    container.appendChild(sysInfo);
  }

  // Version changes overview
  var vcUpgrades = 0, vcDowngrades = 0, vcDowngradeNames = [];
  if (snap.rpm && snap.rpm.version_changes) {
    for (var vc = 0; vc < snap.rpm.version_changes.length; vc++) {
      var change = snap.rpm.version_changes[vc];
      if (change.direction === 'upgrade') vcUpgrades++;
      else if (change.direction === 'downgrade') {
        vcDowngrades++;
        vcDowngradeNames.push(change.name);
      }
    }
  }
  if (vcUpgrades + vcDowngrades > 0) {
    var vcBlock = document.createElement('div');
    vcBlock.className = 'overview-version-changes';

    var vcHead = document.createElement('h3');
    vcHead.textContent = 'Version Changes';
    vcBlock.appendChild(vcHead);

    var vcStats = document.createElement('div');
    vcStats.className = 'version-changes-stats';

    // Upgrades card
    var upCard = document.createElement('div');
    upCard.className = 'vc-stat-card vc-upgrade';
    var upVal = document.createElement('div');
    upVal.className = 'vc-stat-value';
    upVal.textContent = vcUpgrades;
    var upLbl = document.createElement('div');
    upLbl.className = 'vc-stat-label';
    upLbl.textContent = vcUpgrades === 1 ? 'Upgrade' : 'Upgrades';
    upCard.appendChild(upVal);
    upCard.appendChild(upLbl);
    vcStats.appendChild(upCard);

    // Downgrades card
    var dnCard = document.createElement('div');
    dnCard.className = 'vc-stat-card vc-downgrade';
    var dnVal = document.createElement('div');
    dnVal.className = 'vc-stat-value';
    dnVal.textContent = vcDowngrades;
    var dnLbl = document.createElement('div');
    dnLbl.className = 'vc-stat-label';
    dnLbl.textContent = vcDowngrades === 1 ? 'Downgrade' : 'Downgrades';
    dnCard.appendChild(dnVal);
    dnCard.appendChild(dnLbl);
    vcStats.appendChild(dnCard);

    vcBlock.appendChild(vcStats);

    // Downgrade callout
    if (vcDowngrades > 0) {
      var callout = document.createElement('div');
      callout.className = 'vc-downgrade-callout';
      var calloutStrong = document.createElement('strong');
      calloutStrong.textContent = 'Downgraded packages: ';
      callout.appendChild(calloutStrong);
      callout.appendChild(document.createTextNode(vcDowngradeNames.join(', ')));
      vcBlock.appendChild(callout);
    }

    // View all link
    var vcTotal = vcUpgrades + vcDowngrades;
    var viewAll = document.createElement('button');
    viewAll.type = 'button';
    viewAll.className = 'vc-view-all';
    viewAll.textContent = 'View all ' + vcTotal + ' →';
    viewAll.onclick = function() {
      navigateTo('version-changes');
    };
    vcBlock.appendChild(viewAll);

    container.appendChild(vcBlock);
  }

  // Warnings
  if (snap.warnings && snap.warnings.length > 0) {
    var warningsDiv = document.createElement('div');
    warningsDiv.className = 'overview-warnings';
    var wHead = document.createElement('h3');
    wHead.textContent = 'Warnings (' + snap.warnings.length + ')';
    wHead.style.fontSize = '1rem';
    wHead.style.marginBottom = '0.5rem';
    warningsDiv.appendChild(wHead);

    for (var w = 0; w < snap.warnings.length; w++) {
      var warn = snap.warnings[w];
      var wItem = document.createElement('div');
      wItem.className = 'warning-item';
      wItem.textContent = warn.message || warn.text || JSON.stringify(warn);
      warningsDiv.appendChild(wItem);
    }
    container.appendChild(warningsDiv);
  }
}

// ── Secret card helpers ──
function getRedactionForItem(item) {
  if (item.key.indexOf('secret-') !== 0) return null;
  var idx = parseInt(item.key.substring(7), 10);
  if (isNaN(idx) || !App.snapshot.redactions || idx >= App.snapshot.redactions.length) return null;
  return App.snapshot.redactions[idx];
}

function buildSecretCard(item) {
  var redaction = getRedactionForItem(item);
  var kind = (redaction && redaction.kind) ? redaction.kind : 'flagged';

  var card = document.createElement('div');
  card.className = 'triage-card tier-' + item.tier;
  card.setAttribute('data-key', item.key);

  // Badge
  var badge = document.createElement('span');
  badge.className = 'secret-badge';
  if (kind === 'excluded') {
    badge.classList.add('badge-excluded');
    badge.textContent = 'Excluded';
  } else if (kind === 'inline') {
    badge.classList.add('badge-inline');
    badge.textContent = 'Inline Redacted';
  } else {
    badge.classList.add('badge-flagged');
    badge.textContent = 'Flagged for Review';
  }
  card.appendChild(badge);

  // Name
  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name || item.key;
  card.appendChild(nameEl);

  // Meta
  if (item.meta) {
    var metaEl = document.createElement('div');
    metaEl.className = 'card-meta';
    metaEl.textContent = item.meta;
    card.appendChild(metaEl);
  }

  // Explanation
  var explanation = document.createElement('div');
  explanation.className = 'secret-explanation';
  if (kind === 'excluded') {
    explanation.textContent = 'This file was excluded from the image because it contains a detected secret.';
  } else if (kind === 'inline') {
    explanation.textContent = 'The secret value was replaced with a REDACTED placeholder in the exported config file.';
  } else {
    explanation.textContent = 'This file was flagged by heuristic analysis. The content may or may not contain a real secret.';
  }
  card.appendChild(explanation);

  // Consequence preview (collapsed by default)
  var details = document.createElement('details');
  details.className = 'secret-consequence';
  var summary = document.createElement('summary');
  summary.textContent = 'What happens to this file';
  details.appendChild(summary);
  var consequenceText = document.createElement('p');
  consequenceText.style.fontSize = '0.8rem';
  consequenceText.style.margin = '0.5rem 0 0 0';
  consequenceText.style.lineHeight = '1.5';
  if (kind === 'excluded') {
    consequenceText.textContent = 'This file is omitted from the image. A comment block in the Containerfile documents the exclusion reason.';
  } else if (kind === 'inline') {
    consequenceText.textContent = 'This file is included via the config tree copy. Secret values have been replaced with REDACTED placeholders.';
  } else {
    consequenceText.textContent = 'This file will be included as-is. It may contain sensitive values that the scanner could not definitively classify.';
  }
  details.appendChild(consequenceText);
  card.appendChild(details);

  // Decision buttons (omitted in static mode)
  if (App.mode !== 'static') {
    var actions = document.createElement('div');
    actions.className = 'card-actions';

    if (kind === 'excluded') {
      // Override: include despite secret; Confirm: keep excluded
      var overrideBtn = document.createElement('button');
      overrideBtn.type = 'button';
      overrideBtn.className = 'btn-outline';
      overrideBtn.textContent = 'Include anyway';
      overrideBtn.setAttribute('aria-label', 'Include ' + (item.name || item.key) + ' despite detected secret');
      overrideBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, true, 'excluded');
      };
      actions.appendChild(overrideBtn);

      var confirmBtn = document.createElement('button');
      confirmBtn.type = 'button';
      confirmBtn.className = 'btn-primary';
      confirmBtn.textContent = 'Keep excluded';
      confirmBtn.setAttribute('aria-label', 'Keep ' + (item.name || item.key) + ' excluded from image');
      confirmBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, false, 'excluded');
      };
      actions.appendChild(confirmBtn);
    } else if (kind === 'inline') {
      // Override: exclude from image; Confirm: keep redacted
      var excludeBtn = document.createElement('button');
      excludeBtn.type = 'button';
      excludeBtn.className = 'btn-outline';
      excludeBtn.textContent = 'Exclude from image';
      excludeBtn.setAttribute('aria-label', 'Exclude ' + (item.name || item.key) + ' from image');
      excludeBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, false, 'inline');
      };
      actions.appendChild(excludeBtn);

      var keepBtn = document.createElement('button');
      keepBtn.type = 'button';
      keepBtn.className = 'btn-primary';
      keepBtn.textContent = 'Keep redacted';
      keepBtn.setAttribute('aria-label', 'Keep ' + (item.name || item.key) + ' with redacted placeholders');
      keepBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, true, 'inline');
      };
      actions.appendChild(keepBtn);
    } else {
      // Flagged: exclude or keep as-is
      var exclBtn = document.createElement('button');
      exclBtn.type = 'button';
      exclBtn.className = 'btn-outline';
      exclBtn.textContent = 'Exclude from image';
      exclBtn.setAttribute('aria-label', 'Exclude ' + (item.name || item.key) + ' from image');
      exclBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, false, 'flagged');
      };
      actions.appendChild(exclBtn);

      var keepAsIsBtn = document.createElement('button');
      keepAsIsBtn.type = 'button';
      keepAsIsBtn.className = 'btn-primary';
      keepAsIsBtn.textContent = 'Keep as-is';
      keepAsIsBtn.setAttribute('aria-label', 'Keep ' + (item.name || item.key) + ' as-is in image');
      keepAsIsBtn.onclick = function() {
        makeSecretDecision(item.key, item.section, true, 'flagged');
      };
      actions.appendChild(keepAsIsBtn);
    }

    card.appendChild(actions);
  }

  return card;
}

function makeSecretDecision(key, sectionId, include, kind) {
  if (App.mode === 'static') return;
  // Store prior values for undo
  App.priorValues[key] = getSnapshotInclude(key);
  if (!App.secretDecisions) App.secretDecisions = {};
  App.secretDecisions[key] = { include: include, kind: kind };
  App.decisions[key] = true;
  updateSnapshotInclude(key, include);
  incrementChangeCounter();

  var current = App.reviewStates[sectionId];
  if (current === 'unreviewed' || !current) {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  renderTriageSection(sectionId);
  updateBadge(sectionId);
  focusNextUndecided(sectionId);
  scheduleAutosave();
}

function undoSecretDecision(key, sectionId) {
  if (App.mode === 'static') return;
  if (App.priorValues[key] !== undefined) {
    updateSnapshotInclude(key, App.priorValues[key]);
    delete App.priorValues[key];
  }
  delete App.decisions[key];
  if (App.secretDecisions) delete App.secretDecisions[key];
  decrementChangeCounter();

  if (App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  renderTriageSection(sectionId);
  updateBadge(sectionId);
  scheduleAutosave();

  // After undo re-render, focus the first action button on the restored card
  var restored = document.querySelector('[data-key="' + key + '"] .card-actions button');
  if (restored) restored.focus();
}

function buildSecretDecidedCard(item) {
  if (!App.secretDecisions || !App.secretDecisions[item.key]) {
    // Fallback to legacy decided card for decisions made before this feature
    var inc = getSnapshotInclude(item.key);
    return buildDecidedCard(item, inc);
  }

  var decision = App.secretDecisions[item.key];
  var kind = decision.kind;
  var included = decision.include;

  var card = document.createElement('div');
  card.className = 'secret-collapsed';
  card.setAttribute('data-key', item.key);

  // Icon
  var icon = document.createElement('span');
  icon.className = 'secret-collapsed-icon';
  if (kind === 'excluded' && included) {
    icon.textContent = '⚠';  // warning sign — included despite secret
  } else if (!included) {
    icon.textContent = '✖';  // heavy x — excluded
  } else {
    icon.textContent = '✔';  // heavy check — kept
  }
  card.appendChild(icon);

  // Path
  var pathEl = document.createElement('span');
  pathEl.className = 'secret-collapsed-path';
  pathEl.textContent = item.name || item.key;
  card.appendChild(pathEl);

  // Summary text
  var summaryEl = document.createElement('span');
  summaryEl.className = 'secret-collapsed-summary';
  if (kind === 'excluded' && included) {
    summaryEl.textContent = 'Included despite secret';
  } else if (kind === 'excluded' && !included) {
    summaryEl.textContent = 'Excluded from image';
  } else if (kind === 'inline' && !included) {
    summaryEl.textContent = 'Excluded from image';
  } else if (kind === 'inline' && included) {
    summaryEl.textContent = 'Kept with redacted values';
  } else if (kind === 'flagged' && !included) {
    summaryEl.textContent = 'Excluded from image';
  } else {
    summaryEl.textContent = 'Kept as-is';
  }
  card.appendChild(summaryEl);

  // Undo button (omitted in static mode)
  if (App.mode !== 'static') {
    var undoBtn = document.createElement('button');
    undoBtn.type = 'button';
    undoBtn.className = 'undo-btn';
    undoBtn.textContent = 'undo';
    undoBtn.setAttribute('aria-label', 'Undo decision for ' + (item.name || item.key));
    undoBtn.onclick = function() {
      undoSecretDecision(item.key, item.section);
    };
    card.appendChild(undoBtn);

    // Focus management: after render, focus the undo button
    setTimeout(function() {
      var btn = card.querySelector('.undo-btn');
      if (btn) btn.focus();
    }, 0);
  }

  card.setAttribute('aria-label', (item.name || item.key) + ': ' + summaryEl.textContent);
  return card;
}

// ── Triage Card Builder ──
function buildTriageCard(item) {
  // Delegate to three-state secret card builder for secret items
  var isSecret = item.is_secret || item.section === 'secrets';
  if (isSecret) {
    return buildSecretCard(item);
  }

  var card = document.createElement('div');
  card.className = 'triage-card tier-' + item.tier;
  card.setAttribute('data-key', item.key);

  // Tier 3 warning banner
  if (item.tier === 3) {
    var warning = document.createElement('div');
    warning.className = 'card-warning';
    warning.textContent = item.reason;
    card.appendChild(warning);
  }

  // Name
  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name || item.key;
  card.appendChild(nameEl);

  // Meta
  if (item.meta) {
    var metaEl = document.createElement('div');
    metaEl.className = 'card-meta';
    metaEl.textContent = item.meta;
    card.appendChild(metaEl);
  }

  // Reason (tier 2 and tier 1 show reason inline, tier 3 shows it in warning banner)
  if (item.tier !== 3) {
    var reasonEl = document.createElement('div');
    reasonEl.className = 'card-reason';
    reasonEl.textContent = item.reason;
    card.appendChild(reasonEl);
  }

  // View contents button (config files with snapshot content)
  var viewContentsBtn = buildViewContentsButton(item);
  if (viewContentsBtn) card.appendChild(viewContentsBtn);

  // Action buttons (omitted entirely in static mode)
  if (App.mode !== 'static') {
    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var displayOnly = item.display_only || isDisplayOnly(item.key);

    if (displayOnly) {
      // Display-only: "Acknowledge" / "Skip"
      var ackBtn = document.createElement('button');
      ackBtn.type = 'button';
      ackBtn.className = 'btn-primary';
      ackBtn.textContent = 'Acknowledge';
      ackBtn.setAttribute('aria-label', 'Acknowledge ' + (item.name || item.key));
      ackBtn.onclick = function() { acknowledgeNotification(item.key, item.section); };
      actions.appendChild(ackBtn);

      var skipBtn = document.createElement('button');
      skipBtn.type = 'button';
      skipBtn.className = 'btn-outline';
      skipBtn.textContent = 'Skip';
      skipBtn.setAttribute('aria-label', 'Skip ' + (item.name || item.key));
      skipBtn.onclick = function() { acknowledgeNotification(item.key, item.section); };
      actions.appendChild(skipBtn);
    } else if (item.tier === 3) {
      // Non-secret tier 3: "Acknowledge & include" / "Exclude"
      var ackIncBtn = document.createElement('button');
      ackIncBtn.type = 'button';
      ackIncBtn.className = 'btn-primary';
      ackIncBtn.textContent = 'Acknowledge & include';
      ackIncBtn.setAttribute('aria-label', 'Acknowledge and include ' + (item.name || item.key) + ' in image');
      ackIncBtn.onclick = function() { makeDecision(item.key, item.section, true); };
      actions.appendChild(ackIncBtn);

      var exclBtn = document.createElement('button');
      exclBtn.type = 'button';
      exclBtn.className = 'btn-outline';
      exclBtn.textContent = 'Exclude';
      exclBtn.setAttribute('aria-label', 'Exclude ' + (item.name || item.key) + ' from image');
      exclBtn.onclick = function() { makeDecision(item.key, item.section, false); };
      actions.appendChild(exclBtn);
    } else {
      // Standard tier 2 / tier 1: "Include in image" / "Leave out"
      var inclBtn = document.createElement('button');
      inclBtn.type = 'button';
      inclBtn.className = 'btn-primary';
      inclBtn.textContent = 'Include in image';
      inclBtn.setAttribute('aria-label', 'Include ' + (item.name || item.key) + ' in image');
      inclBtn.onclick = function() { makeDecision(item.key, item.section, true); };
      actions.appendChild(inclBtn);

      var leaveBtn = document.createElement('button');
      leaveBtn.type = 'button';
      leaveBtn.className = 'btn-outline';
      leaveBtn.textContent = 'Leave out';
      leaveBtn.setAttribute('aria-label', 'Leave ' + (item.name || item.key) + ' out of image');
      leaveBtn.onclick = function() { makeDecision(item.key, item.section, false); };
      actions.appendChild(leaveBtn);
    }

    card.appendChild(actions);
  }
  return card;
}

// ── Decided Card Builder ──
function buildDecidedCard(item, included) {
  var card = document.createElement('div');
  card.className = 'decided-card';
  card.setAttribute('data-key', item.key);

  var nameSpan = document.createElement('span');
  nameSpan.textContent = item.name || item.key;
  card.appendChild(nameSpan);

  var label = document.createElement('span');
  label.className = 'decided-label';

  var displayOnly = item.display_only || isDisplayOnly(item.key);
  var isSecret = item.is_secret || item.section === 'secrets';

  if (isSecret) {
    if (included) {
      label.classList.add('secret-kept');
      label.textContent = 'kept in image (acknowledged)';
      card.setAttribute('aria-label', (item.name || item.key) + ': Kept in image (acknowledged)');
    } else {
      label.classList.add('secret-excluded');
      label.textContent = 'excluded from image';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded from image');
    }
  } else if (displayOnly) {
    if (included) {
      label.classList.add('acknowledged');
      label.textContent = 'Acknowledged';
      card.setAttribute('aria-label', (item.name || item.key) + ': Acknowledged');
    } else {
      label.classList.add('skipped');
      label.textContent = 'Skipped';
      card.setAttribute('aria-label', (item.name || item.key) + ': Skipped');
    }
  } else if (item.tier === 3) {
    if (included) {
      label.classList.add('included');
      label.textContent = 'included (acknowledged)';
      card.setAttribute('aria-label', (item.name || item.key) + ': Included (acknowledged)');
    } else {
      label.classList.add('excluded');
      label.textContent = 'excluded';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded');
    }
  } else {
    if (included) {
      label.classList.add('included');
      label.textContent = 'included';
      card.setAttribute('aria-label', (item.name || item.key) + ': Included');
    } else {
      label.classList.add('excluded');
      label.textContent = 'excluded';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded');
    }
  }

  card.appendChild(label);

  // Undo button (omitted in static mode)
  if (App.mode !== 'static') {
    var undo = document.createElement('button');
    undo.type = 'button';
    undo.className = 'undo-link';
    undo.textContent = 'undo';
    undo.setAttribute('aria-label', 'Undo decision for ' + (item.name || item.key));
    undo.onclick = function() { undoDecision(item.key, item.section); };
    card.appendChild(undo);
  }

  return card;
}

// ── Default-Included Card Builder ──
// For items that are included by default and the user hasn't acted on yet.
// Shows a collapsed row with green badge and "Change" action; expands to
// reveal "Keep included" / "Leave out" buttons.
function buildDefaultIncludedCard(item) {
  var wrapper = document.createElement('div');
  wrapper.className = 'default-included-card';
  wrapper.setAttribute('data-key', item.key);

  // --- Collapsed row ---
  var row = document.createElement('div');
  row.className = 'default-included-row';
  row.setAttribute('role', 'button');
  row.setAttribute('tabindex', '0');
  row.setAttribute('aria-expanded', 'false');
  row.setAttribute('aria-label', (item.name || item.key) + ', Included, press Enter to expand');

  var chevron = document.createElement('span');
  chevron.className = 'default-included-chevron';
  chevron.setAttribute('aria-hidden', 'true');
  chevron.textContent = '▸';
  row.appendChild(chevron);

  var nameEl = document.createElement('span');
  nameEl.className = 'default-included-name';
  nameEl.textContent = item.name || item.key;
  row.appendChild(nameEl);

  var badge = document.createElement('span');
  badge.className = 'default-included-badge';
  badge.textContent = 'Included ●';
  row.appendChild(badge);

  var metaText = item.reason || item.meta || '';
  if (metaText) {
    var metaEl = document.createElement('span');
    metaEl.className = 'default-included-meta';
    metaEl.textContent = metaText;
    row.appendChild(metaEl);
  }

  // "Change" action link (separate tab stop)
  var changeLink = document.createElement('button');
  changeLink.type = 'button';
  changeLink.className = 'default-included-action';
  changeLink.textContent = 'Change →';
  changeLink.setAttribute('aria-label', 'Change inclusion for ' + (item.name || item.key));
  changeLink.onclick = function(e) {
    e.stopPropagation();
    toggleDefaultIncludedExpand(wrapper, row, chevron, body);
  };
  row.appendChild(changeLink);

  wrapper.appendChild(row);

  // --- Expandable body ---
  var body = document.createElement('div');
  body.className = 'default-included-body';
  body.style.display = 'none';

  if (item.reason) {
    var reasonEl = document.createElement('div');
    reasonEl.className = 'card-reason';
    reasonEl.textContent = item.reason;
    body.appendChild(reasonEl);
  }
  if (item.meta && item.meta !== item.reason) {
    var bodyMeta = document.createElement('div');
    bodyMeta.className = 'card-reason';
    bodyMeta.textContent = item.meta;
    body.appendChild(bodyMeta);
  }

  // View contents button (config files with snapshot content)
  var viewContentsBtnDI = buildViewContentsButton(item);
  if (viewContentsBtnDI) body.appendChild(viewContentsBtnDI);

  if (App.mode !== 'static') {
    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var keepBtn = document.createElement('button');
    keepBtn.type = 'button';
    keepBtn.className = 'btn-outline';
    keepBtn.textContent = 'Keep included';
    keepBtn.setAttribute('aria-label', 'Keep ' + (item.name || item.key) + ' included in image');
    keepBtn.onclick = function() {
      // Mark as decided without changing the snapshot (already included)
      App.decisions[item.key] = true;
      renderTriageSection(item.section);
      updateBadge(item.section);
      scheduleAutosave();
    };
    actions.appendChild(keepBtn);

    var leaveBtn = document.createElement('button');
    leaveBtn.type = 'button';
    leaveBtn.className = 'btn-primary';
    leaveBtn.textContent = 'Leave out';
    leaveBtn.setAttribute('aria-label', 'Leave ' + (item.name || item.key) + ' out of image');
    leaveBtn.onclick = function() {
      makeDecision(item.key, item.section, false);
    };
    actions.appendChild(leaveBtn);

    body.appendChild(actions);
  }

  wrapper.appendChild(body);

  // Toggle expand on row click or keyboard
  row.addEventListener('click', function() {
    toggleDefaultIncludedExpand(wrapper, row, chevron, body);
  });
  row.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleDefaultIncludedExpand(wrapper, row, chevron, body);
    }
  });

  return wrapper;
}

function toggleDefaultIncludedExpand(wrapper, row, chevron, body) {
  var isExpanded = row.getAttribute('aria-expanded') === 'true';
  if (isExpanded) {
    row.setAttribute('aria-expanded', 'false');
    chevron.classList.remove('expanded');
    body.style.display = 'none';
  } else {
    row.setAttribute('aria-expanded', 'true');
    chevron.classList.add('expanded');
    body.style.display = '';
  }
}

// ── Toggle Card Builder ──
// Compact toggle-switch row for all non-secret, non-display-only triage items.
// Two tab stops per row: toggle switch + expand chevron.
function buildToggleCard(item, sectionId) {
  var included = getSnapshotInclude(item.key);
  var wrapper = document.createElement('div');
  wrapper.className = 'toggle-card';
  wrapper.setAttribute('data-key', item.key);

  // --- Row ---
  var row = document.createElement('div');
  row.className = 'toggle-card-row';
  row.setAttribute('data-excluded', included ? 'false' : 'true');

  // Tab stop 1: Toggle switch
  var toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'item-toggle';
  toggle.setAttribute('role', 'switch');
  toggle.setAttribute('aria-checked', included ? 'true' : 'false');
  toggle.setAttribute('aria-label', (included ? 'Exclude ' : 'Include ') + (item.name || item.key));
  toggle.setAttribute('tabindex', '0');
  toggle.setAttribute('data-focus-key', item.key);

  // Toggle click handler
  toggle.onclick = function(e) {
    e.stopPropagation();
    var currentIncluded = getSnapshotInclude(item.key);
    var newIncluded = !currentIncluded;

    // Track that user acted on this item
    App.decisions[item.key] = true;
    // Store prior for undo capability
    if (App.priorValues[item.key] === undefined) {
      App.priorValues[item.key] = currentIncluded;
    }
    updateSnapshotInclude(item.key, newIncluded);
    incrementChangeCounter();

    // Transition review state
    var current = App.reviewStates[sectionId];
    if (current === 'unreviewed' || !current) {
      App.reviewStates[sectionId] = 'in-progress';
      updateSidebarDot(sectionId);
      updateProgressBar();
    }

    // Update in-place without re-rendering the section
    toggle.setAttribute('aria-checked', newIncluded ? 'true' : 'false');
    toggle.setAttribute('aria-label', (newIncluded ? 'Exclude ' : 'Include ') + (item.name || item.key));
    row.setAttribute('data-excluded', newIncluded ? 'false' : 'true');
    badge.textContent = newIncluded ? 'Included' : 'Excluded';
    badge.className = 'toggle-card-badge ' + (newIncluded ? 'badge-included' : 'badge-excluded');

    updateBadge(sectionId);
    scheduleAutosave();
  };

  // Keyboard for toggle
  toggle.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggle.click();
    }
  });

  row.appendChild(toggle);

  // Visual divider
  var divider = document.createElement('div');
  divider.className = 'toggle-card-divider';
  divider.setAttribute('aria-hidden', 'true');
  row.appendChild(divider);

  // Content area (fades when excluded)
  var content = document.createElement('div');
  content.className = 'toggle-card-content';

  // Item name
  var nameEl = document.createElement('span');
  nameEl.className = 'toggle-card-name';
  nameEl.textContent = item.name || item.key;
  content.appendChild(nameEl);

  // Status badge with aria-live for screen reader announcements
  var badge = document.createElement('span');
  badge.className = 'toggle-card-badge ' + (included ? 'badge-included' : 'badge-excluded');
  badge.textContent = included ? 'Included' : 'Excluded';
  badge.setAttribute('aria-live', 'polite');
  content.appendChild(badge);

  // One-line meta / reason (truncated)
  var metaText = item.reason || item.meta || '';
  if (metaText) {
    var metaEl = document.createElement('span');
    metaEl.className = 'toggle-card-meta';
    metaEl.textContent = metaText;
    content.appendChild(metaEl);
  }

  row.appendChild(content);

  // Tab stop 2: Expand chevron
  var chevron = document.createElement('button');
  chevron.type = 'button';
  chevron.className = 'toggle-card-expand';
  chevron.textContent = '▸'; // ▸
  chevron.setAttribute('aria-expanded', 'false');
  chevron.setAttribute('aria-label', 'Expand details for ' + (item.name || item.key));
  chevron.setAttribute('tabindex', '0');

  row.appendChild(chevron);

  wrapper.appendChild(row);

  // --- Detail pane (hidden by default) ---
  var detail = document.createElement('div');
  detail.className = 'toggle-card-detail';
  detail.style.display = 'none';

  // Full reason text
  if (item.reason) {
    var reasonEl = document.createElement('div');
    reasonEl.className = 'detail-reason';
    reasonEl.textContent = item.reason;
    detail.appendChild(reasonEl);
  }

  // Meta details (only if different from reason)
  if (item.meta && item.meta !== item.reason) {
    var detailMeta = document.createElement('div');
    detailMeta.className = 'detail-meta';
    detailMeta.textContent = item.meta;
    detail.appendChild(detailMeta);
  }

  // Tier 3 warning in detail pane
  if (item.tier === 3) {
    var warning = document.createElement('div');
    warning.className = 'card-warning';
    warning.textContent = item.reason;
    detail.insertBefore(warning, detail.firstChild);
  }

  // View contents button for config files
  var viewContentsBtn = buildViewContentsButton(item);
  if (viewContentsBtn) detail.appendChild(viewContentsBtn);

  wrapper.appendChild(detail);

  // Expand/collapse: click chevron or content area
  var toggleExpand = function() {
    var isExpanded = chevron.getAttribute('aria-expanded') === 'true';
    if (isExpanded) {
      chevron.setAttribute('aria-expanded', 'false');
      chevron.setAttribute('aria-label', 'Expand details for ' + (item.name || item.key));
      detail.style.display = 'none';
    } else {
      chevron.setAttribute('aria-expanded', 'true');
      chevron.setAttribute('aria-label', 'Collapse details for ' + (item.name || item.key));
      detail.style.display = '';
    }
  };

  chevron.onclick = function(e) {
    e.stopPropagation();
    toggleExpand();
  };

  chevron.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleExpand();
    }
  });

  // Click on content area also expands
  content.style.cursor = 'pointer';
  content.onclick = function(e) {
    // Don't toggle expand if clicking the badge
    if (e.target === badge) return;
    toggleExpand();
  };

  return wrapper;
}

// ── Output Accordion ──
function buildOutputAccordion(groupName, items, options) {
  options = options || {};
  var div = document.createElement('div');
  div.className = 'accordion-card';
  div.setAttribute('data-group', groupName);

  // Compute group state
  var allCount = items.length;
  var includedCount = 0;
  for (var i = 0; i < items.length; i++) {
    if (getSnapshotInclude(items[i].key)) includedCount++;
  }
  var groupState = includedCount === allCount ? 'all' : includedCount === 0 ? 'none' : 'partial';
  var isExpanded = App.tierExpanded['group-' + groupName] || false;

  // Header
  var header = document.createElement('div');
  header.className = 'accordion-header';
  header.setAttribute('role', 'button');
  header.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
  header.setAttribute('tabindex', '0');

  var chevron = document.createElement('span');
  chevron.className = 'accordion-chevron';
  chevron.textContent = isExpanded ? '▼' : '▶';
  header.appendChild(chevron);

  var info = document.createElement('div');
  info.className = 'accordion-info';

  var nameEl = document.createElement('span');
  nameEl.className = 'accordion-name';
  nameEl.textContent = options.displayName || groupName.replace(/^base:|^user:|^repo:|^kind:|^sub:/, '');
  info.appendChild(nameEl);

  if (options.badge) {
    var badge = document.createElement('span');
    badge.className = 'accordion-badge';
    badge.textContent = options.badge;
    info.appendChild(badge);
  }

  var subtitle = document.createElement('span');
  subtitle.className = 'accordion-subtitle';
  if (groupState === 'partial') {
    subtitle.textContent = includedCount + ' of ' + allCount + ' included';
  } else if (groupState === 'none') {
    subtitle.textContent = allCount + ' items, excluded';
  } else {
    subtitle.textContent = allCount + ' items';
  }
  info.appendChild(subtitle);
  header.appendChild(info);

  // Toggle switch (unless alwaysIncluded; omitted in static mode)
  if (!options.alwaysIncluded) {
    if (App.mode !== 'static') {
      var toggle = document.createElement('div');
      toggle.className = 'accordion-toggle';
      toggle.setAttribute('role', 'switch');
      toggle.setAttribute('aria-checked', groupState !== 'none' ? 'true' : 'false');
      toggle.setAttribute('tabindex', '0');
      toggle.setAttribute('aria-label', (options.displayName || groupName) + ' toggle');
      var knob = document.createElement('div');
      knob.className = 'accordion-toggle-knob';
      toggle.appendChild(knob);

      if (groupState === 'none') {
        toggle.classList.add('toggle-off');
        div.classList.add('accordion-disabled');
      }

      toggle.onclick = function(e) {
        e.stopPropagation();
        toggleAccordionGroup(groupName, items, groupState !== 'none');
      };
      toggle.onkeydown = function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          e.stopPropagation();
          toggleAccordionGroup(groupName, items, groupState !== 'none');
        }
      };
      header.appendChild(toggle);
    }
    // In static mode: no toggle rendered, but still apply disabled styling
    if (groupState === 'none' && App.mode === 'static') {
      div.classList.add('accordion-disabled');
    }
  } else {
    var label = document.createElement('span');
    label.className = 'accordion-always-label';
    label.textContent = 'always included';
    header.appendChild(label);
  }

  // Header click expands/collapses
  header.onclick = function() {
    App.expandedDep = null;
    var expanded = App.tierExpanded['group-' + groupName];
    App.tierExpanded['group-' + groupName] = !expanded;
    var sectionId = items[0] ? items[0].section : '';
    if (sectionId) {
      renderTriageSection(sectionId);
      restoreFocus(sectionId, 'accordion-header', groupName);
    }
  };
  header.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      header.click();
    }
  };

  div.appendChild(header);

  // Expanded content
  if (isExpanded) {
    var table = document.createElement('table');
    table.className = 'accordion-table';

    for (var j = 0; j < items.length; j++) {
      var item = items[j];
      var tr = document.createElement('tr');
      tr.setAttribute('data-dep-key', item.key);
      // Per-item checkbox (omitted in static mode)
      if (App.mode !== 'static') {
        var tdCheck = document.createElement('td');
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = getSnapshotInclude(item.key);
        cb.disabled = groupState === 'none';
        cb.setAttribute('aria-label', item.name);
        (function(itemKey, sectionId) {
          cb.onchange = function() {
            updateSnapshotInclude(itemKey, this.checked);
            incrementChangeCounter();
            App.decisions[itemKey] = true;
            reopenReviewedSection(sectionId);
            scheduleAutosave();
            renderTriageSection(sectionId);
            updateBadge(sectionId);
            restoreFocus(sectionId, 'accordion-header', groupName);
          };
        })(item.key, item.section);
        tdCheck.appendChild(cb);
        tr.appendChild(tdCheck);
      }

      var tdName = document.createElement('td');
      tdName.textContent = item.name;
      if (item.deps && item.deps.length > 0) {
        var depBadge = document.createElement('span');
        depBadge.className = 'dep-badge';
        depBadge.textContent = item.deps.length + ' deps';
        tdName.appendChild(depBadge);

        if (App.mode !== 'static') {
          var depChevron = document.createElement('button');
          depChevron.className = 'dep-chevron';
          depChevron.type = 'button';
          var isDepExpanded = App.expandedDep === item.key;
          depChevron.setAttribute('aria-expanded', isDepExpanded ? 'true' : 'false');
          depChevron.setAttribute('aria-controls', 'deps-' + item.key.replace(/[^a-zA-Z0-9-]/g, '_'));
          depChevron.setAttribute('aria-label', (isDepExpanded ? 'Hide' : 'Show ' + item.deps.length) + ' dependencies for ' + item.name);
          depChevron.textContent = isDepExpanded ? '▾' : '▸';
          (function(itemKey, sId) {
            depChevron.onclick = function(e) {
              e.stopPropagation();
              App.expandedDep = (App.expandedDep === itemKey) ? null : itemKey;
              renderTriageSection(sId);
              restoreFocus(sId, 'dep-chevron', itemKey);
            };
          })(item.key, item.section);
          tdName.appendChild(depChevron);
        } else {
          var depStatic = document.createElement('span');
          depStatic.className = 'dep-list-static';
          depStatic.textContent = item.deps.join(', ');
          tdName.appendChild(depStatic);
        }
      }
      tr.appendChild(tdName);

      var tdMeta = document.createElement('td');
      tdMeta.className = 'accordion-meta';
      tdMeta.textContent = item.meta || '';
      tr.appendChild(tdMeta);

      table.appendChild(tr);
      if (item.deps && item.deps.length > 0 && App.expandedDep === item.key && App.mode !== 'static') {
        var depTr = document.createElement('tr');
        depTr.className = 'dep-row';
        var depTd = document.createElement('td');
        depTd.setAttribute('colspan', '3');
        var depUl = document.createElement('ul');
        depUl.setAttribute('aria-label', 'Dependencies for ' + item.name);
        depUl.id = 'deps-' + item.key.replace(/[^a-zA-Z0-9-]/g, '_');
        for (var d = 0; d < item.deps.length; d++) {
          var depLi = document.createElement('li');
          depLi.textContent = item.deps[d];
          depUl.appendChild(depLi);
        }
        depTd.appendChild(depUl);
        depTr.appendChild(depTd);
        table.appendChild(depTr);
      }
    }
    div.appendChild(table);
  }

  // Screen reader label
  var srLabel = (options.displayName || groupName.replace(/^base:|^user:|^repo:|^kind:|^sub:/, ''));
  if (options.badge) srLabel += ', ' + options.badge + ' repository';
  srLabel += ', ' + (groupState === 'partial' ? includedCount + ' of ' + allCount + ' included' : allCount + ' items');
  if (groupState === 'none') srLabel += ', excluded';
  srLabel += isExpanded ? ', expanded' : ', collapsed';
  div.setAttribute('aria-label', srLabel);

  return div;
}

function toggleAccordionGroup(groupName, items, isCurrentlyOn) {
  App.expandedDep = null;
  if (isCurrentlyOn) {
    var prior = {};
    for (var i = 0; i < items.length; i++) {
      prior[items[i].key] = getSnapshotInclude(items[i].key);
      updateSnapshotInclude(items[i].key, false);
    }
    App.groupPriorState[groupName] = prior;
  } else {
    var saved = App.groupPriorState[groupName];
    for (var j = 0; j < items.length; j++) {
      var val = saved ? (saved[items[j].key] !== undefined ? saved[items[j].key] : true) : true;
      updateSnapshotInclude(items[j].key, val);
    }
  }

  incrementChangeCounter();
  var sectionId = items[0] ? items[0].section : '';
  if (sectionId) {
    reopenReviewedSection(sectionId);
    renderTriageSection(sectionId);
    updateBadge(sectionId);
    restoreFocus(sectionId, 'accordion-toggle', groupName);
  }
  scheduleAutosave();
}

function reopenReviewedSection(sectionId) {
  if (App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }
}

// ── Display-Only Accordion ──

  header.appendChild(chevron);

  var info = document.createElement('div');
  info.className = 'accordion-info';
  var nameEl = document.createElement('span');
  nameEl.className = 'accordion-name';
  nameEl.textContent = groupName.replace(/^sub:/, '');
  info.appendChild(nameEl);
  var subtitle = document.createElement('span');
  subtitle.className = 'accordion-subtitle';
  subtitle.textContent = items.length + ' items — informational';

    if (sectionId) {
      renderTriageSection(sectionId);
      restoreFocus(sectionId, 'accordion-header', groupName);
    }
  };

    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); header.click(); }

  div.setAttribute('aria-label', groupName.replace(/^sub:/, '') + ', ' + items.length + ' items, informational, ' + (isExpanded ? 'expanded' : 'collapsed'));
  return div;

// ── Notification Card ──
function buildNotificationCard(item) {
  var wrapper = document.createElement('div');
  wrapper.className = 'notification-card-wrapper';
  wrapper.setAttribute('data-key', item.key);

  var isAcked = getSnapshotAcknowledged(item.key);

  var full = document.createElement('div');
  full.className = 'triage-card tier-3 notification-full';
  if (isAcked) full.style.display = 'none';

  var warning = document.createElement('div');
  warning.className = 'card-warning';
  warning.textContent = item.reason;
  full.appendChild(warning);

  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name;
  full.appendChild(nameEl);

  var meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.textContent = item.meta || '';
  full.appendChild(meta);

  var desc = document.createElement('div');
  desc.style.cssText = 'font-size:13px;opacity:0.7;margin-bottom:10px;';
  if (item.section === 'system' && item.key.indexOf('semod-') === 0) {
    desc.textContent = 'To include this module in the image, add COPY and semodule -i steps to your Containerfile manually.';
  } else {
    desc.textContent = 'Provide a reproducible build-time source and add the installation to your Containerfile.';
  }
  full.appendChild(desc);

  // Acknowledge button (omitted in static mode)
  if (App.mode !== 'static') {
    var ackBtn = document.createElement('button');
    ackBtn.className = 'btn-primary';
    ackBtn.textContent = 'Acknowledge';
    ackBtn.style.cssText = 'padding:8px 24px;border-radius:6px;border:none;background:#4493f8;color:#fff;font-size:14px;font-weight:500;cursor:pointer;';
    ackBtn.onclick = function() {
      acknowledgeNotification(item.key, item.section);
    };
    full.appendChild(ackBtn);
  }
  wrapper.appendChild(full);

  // Collapsed card
  var collapsed = document.createElement('div');
  collapsed.className = 'notification-collapsed';
  if (!isAcked) collapsed.style.display = 'none';

  var row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;';
  var left = document.createElement('div');
  left.style.cssText = 'display:flex;align-items:center;gap:10px;';
  var cName = document.createElement('span');

  left.appendChild(cWarn);

  if (App.mode !== 'static') {

  return wrapper;
}

// ── Acknowledge / Unacknowledge ──
function acknowledgeNotification(key, sectionId) {
  if (App.mode === 'static') return;
  setSnapshotAcknowledged(key, true);
  App.decisions[key] = true;
  reopenReviewedSection(sectionId);
  renderTriageSection(sectionId);
  updateBadge(sectionId);
  focusNextUndecided(sectionId);
  scheduleAutosave();
}

function unacknowledgeNotification(key, sectionId) {
  if (App.mode === 'static') return;
  setSnapshotAcknowledged(key, false);
  delete App.decisions[key];
  reopenReviewedSection(sectionId);
  renderTriageSection(sectionId);
  updateBadge(sectionId);
  restoreFocus(sectionId, 'notification-ack', key);
  scheduleAutosave();
}

// ── Decision Logic ──
function makeDecision(key, sectionId, include) {
  if (App.mode === 'static') return;
  // Store prior snapshot value so undo can restore it
  App.priorValues[key] = getSnapshotInclude(key);
  App.decisions[key] = true;  // presence means "user acted on this"
  updateSnapshotInclude(key, include);
  incrementChangeCounter();

  // Transition review state
  var current = App.reviewStates[sectionId];
  if (current === 'unreviewed' || !current) {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  // Re-render the section
  renderTriageSection(sectionId);
  updateBadge(sectionId);

  // Focus the next undecided card in this section
  focusNextUndecided(sectionId);

  // Persist decision to server
  scheduleAutosave();

  // Disable buttons if static mode (shouldn't happen, but guard)
  if (App.mode === 'static') disableAllDecisionButtons();
}

function undoDecision(key, sectionId) {
  if (App.mode === 'static') return;
  // Restore the prior snapshot include value
  if (App.priorValues[key] !== undefined) {
    updateSnapshotInclude(key, App.priorValues[key]);
    delete App.priorValues[key];
  }
  delete App.decisions[key];
  decrementChangeCounter();

  // If section was reviewed, revert to in-progress
  if (App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  // Re-render the section
  renderTriageSection(sectionId);
  updateBadge(sectionId);

  // Persist undo to server
  scheduleAutosave();
}

// ── Read snapshot acknowledged state ──
// Returns the current acknowledged value for a triage key from the snapshot.
function getSnapshotAcknowledged(key) {
  var snap = App.snapshot;

  if (key.indexOf('pkg-') === 0) {
    var suffix = key.substring(4);
    if (snap.rpm && snap.rpm.packages_added) {
      for (var i = 0; i < snap.rpm.packages_added.length; i++) {
        var pkg = snap.rpm.packages_added[i];
        if (pkg.name + '-' + pkg.arch === suffix) {
          return !!pkg.acknowledged;
        }
      }
    }
  } else if (key.indexOf('container-') === 0) {
    var cName = key.substring(10);
    if (snap.containers && snap.containers.running_containers) {
      for (var rci = 0; rci < snap.containers.running_containers.length; rci++) {
        if (snap.containers.running_containers[rci].name === cName) {
          return !!snap.containers.running_containers[rci].acknowledged;
        }
      }
    }
  } else if (key.indexOf('nonrpm-') === 0) {
    var nrName = key.substring(7);
    if (snap.non_rpm_software && snap.non_rpm_software.items) {
      for (var ni = 0; ni < snap.non_rpm_software.items.length; ni++) {
        var nrItem = snap.non_rpm_software.items[ni];
        var itemName = nrItem.name || nrItem.path;
        if (itemName === nrName) {
          return !!nrItem.acknowledged;
        }
      }
    }
  } else if (key.indexOf('conn-') === 0) {
    var connName = key.substring(5);
    if (snap.network && snap.network.connections) {
      for (var coi = 0; coi < snap.network.connections.length; coi++) {
        if (snap.network.connections[coi].name === connName) {
          return !!snap.network.connections[coi].acknowledged;
        }
      }
    }
  } else if (key.indexOf('fstab-') === 0) {
    var mountPoint = key.substring(6);
    if (snap.storage && snap.storage.fstab_entries) {
      for (var fsi = 0; fsi < snap.storage.fstab_entries.length; fsi++) {
        if (snap.storage.fstab_entries[fsi].mount_point === mountPoint) {
          return !!snap.storage.fstab_entries[fsi].acknowledged;
        }
      }
    }
  } else if (key.indexOf('group-') === 0) {
    // group-* identity items: no snapshot-level acknowledged field
    // (groups use untyped maps). Use session decisions as proxy.
    return App.decisions[key] || false;
  }

  if (key.indexOf('semod-') === 0) {
    return App.decisions[key] || false;
  }

  return false;
}
