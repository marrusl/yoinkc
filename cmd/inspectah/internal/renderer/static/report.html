      <span id="review-progress-text">Review progress: 0 / 7</span>
      <div class="review-progress-bar">
        <div class="review-progress-fill" id="review-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <nav class="pf-v6-c-nav" id="section-nav">
      <!-- Section links built by renderSidebar() -->
    </nav>
  </aside>

  <!-- Main content -->
  <main class="pf-v6-c-page__main" id="main-content" role="main">
    <!-- Sections rendered here by JS -->
  </main>

  <!-- Containerfile preview panel (right sidebar in wide view) -->
  <aside class="preview-panel" aria-label="Containerfile preview">
    <div class="preview-header">
      <h2>Containerfile Preview</h2>
      <button class="copy-btn" type="button" onclick="copyContainerfile()" aria-label="Copy Containerfile to clipboard">Copy</button>
    </div>
    <div id="changes-badge" style="display:none" role="status">0 changes pending</div>
    <pre id="containerfile-preview"><code></code></pre>
  </aside>
</div>

<script>{{.CodeMirrorJS}}</script>
<script>
const SNAPSHOT = {{.SnapshotJSON}};
const INITIAL_CONTAINERFILE = {{.Containerfile}};
const TRIAGE_MANIFEST = {{.TriageManifest}};

// ── Display-only key prefixes ──
// These item types use "Acknowledge / Skip" instead of "Include / Leave out"
var DISPLAY_ONLY_PREFIXES = ['conn-', 'fstab-', 'container-', 'group-'];

function isDisplayOnly(key) {
  for (var i = 0; i < DISPLAY_ONLY_PREFIXES.length; i++) {
    if (key.indexOf(DISPLAY_ONLY_PREFIXES[i]) === 0) return true;
  }
  return false;
}

// ── App state ──
var App = {
  snapshot: SNAPSHOT,
  containerfile: typeof INITIAL_CONTAINERFILE === 'string' ? INITIAL_CONTAINERFILE : '',
  triageManifest: TRIAGE_MANIFEST || [],
  mode: 'static',
  renderId: '',
  revision: 0,
  reviewStates: {},    // sectionId -> 'unreviewed' | 'in-progress' | 'reviewed'
  prevInventories: {}, // sectionId -> sorted key string for rebuild comparison
  decisions: {},       // key -> true (decided). Presence means user acted; snapshot holds actual value.
  priorValues: {},     // key -> prior include value before makeDecision (for undo)
  activeSection: 'overview',
  tierExpanded: {},    // sectionId-tier -> boolean
  groupPriorState: {}  // groupName -> {key: priorInclude} for toggle restore
};

// ── Decided-state helper ──
// Returns true if an item has been decided — either because the user acted
// on it in this session (App.decisions) OR because the snapshot's current
// include value differs from its original default (handles reload/session
// resume). Three cases:
//   1. Started true, user excluded → current=false, default=true → decided
//   2. Started false (fleet), never touched → current=false, default=false → undecided
//   3. Started false, user re-included → current=true, default=false → decided
function isItemDecided(item) {
  if (App.decisions[item.key]) return true;
  var current = getSnapshotInclude(item.key);
  var original = item.default_include;
  if (original === undefined || original === null) original = true;
  return current !== original;
}

// ── Change counter ──
var changeCount = 0;

function incrementChangeCounter() {
  changeCount++;
  var badge = document.getElementById('changes-badge');
  if (badge) {
    badge.style.display = '';
    badge.textContent = changeCount + ' change' + (changeCount !== 1 ? 's' : '') +
      ' pending — rebuild to update preview';
  }
}

function decrementChangeCounter() {
  changeCount = Math.max(0, changeCount - 1);
  var badge = document.getElementById('changes-badge');
  if (badge) {
    if (changeCount === 0) {
      badge.style.display = 'none';
    } else {
      badge.textContent = changeCount + ' change' + (changeCount !== 1 ? 's' : '') +
        ' pending — rebuild to update preview';
    }
  }
}

function resetChangeCounter() {
  changeCount = 0;
  var badge = document.getElementById('changes-badge');
  if (badge) badge.style.display = 'none';
}

// Migration sections for the sidebar
var MIGRATION_SECTIONS = [
  {id: 'overview',   label: 'Overview',       tracked: false},
  {id: 'packages',   label: 'Packages',       tracked: true},
  {id: 'config',     label: 'Configuration',  tracked: true},
  {id: 'runtime',    label: 'Runtime',         tracked: true},
  {id: 'containers', label: 'Containers',      tracked: true},
  {id: 'identity',   label: 'Identity',        tracked: true},
  {id: 'system',     label: 'System',          tracked: true},
  {id: 'secrets',    label: 'Secrets',         tracked: true},
  {id: 'editor',    label: 'Edit Files',      tracked: false}
];

// ── Boot sequence ──
function boot() {
  detectMode();
  renderSidebar();
  renderContainerfilePreview();
  renderAllSections();
  navigateTo('overview');
}

function detectMode() {
  // file:// protocol -> static mode immediately
  if (window.location.protocol === 'file:') {
    enableStaticMode();
    return;
  }
  // Otherwise try /api/health to see if refine server is running
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/health', true);
    xhr.timeout = 2000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data.re_render) {
            enableRefineMode();
          } else {
            enableStaticMode();
          }
        } catch (e) {
          enableStaticMode();
        }
      } else {
        enableStaticMode();
      }
    };
    xhr.onerror = function() { enableStaticMode(); };
    xhr.ontimeout = function() { enableStaticMode(); };
    xhr.send();
  } catch (e) {
    enableStaticMode();
  }
}

function enableStaticMode() {
  App.mode = 'static';
  // Add static banner to main content
  var main = document.getElementById('main-content');
  if (main) {
    var existing = document.getElementById('static-banner');
    if (!existing) {
      var banner = document.createElement('div');
      banner.id = 'static-banner';
      banner.className = 'static-banner';
      banner.setAttribute('role', 'status');
      banner.textContent = 'Static report — decisions are read-only. Run inspectah refine to enable interactive triage.';
      main.insertBefore(banner, main.firstChild);
    }
  }
  // Disable decision buttons
  disableAllDecisionButtons();
}

function enableRefineMode() {
  App.mode = 'refine';

  // Show rebuild bar
  var rebuildBar = document.getElementById('rebuild-bar');
  if (rebuildBar) rebuildBar.classList.add('active');

  // Fetch the live snapshot from the server
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/snapshot', true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          App.snapshot = data.snapshot || data;
          App.revision = data.revision || 0;
          App.renderId = data.render_id || '';
          if (data.triage_manifest) {
            App.triageManifest = data.triage_manifest;
          }
          renderAllSections();
          initEditor();
        } catch (e) {
          // keep embedded data
          initEditor();
        }
      } else {
        initEditor();
      }
    };
    xhr.onerror = function() { initEditor(); };
    xhr.send();
  } catch (e) {
    // keep embedded data
    initEditor();
  }
}

function disableAllDecisionButtons() {
  // Ensure the describedby target exists
  if (!document.getElementById('static-mode-desc')) {
    var desc = document.createElement('span');
    desc.id = 'static-mode-desc';
    desc.className = 'sr-only';
    desc.textContent = 'Disabled in static mode. Run inspectah refine to enable.';
    document.body.appendChild(desc);
  }

  var buttons = document.querySelectorAll('.card-actions button, .undo-link');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].setAttribute('aria-disabled', 'true');
    buttons[i].setAttribute('aria-describedby', 'static-mode-desc');
    buttons[i].disabled = true;
  }
  // Also disable mark-reviewed buttons
  var reviewBtns = document.querySelectorAll('.mark-reviewed-btn');
  for (var j = 0; j < reviewBtns.length; j++) {
    reviewBtns[j].setAttribute('aria-disabled', 'true');
    reviewBtns[j].setAttribute('aria-describedby', 'static-mode-desc');
    reviewBtns[j].disabled = true;
  }
}

// ── Sidebar ──
function renderSidebar() {
  var nav = document.getElementById('section-nav');
  if (!nav) return;

  var list = document.createElement('ul');
  list.className = 'pf-v6-c-nav__list';
  list.setAttribute('role', 'list');

  MIGRATION_SECTIONS.forEach(function(section) {
    var li = document.createElement('li');
    li.className = 'pf-v6-c-nav__item';

    var a = document.createElement('a');
    a.className = 'pf-v6-c-nav__link';
    a.href = '#section-' + section.id;
    a.setAttribute('data-section', section.id);
    a.onclick = function(e) {
      e.preventDefault();
      navigateTo(section.id);
    };

    // Only tracked sections get a review dot
    if (section.tracked) {
      var dot = document.createElement('span');
      dot.className = 'review-dot';
      dot.id = 'dot-' + section.id;
      dot.setAttribute('aria-hidden', 'true');
      a.appendChild(dot);
    }

    var text = document.createElement('span');
    text.textContent = section.label;
    a.appendChild(text);

    // Badge container for tier counts
    if (section.tracked) {
      var badge = document.createElement('span');
      badge.id = 'badge-' + section.id;
      badge.className = 'triage-badge';
      badge.style.display = 'none';
      a.appendChild(badge);
    }

    li.appendChild(a);
    list.appendChild(li);
  });

  nav.appendChild(list);

  // Keyboard navigation: ArrowDown/ArrowUp within the nav list
  list.addEventListener('keydown', function(e) {
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    var links = list.querySelectorAll('.pf-v6-c-nav__link');
    var current = Array.prototype.indexOf.call(links, document.activeElement);
    if (current === -1) return;
    e.preventDefault();
    if (e.key === 'ArrowDown' && current < links.length - 1) {
      links[current + 1].focus();
    } else if (e.key === 'ArrowUp' && current > 0) {
      links[current - 1].focus();
    }
  });

  updateAllBadges();
}

// ── SPA Navigation ──
function navigateTo(sectionId) {
  // Editor dirty-state guard
  if (editorState.mode === 'editing-dirty') {
    editorState.pendingNavAction = function() {
      exitEditModeClean();
      navigateTo(sectionId);
    };
    showUnsavedModal();
    return;
  }
  if (editorState.mode.startsWith('editing')) exitEditModeClean();

  App.activeSection = sectionId;

  // Update aria-current on sidebar links
  var links = document.querySelectorAll('.pf-v6-c-nav__link');
  for (var i = 0; i < links.length; i++) {
    if (links[i].getAttribute('data-section') === sectionId) {
      links[i].setAttribute('aria-current', 'page');
    } else {
      links[i].removeAttribute('aria-current');
    }
  }

  // Show/hide sections
  var sections = document.querySelectorAll('.report-section');
  for (var j = 0; j < sections.length; j++) {
    if (sections[j].id === 'section-' + sectionId) {
      sections[j].classList.add('active');
    } else {
      sections[j].classList.remove('active');
    }
  }

  // Focus to section heading
  var heading = document.getElementById('heading-' + sectionId);
  if (heading) {
    heading.focus();
  }
}

// ── Progress & Badges ──
function updateProgressBar() {
  var reviewed = 0;
  var total = 0;
  MIGRATION_SECTIONS.forEach(function(s) {
    if (!s.tracked) return;
    total++;
    if (App.reviewStates[s.id] === 'reviewed') reviewed++;
  });

  var text = document.getElementById('review-progress-text');
  var fill = document.getElementById('review-progress-fill');
  if (text) text.textContent = 'Review progress: ' + reviewed + ' / ' + total;
  if (fill) fill.style.width = (total > 0 ? (reviewed / total * 100) : 0) + '%';
}

function updateSidebarDot(sectionId) {
  var dot = document.getElementById('dot-' + sectionId);
  if (!dot) return;
  var state = App.reviewStates[sectionId] || 'unreviewed';
  dot.className = 'review-dot';
  if (state === 'in-progress') {
    dot.classList.add('in-progress');
  } else if (state === 'reviewed') {
    dot.classList.add('reviewed');
  }
}

function updateBadge(sectionId) {
  var badge = document.getElementById('badge-' + sectionId);
  if (!badge) return;

  var items = getManifestItemsForSection(sectionId);
  var undecided3 = 0;
  var undecided2 = 0;
  for (var i = 0; i < items.length; i++) {
    if (isItemDecided(items[i])) continue;  // user has acted on this item
    if (items[i].tier === 3) undecided3++;
    else if (items[i].tier === 2) undecided2++;
  }

  if (undecided3 > 0) {
    badge.style.display = '';
    badge.className = 'triage-badge tier-3';
    badge.textContent = undecided3;
  } else if (undecided2 > 0) {
    badge.style.display = '';
    badge.className = 'triage-badge tier-2';
    badge.textContent = undecided2;
  } else {
    badge.style.display = 'none';
  }
}

function updateAllBadges() {
  MIGRATION_SECTIONS.forEach(function(s) {
    if (s.tracked) updateBadge(s.id);
  });
}

// ── Manifest helpers ──
function getManifestItemsForSection(sectionId) {
  var items = [];
  for (var i = 0; i < App.triageManifest.length; i++) {
    if (App.triageManifest[i].section === sectionId) {
      items.push(App.triageManifest[i]);
    }
  }
  return items;
}

function groupByTier(items) {
  var groups = {3: [], 2: [], 1: []};
  for (var i = 0; i < items.length; i++) {
    var t = items[i].tier;
    if (!groups[t]) groups[t] = [];
    groups[t].push(items[i]);
  }
  return groups;
}

// ── Overview Section ──
function renderOverview() {
  var container = document.getElementById('section-overview');
  if (!container) return;
  container.innerHTML = '';

  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-overview';
  heading.setAttribute('tabindex', '-1');
  heading.textContent = 'Overview';
  container.appendChild(heading);

  // Stats grid
  var stats = document.createElement('div');
  stats.className = 'overview-stats';

  var snap = App.snapshot;

  // Count items by type
  var pkgCount = 0;
  if (snap.rpm && snap.rpm.packages_added) pkgCount = snap.rpm.packages_added.length;

  var cfgCount = 0;
  if (snap.config && snap.config.files) cfgCount = snap.config.files.length;

  var svcCount = 0;
  if (snap.services && snap.services.state_changes) svcCount = snap.services.state_changes.length;

  var secretCount = 0;
  if (snap.redactions) secretCount = snap.redactions.length;

  var manifestTotal = App.triageManifest.length;
  var tier3Count = 0;
  var tier2Count = 0;
  var tier1Count = 0;
  for (var i = 0; i < App.triageManifest.length; i++) {
    if (App.triageManifest[i].tier === 3) tier3Count++;
    else if (App.triageManifest[i].tier === 2) tier2Count++;
    else tier1Count++;
  }

  var statItems = [
    {label: 'Total Items', value: manifestTotal},
    {label: 'Flagged (Tier 3)', value: tier3Count},
    {label: 'Needs Decision (Tier 2)', value: tier2Count},
    {label: 'Auto-included (Tier 1)', value: tier1Count},
    {label: 'Packages Added', value: pkgCount},
    {label: 'Config Files', value: cfgCount},
    {label: 'Service Changes', value: svcCount},
    {label: 'Secrets Found', value: secretCount}
  ];

  for (var j = 0; j < statItems.length; j++) {
    var card = document.createElement('div');
    card.className = 'stat-card';
    var val = document.createElement('div');
    val.className = 'stat-value';
    val.textContent = statItems[j].value;
    var lbl = document.createElement('div');
    lbl.className = 'stat-label';
    lbl.textContent = statItems[j].label;
    card.appendChild(val);
    card.appendChild(lbl);
    stats.appendChild(card);
  }
  container.appendChild(stats);

  // System info
  if (snap.os_release) {
    var sysInfo = document.createElement('div');
    sysInfo.style.marginBottom = '1rem';
    sysInfo.style.fontSize = '0.85rem';
    sysInfo.style.opacity = '0.8';
    var osr = snap.os_release;
    sysInfo.textContent = 'System: ' + (osr.pretty_name || osr.name || 'Unknown') +
      ' | Type: ' + (snap.system_type || 'unknown');
    container.appendChild(sysInfo);
  }

  // Warnings
  if (snap.warnings && snap.warnings.length > 0) {
    var warningsDiv = document.createElement('div');
    warningsDiv.className = 'overview-warnings';
    var wHead = document.createElement('h3');
    wHead.textContent = 'Warnings (' + snap.warnings.length + ')';
    wHead.style.fontSize = '1rem';
    wHead.style.marginBottom = '0.5rem';
    warningsDiv.appendChild(wHead);

    for (var w = 0; w < snap.warnings.length; w++) {
      var warn = snap.warnings[w];
      var wItem = document.createElement('div');
      wItem.className = 'warning-item';
      wItem.textContent = warn.message || warn.text || JSON.stringify(warn);
      warningsDiv.appendChild(wItem);
    }
    container.appendChild(warningsDiv);
  }
}

// ── Triage Card Builder ──
function buildTriageCard(item) {
  var card = document.createElement('div');
  card.className = 'triage-card tier-' + item.tier;
  card.setAttribute('data-key', item.key);

  // Tier 3 warning banner
  if (item.tier === 3) {
    var warning = document.createElement('div');
    warning.className = 'card-warning';
    warning.textContent = item.reason;
    card.appendChild(warning);
  }

  // Name
  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name || item.key;
  card.appendChild(nameEl);

  // Meta
  if (item.meta) {
    var metaEl = document.createElement('div');
    metaEl.className = 'card-meta';
    metaEl.textContent = item.meta;
    card.appendChild(metaEl);
  }

  // Reason (tier 2 and tier 1 show reason inline, tier 3 shows it in warning banner)
  if (item.tier !== 3) {
    var reasonEl = document.createElement('div');
    reasonEl.className = 'card-reason';
    reasonEl.textContent = item.reason;
    card.appendChild(reasonEl);
  }

  // Action buttons
  var actions = document.createElement('div');
  actions.className = 'card-actions';

  var displayOnly = isDisplayOnly(item.key);
  var isSecret = item.is_secret || item.section === 'secrets';

  if (isSecret) {
    // Secrets: "Exclude from image" is primary, "Keep in image (acknowledged)" is secondary
    var excludeBtn = document.createElement('button');
    excludeBtn.type = 'button';
    excludeBtn.className = 'btn-primary';
    excludeBtn.textContent = 'Exclude from image';
    excludeBtn.setAttribute('aria-label', 'Exclude ' + (item.name || item.key) + ' from image');
    excludeBtn.onclick = function() { makeDecision(item.key, item.section, false); };
    actions.appendChild(excludeBtn);

    var keepBtn = document.createElement('button');
    keepBtn.type = 'button';
    keepBtn.className = 'btn-outline';
    keepBtn.textContent = 'Keep in image (acknowledged)';
    keepBtn.setAttribute('aria-label', 'Keep ' + (item.name || item.key) + ' in image');
    keepBtn.onclick = function() { makeDecision(item.key, item.section, true); };
    actions.appendChild(keepBtn);
  } else if (displayOnly) {
    // Display-only: "Acknowledge" / "Skip"
    var ackBtn = document.createElement('button');
    ackBtn.type = 'button';
    ackBtn.className = 'btn-primary';
    ackBtn.textContent = 'Acknowledge';
    ackBtn.setAttribute('aria-label', 'Acknowledge ' + (item.name || item.key));
    ackBtn.onclick = function() { makeDecision(item.key, item.section, true); };
    actions.appendChild(ackBtn);

    var skipBtn = document.createElement('button');
    skipBtn.type = 'button';
    skipBtn.className = 'btn-outline';
    skipBtn.textContent = 'Skip';
    skipBtn.setAttribute('aria-label', 'Skip ' + (item.name || item.key));
    skipBtn.onclick = function() { makeDecision(item.key, item.section, false); };
    actions.appendChild(skipBtn);
  } else if (item.tier === 3) {
    // Non-secret tier 3: "Acknowledge & include" / "Exclude"
    var ackIncBtn = document.createElement('button');
    ackIncBtn.type = 'button';
    ackIncBtn.className = 'btn-primary';
    ackIncBtn.textContent = 'Acknowledge & include';
    ackIncBtn.setAttribute('aria-label', 'Acknowledge and include ' + (item.name || item.key) + ' in image');
    ackIncBtn.onclick = function() { makeDecision(item.key, item.section, true); };
    actions.appendChild(ackIncBtn);

    var exclBtn = document.createElement('button');
    exclBtn.type = 'button';
    exclBtn.className = 'btn-outline';
    exclBtn.textContent = 'Exclude';
    exclBtn.setAttribute('aria-label', 'Exclude ' + (item.name || item.key) + ' from image');
    exclBtn.onclick = function() { makeDecision(item.key, item.section, false); };
    actions.appendChild(exclBtn);
  } else {
    // Standard tier 2 / tier 1: "Include in image" / "Leave out"
    var inclBtn = document.createElement('button');
    inclBtn.type = 'button';
    inclBtn.className = 'btn-primary';
    inclBtn.textContent = 'Include in image';
    inclBtn.setAttribute('aria-label', 'Include ' + (item.name || item.key) + ' in image');
    inclBtn.onclick = function() { makeDecision(item.key, item.section, true); };
    actions.appendChild(inclBtn);

    var leaveBtn = document.createElement('button');
    leaveBtn.type = 'button';
    leaveBtn.className = 'btn-outline';
    leaveBtn.textContent = 'Leave out';
    leaveBtn.setAttribute('aria-label', 'Leave ' + (item.name || item.key) + ' out of image');
    leaveBtn.onclick = function() { makeDecision(item.key, item.section, false); };
    actions.appendChild(leaveBtn);
  }

  card.appendChild(actions);
  return card;
}

// ── Decided Card Builder ──
function buildDecidedCard(item, included) {
  var card = document.createElement('div');
  card.className = 'decided-card';
  card.setAttribute('data-key', item.key);

  var nameSpan = document.createElement('span');
  nameSpan.textContent = item.name || item.key;
  card.appendChild(nameSpan);

  var label = document.createElement('span');
  label.className = 'decided-label';

  var displayOnly = isDisplayOnly(item.key);
  var isSecret = item.is_secret || item.section === 'secrets';

  if (isSecret) {
    if (included) {
      label.classList.add('secret-kept');
      label.textContent = 'kept in image (acknowledged)';
      card.setAttribute('aria-label', (item.name || item.key) + ': Kept in image (acknowledged)');
    } else {
      label.classList.add('secret-excluded');
      label.textContent = 'excluded from image';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded from image');
    }
  } else if (displayOnly) {
    if (included) {
      label.classList.add('acknowledged');
      label.textContent = 'Acknowledged';
      card.setAttribute('aria-label', (item.name || item.key) + ': Acknowledged');
    } else {
      label.classList.add('skipped');
      label.textContent = 'Skipped';
      card.setAttribute('aria-label', (item.name || item.key) + ': Skipped');
    }
  } else if (item.tier === 3) {
    if (included) {
      label.classList.add('included');
      label.textContent = 'included (acknowledged)';
      card.setAttribute('aria-label', (item.name || item.key) + ': Included (acknowledged)');
    } else {
      label.classList.add('excluded');
      label.textContent = 'excluded';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded');
    }
  } else {
    if (included) {
      label.classList.add('included');
      label.textContent = 'included';
      card.setAttribute('aria-label', (item.name || item.key) + ': Included');
    } else {
      label.classList.add('excluded');
      label.textContent = 'excluded';
      card.setAttribute('aria-label', (item.name || item.key) + ': Excluded');
    }
  }

  card.appendChild(label);

  // Undo button
  var undo = document.createElement('button');
  undo.type = 'button';
  undo.className = 'undo-link';
  undo.textContent = 'undo';
  undo.setAttribute('aria-label', 'Undo decision for ' + (item.name || item.key));
  undo.onclick = function() { undoDecision(item.key, item.section); };
  card.appendChild(undo);

  return card;
}

// ── Output Accordion ──
function buildOutputAccordion(groupName, items, options) {
  options = options || {};
  var div = document.createElement('div');
  div.className = 'accordion-card';
  div.setAttribute('data-group', groupName);

  // Compute group state
  var allCount = items.length;
  var includedCount = 0;
  for (var i = 0; i < items.length; i++) {
    if (getSnapshotInclude(items[i].key)) includedCount++;
  }
  var groupState = includedCount === allCount ? 'all' : includedCount === 0 ? 'none' : 'partial';
  var isExpanded = App.tierExpanded['group-' + groupName] || false;

  // Header
  var header = document.createElement('div');
  header.className = 'accordion-header';
  header.setAttribute('role', 'button');
  header.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
  header.setAttribute('tabindex', '0');

  var chevron = document.createElement('span');
  chevron.className = 'accordion-chevron';
  chevron.textContent = isExpanded ? '▼' : '▶';
  header.appendChild(chevron);

  var info = document.createElement('div');
  info.className = 'accordion-info';

  var nameEl = document.createElement('span');
  nameEl.className = 'accordion-name';
  nameEl.textContent = options.displayName || groupName.replace(/^repo:|^kind:|^sub:/, '');
  info.appendChild(nameEl);

  if (options.badge) {
    var badge = document.createElement('span');
    badge.className = 'accordion-badge';
    badge.textContent = options.badge;
    info.appendChild(badge);
  }

  var subtitle = document.createElement('span');
  subtitle.className = 'accordion-subtitle';
  if (groupState === 'partial') {
    subtitle.textContent = includedCount + ' of ' + allCount + ' included';
  } else if (groupState === 'none') {
    subtitle.textContent = allCount + ' items, excluded';
  } else {
    subtitle.textContent = allCount + ' items';
  }
  info.appendChild(subtitle);
  header.appendChild(info);

  // Toggle switch (unless alwaysIncluded)
  if (!options.alwaysIncluded) {
    var toggle = document.createElement('div');
    toggle.className = 'accordion-toggle';
    toggle.setAttribute('role', 'switch');
    toggle.setAttribute('aria-checked', groupState !== 'none' ? 'true' : 'false');
    toggle.setAttribute('tabindex', '0');
    toggle.setAttribute('aria-label', (options.displayName || groupName) + ' toggle');
    var knob = document.createElement('div');
    knob.className = 'accordion-toggle-knob';
    toggle.appendChild(knob);

    if (groupState === 'none') {
      toggle.classList.add('toggle-off');
      div.classList.add('accordion-disabled');
    }

    toggle.onclick = function(e) {
      e.stopPropagation();
      if (App.mode === 'static') return;
      toggleAccordionGroup(groupName, items, groupState !== 'none');
    };
    toggle.onkeydown = function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.stopPropagation();
        if (App.mode === 'static') return;
        toggleAccordionGroup(groupName, items, groupState !== 'none');
      }
    };
    header.appendChild(toggle);
  } else {
    var label = document.createElement('span');
    label.className = 'accordion-always-label';
    label.textContent = 'always included';
    header.appendChild(label);
  }

  // Header click expands/collapses
  header.onclick = function() {
    var expanded = App.tierExpanded['group-' + groupName];
    App.tierExpanded['group-' + groupName] = !expanded;
    var sectionId = items[0] ? items[0].section : '';
    if (sectionId) renderTriageSection(sectionId);
  };
  header.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      header.click();
    }
  };

  div.appendChild(header);

  // Expanded content
  if (isExpanded) {
    var table = document.createElement('table');
    table.className = 'accordion-table';

    for (var j = 0; j < items.length; j++) {
      var item = items[j];
      var tr = document.createElement('tr');
      var tdCheck = document.createElement('td');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = getSnapshotInclude(item.key);
      cb.disabled = groupState === 'none' || App.mode === 'static';
      cb.setAttribute('aria-label', item.name);
      (function(itemKey, sectionId) {
        cb.onchange = function() {
          updateSnapshotInclude(itemKey, this.checked);
          incrementChangeCounter();
          App.decisions[itemKey] = true;
          reopenReviewedSection(sectionId);
          scheduleAutosave();
          renderTriageSection(sectionId);
          updateBadge(sectionId);
        };
      })(item.key, item.section);
      tdCheck.appendChild(cb);
      tr.appendChild(tdCheck);

      var tdName = document.createElement('td');
      tdName.textContent = item.name;
      tr.appendChild(tdName);

      var tdMeta = document.createElement('td');
      tdMeta.className = 'accordion-meta';
      tdMeta.textContent = item.meta || '';
      tr.appendChild(tdMeta);

      table.appendChild(tr);
    }
    div.appendChild(table);
  }

  // Screen reader label
  var srLabel = (options.displayName || groupName.replace(/^repo:|^kind:|^sub:/, ''));
  if (options.badge) srLabel += ', ' + options.badge + ' repository';
  srLabel += ', ' + (groupState === 'partial' ? includedCount + ' of ' + allCount + ' included' : allCount + ' items');
  if (groupState === 'none') srLabel += ', excluded';
  srLabel += isExpanded ? ', expanded' : ', collapsed';
  div.setAttribute('aria-label', srLabel);

  return div;
}

function toggleAccordionGroup(groupName, items, isCurrentlyOn) {
  if (isCurrentlyOn) {
    var prior = {};
    for (var i = 0; i < items.length; i++) {
      prior[items[i].key] = getSnapshotInclude(items[i].key);
      updateSnapshotInclude(items[i].key, false);
    }
    App.groupPriorState[groupName] = prior;
  } else {
    var saved = App.groupPriorState[groupName];
    for (var j = 0; j < items.length; j++) {
      var val = saved ? (saved[items[j].key] !== undefined ? saved[items[j].key] : true) : true;
      updateSnapshotInclude(items[j].key, val);
    }
  }

  incrementChangeCounter();
  var sectionId = items[0] ? items[0].section : '';
  if (sectionId) {
    reopenReviewedSection(sectionId);
    renderTriageSection(sectionId);
    updateBadge(sectionId);
  }
  scheduleAutosave();
}

function reopenReviewedSection(sectionId) {
  if (App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }
}

// ── Decision Logic ──
function makeDecision(key, sectionId, include) {
  if (App.mode === 'static') return;
  // Store prior snapshot value so undo can restore it
  App.priorValues[key] = getSnapshotInclude(key);
  App.decisions[key] = true;  // presence means "user acted on this"
  updateSnapshotInclude(key, include);
  incrementChangeCounter();

  // Transition review state
  var current = App.reviewStates[sectionId];
  if (current === 'unreviewed' || !current) {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  // Re-render the section
  renderTriageSection(sectionId);
  updateBadge(sectionId);

  // Focus the next undecided card in this section
  focusNextUndecided(sectionId);

  // Persist decision to server
  scheduleAutosave();

  // Disable buttons if static mode (shouldn't happen, but guard)
  if (App.mode === 'static') disableAllDecisionButtons();
}

function undoDecision(key, sectionId) {
  if (App.mode === 'static') return;
  // Restore the prior snapshot include value
  if (App.priorValues[key] !== undefined) {
    updateSnapshotInclude(key, App.priorValues[key]);
    delete App.priorValues[key];
  }
  delete App.decisions[key];
  decrementChangeCounter();

  // If section was reviewed, revert to in-progress
  if (App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }

  // Re-render the section
  renderTriageSection(sectionId);
  updateBadge(sectionId);

  // Persist undo to server
  scheduleAutosave();
}

// ── Read snapshot include state ──
// Returns the current include value for a triage key from the snapshot.
// This is the authoritative source for whether an item is included.
function getSnapshotInclude(key) {
  var snap = App.snapshot;

  if (key.indexOf('pkg-') === 0) {
    var suffix = key.substring(4);
    if (snap.rpm && snap.rpm.packages_added) {
      for (var i = 0; i < snap.rpm.packages_added.length; i++) {
        var pkg = snap.rpm.packages_added[i];
        if (pkg.name + '-' + pkg.arch === suffix) {
          return pkg.include !== false;
        }
      }
    }
  } else if (key.indexOf('ms-') === 0) {
    var msSuffix = key.substring(3);
    if (snap.rpm && snap.rpm.module_streams) {
      for (var mi = 0; mi < snap.rpm.module_streams.length; mi++) {
        var ms = snap.rpm.module_streams[mi];
        if (ms.module_name + '-' + ms.stream === msSuffix) {
          return ms.include !== false;
        }
      }
    }
  } else if (key.indexOf('cfg-') === 0) {
    var cfgPath = key.substring(4);
    if (snap.config && snap.config.files) {
      for (var ci = 0; ci < snap.config.files.length; ci++) {
        if (snap.config.files[ci].path === cfgPath) {
          return snap.config.files[ci].include !== false;
        }
      }
    }
  } else if (key.indexOf('svc-') === 0) {
    var svcUnit = key.substring(4);
    if (snap.services && snap.services.state_changes) {
      for (var si = 0; si < snap.services.state_changes.length; si++) {
        if (snap.services.state_changes[si].unit === svcUnit) {
          return snap.services.state_changes[si].include !== false;
        }
      }
    }
  } else if (key.indexOf('cron-') === 0) {
    var cronPath = key.substring(5);
    if (snap.scheduled_tasks && snap.scheduled_tasks.cron_jobs) {
      for (var cri = 0; cri < snap.scheduled_tasks.cron_jobs.length; cri++) {
        if (snap.scheduled_tasks.cron_jobs[cri].path === cronPath) {
          return snap.scheduled_tasks.cron_jobs[cri].include !== false;
        }
      }
    }
  } else if (key.indexOf('timer-') === 0) {
    var timerName = key.substring(6);
    if (snap.scheduled_tasks && snap.scheduled_tasks.systemd_timers) {
      for (var ti = 0; ti < snap.scheduled_tasks.systemd_timers.length; ti++) {
        if (snap.scheduled_tasks.systemd_timers[ti].name === timerName) {
          return snap.scheduled_tasks.systemd_timers[ti].include !== false;
        }
      }
    }
  } else if (key.indexOf('quadlet-') === 0) {
    var qName = key.substring(8);
    if (snap.containers && snap.containers.quadlet_units) {
      for (var qi = 0; qi < snap.containers.quadlet_units.length; qi++) {
        if (snap.containers.quadlet_units[qi].name === qName) {
          return snap.containers.quadlet_units[qi].include !== false;
        }
      }
    }
  } else if (key.indexOf('container-') === 0) {
    var cName = key.substring(10);
    if (snap.containers && snap.containers.running_containers) {
      for (var rci = 0; rci < snap.containers.running_containers.length; rci++) {
        if (snap.containers.running_containers[rci].name === cName) {
          return snap.containers.running_containers[rci].include !== false;
        }
      }
    }
  } else if (key.indexOf('nonrpm-') === 0) {
    var nrName = key.substring(7);
    if (snap.non_rpm_software && snap.non_rpm_software.items) {
      for (var ni = 0; ni < snap.non_rpm_software.items.length; ni++) {
        var nrItem = snap.non_rpm_software.items[ni];
        var itemName = nrItem.name || nrItem.path;
        if (itemName === nrName) {
          return nrItem.include !== false;
        }
      }
    }
  } else if (key.indexOf('user-') === 0) {
    var uName = key.substring(5);
    if (snap.users_groups && snap.users_groups.users) {
      for (var ui = 0; ui < snap.users_groups.users.length; ui++) {
        var u = snap.users_groups.users[ui];
        if ((u.name || u.username) === uName) {
          return u.include !== false;
        }
      }
    }
  } else if (key.indexOf('group-') === 0) {
    var gName = key.substring(6);
    if (snap.users_groups && snap.users_groups.groups) {
      for (var gi = 0; gi < snap.users_groups.groups.length; gi++) {
        var g = snap.users_groups.groups[gi];
        if ((g.name || g.groupname) === gName) {
          return g.include !== false;
        }
      }
    }
  } else if (key.indexOf('sebool-') === 0) {
    var boolName = key.substring(7);
    if (snap.selinux && snap.selinux.boolean_overrides) {
      for (var bi = 0; bi < snap.selinux.boolean_overrides.length; bi++) {
        var b = snap.selinux.boolean_overrides[bi];
        if ((b.name || b.boolean) === boolName) {
          return b.include !== false;
        }
      }
    }
  } else if (key.indexOf('seport-') === 0) {
    var seportSuffix = key.substring(7);
    if (snap.selinux && snap.selinux.port_labels) {
      for (var spi = 0; spi < snap.selinux.port_labels.length; spi++) {
        var sp = snap.selinux.port_labels[spi];
        if (sp.protocol + '-' + sp.port === seportSuffix) {
          return sp.include !== false;
        }
      }
    }
  } else if (key.indexOf('sysctl-') === 0) {
    var sysKey = key.substring(7);
    if (snap.kernel_boot && snap.kernel_boot.sysctl_overrides) {
      for (var ski = 0; ski < snap.kernel_boot.sysctl_overrides.length; ski++) {
        if (snap.kernel_boot.sysctl_overrides[ski].key === sysKey) {
          return snap.kernel_boot.sysctl_overrides[ski].include !== false;
        }
      }
    }
  } else if (key.indexOf('kmod-') === 0) {
    var modName = key.substring(5);
    if (snap.kernel_boot && snap.kernel_boot.non_default_modules) {
      for (var ki = 0; ki < snap.kernel_boot.non_default_modules.length; ki++) {
        if (snap.kernel_boot.non_default_modules[ki].name === modName) {
          return snap.kernel_boot.non_default_modules[ki].include !== false;
        }
      }
    }
  } else if (key.indexOf('conn-') === 0) {
    var connName = key.substring(5);
    if (snap.network && snap.network.connections) {
      for (var coi = 0; coi < snap.network.connections.length; coi++) {
        if (snap.network.connections[coi].name === connName) {
          return snap.network.connections[coi].include !== false;
        }
      }
    }
  } else if (key.indexOf('fw-') === 0) {
    var fwName = key.substring(3);
    if (snap.network && snap.network.firewall_zones) {
      for (var fi = 0; fi < snap.network.firewall_zones.length; fi++) {
        if (snap.network.firewall_zones[fi].name === fwName) {
          return snap.network.firewall_zones[fi].include !== false;
        }
      }
    }
  } else if (key.indexOf('fstab-') === 0) {
    var mountPoint = key.substring(6);
    if (snap.storage && snap.storage.fstab_entries) {
      for (var fsi = 0; fsi < snap.storage.fstab_entries.length; fsi++) {
        if (snap.storage.fstab_entries[fsi].mount_point === mountPoint) {
          return snap.storage.fstab_entries[fsi].include !== false;
        }
      }
    }
  } else if (key.indexOf('secret-') === 0) {
    // For secret items with a source_path, check the backing config entry
    var manifest = App.triageManifest || [];
    for (var si = 0; si < manifest.length; si++) {
      if (manifest[si].key === key && manifest[si].source_path) {
        var srcPath = manifest[si].source_path;
        if (snap.config && snap.config.files) {
          for (var sci = 0; sci < snap.config.files.length; sci++) {
            if (snap.config.files[sci].path === srcPath) {
              return snap.config.files[sci].include !== false;
            }
          }
        }
      }
    }
    // No backing config entry — default to included
    return true;
  }

  // Default: included
  return true;
}

// ── Update snapshot include flags ──
function updateSnapshotInclude(key, include) {
  var snap = App.snapshot;
  var prefix = key.split('-')[0] + '-';
  var suffix = key.substring(prefix.length);

  if (key.indexOf('pkg-') === 0) {
    // pkg-NAME-ARCH — find in packages_added
    if (snap.rpm && snap.rpm.packages_added) {
      for (var i = 0; i < snap.rpm.packages_added.length; i++) {
        var pkg = snap.rpm.packages_added[i];
        if (pkg.name + '-' + pkg.arch === suffix) {
          pkg.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('ms-') === 0) {
    // ms-MODULE-STREAM
    if (snap.rpm && snap.rpm.module_streams) {
      for (var mi = 0; mi < snap.rpm.module_streams.length; mi++) {
        var ms = snap.rpm.module_streams[mi];
        if (ms.module_name + '-' + ms.stream === suffix) {
          ms.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('cfg-') === 0) {
    // cfg-PATH
    var path = key.substring(4);
    if (snap.config && snap.config.files) {
      for (var ci = 0; ci < snap.config.files.length; ci++) {
        if (snap.config.files[ci].path === path) {
          snap.config.files[ci].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('svc-') === 0) {
    var unit = key.substring(4);
    if (snap.services && snap.services.state_changes) {
      for (var si = 0; si < snap.services.state_changes.length; si++) {
        if (snap.services.state_changes[si].unit === unit) {
          snap.services.state_changes[si].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('cron-') === 0) {
    var cronPath = key.substring(5);
    if (snap.scheduled_tasks && snap.scheduled_tasks.cron_jobs) {
      for (var cri = 0; cri < snap.scheduled_tasks.cron_jobs.length; cri++) {
        if (snap.scheduled_tasks.cron_jobs[cri].path === cronPath) {
          snap.scheduled_tasks.cron_jobs[cri].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('timer-') === 0) {
    var timerName = key.substring(6);
    if (snap.scheduled_tasks && snap.scheduled_tasks.systemd_timers) {
      for (var ti = 0; ti < snap.scheduled_tasks.systemd_timers.length; ti++) {
        if (snap.scheduled_tasks.systemd_timers[ti].name === timerName) {
          snap.scheduled_tasks.systemd_timers[ti].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('quadlet-') === 0) {
    var qName = key.substring(8);
    if (snap.containers && snap.containers.quadlet_units) {
      for (var qi = 0; qi < snap.containers.quadlet_units.length; qi++) {
        if (snap.containers.quadlet_units[qi].name === qName) {
          snap.containers.quadlet_units[qi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('container-') === 0) {
    var cName = key.substring(10);
    if (snap.containers && snap.containers.running_containers) {
      for (var rci = 0; rci < snap.containers.running_containers.length; rci++) {
        if (snap.containers.running_containers[rci].name === cName) {
          snap.containers.running_containers[rci].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('nonrpm-') === 0) {
    var nrName = key.substring(7);
    if (snap.non_rpm_software && snap.non_rpm_software.items) {
      for (var ni = 0; ni < snap.non_rpm_software.items.length; ni++) {
        var nrItem = snap.non_rpm_software.items[ni];
        var itemName = nrItem.name || nrItem.path;
        if (itemName === nrName) {
          nrItem.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('user-') === 0) {
    var uName = key.substring(5);
    if (snap.users_groups && snap.users_groups.users) {
      for (var ui = 0; ui < snap.users_groups.users.length; ui++) {
        var u = snap.users_groups.users[ui];
        if ((u.name || u.username) === uName) {
          u.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('group-') === 0) {
    var gName = key.substring(6);
    if (snap.users_groups && snap.users_groups.groups) {
      for (var gi = 0; gi < snap.users_groups.groups.length; gi++) {
        var g = snap.users_groups.groups[gi];
        if ((g.name || g.groupname) === gName) {
          g.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('sebool-') === 0) {
    var boolName = key.substring(7);
    if (snap.selinux && snap.selinux.boolean_overrides) {
      for (var bi = 0; bi < snap.selinux.boolean_overrides.length; bi++) {
        var b = snap.selinux.boolean_overrides[bi];
        if ((b.name || b.boolean) === boolName) {
          b.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('seport-') === 0) {
    // seport-PROTO-PORT
    var seportSuffix = key.substring(7);
    if (snap.selinux && snap.selinux.port_labels) {
      for (var spi = 0; spi < snap.selinux.port_labels.length; spi++) {
        var sp = snap.selinux.port_labels[spi];
        if (sp.protocol + '-' + sp.port === seportSuffix) {
          sp.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('semod-') === 0) {
    // semod is custom_modules which is []string - no include field to set
    // No-op for now
  } else if (key.indexOf('sysctl-') === 0) {
    var sysKey = key.substring(7);
    if (snap.kernel_boot && snap.kernel_boot.sysctl_overrides) {
      for (var ski = 0; ski < snap.kernel_boot.sysctl_overrides.length; ski++) {
        if (snap.kernel_boot.sysctl_overrides[ski].key === sysKey) {
          snap.kernel_boot.sysctl_overrides[ski].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('kmod-') === 0) {
    var modName = key.substring(5);
    if (snap.kernel_boot && snap.kernel_boot.non_default_modules) {
      for (var ki = 0; ki < snap.kernel_boot.non_default_modules.length; ki++) {
        if (snap.kernel_boot.non_default_modules[ki].name === modName) {
          snap.kernel_boot.non_default_modules[ki].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('conn-') === 0) {
    var connName = key.substring(5);
    if (snap.network && snap.network.connections) {
      for (var coi = 0; coi < snap.network.connections.length; coi++) {
        if (snap.network.connections[coi].name === connName) {
          snap.network.connections[coi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('fw-') === 0) {
    var fwName = key.substring(3);
    if (snap.network && snap.network.firewall_zones) {
      for (var fi = 0; fi < snap.network.firewall_zones.length; fi++) {
        if (snap.network.firewall_zones[fi].name === fwName) {
          snap.network.firewall_zones[fi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('fstab-') === 0) {
    var mountPoint = key.substring(6);
    if (snap.storage && snap.storage.fstab_entries) {
      for (var fsi = 0; fsi < snap.storage.fstab_entries.length; fsi++) {
        if (snap.storage.fstab_entries[fsi].mount_point === mountPoint) {
          snap.storage.fstab_entries[fsi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('secret-') === 0) {
    // Secrets are redaction entries — no include field on the redaction itself.
    // Look up the backing config file via source_path from the triage manifest.
    var manifest = App.triageManifest || [];
    for (var si = 0; si < manifest.length; si++) {
      if (manifest[si].key === key && manifest[si].source_path) {
        var srcPath = manifest[si].source_path;
        if (snap.config && snap.config.files) {
          for (var sci = 0; sci < snap.config.files.length; sci++) {
            if (snap.config.files[sci].path === srcPath) {
              snap.config.files[sci].include = include;
              return;
            }
          }
        }
      }
    }
  }
}

// ── Section Renderers ──
function renderAllSections() {
  var main = document.getElementById('main-content');
  if (!main) return;

  // Remove existing sections but keep the static banner if present
  var banner = document.getElementById('static-banner');
  var children = main.querySelectorAll('.report-section');
  for (var i = 0; i < children.length; i++) {
    main.removeChild(children[i]);
  }

  // Create section containers
  MIGRATION_SECTIONS.forEach(function(section) {
    var div = document.createElement('div');
    div.className = 'report-section';
    div.id = 'section-' + section.id;
    main.appendChild(div);
  });

  // Render overview
  renderOverview();

  // Render each triage section and set initial review states
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked) return;
    renderTriageSection(section.id);
  });

  // Render editor section (hidden until refine mode activates it)
  renderEditorSection();

  // Initialize review states for zero-item sections
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked) return;
    var items = getManifestItemsForSection(section.id);
    // Store inventory for rebuild comparison
    var keys = [];
    for (var k = 0; k < items.length; k++) {
      keys.push(items[k].key + ':' + items[k].tier);
    }
    keys.sort();
    App.prevInventories[section.id] = keys.join(',');

    // Auto-complete zero-item sections
    if (items.length === 0 && !App.reviewStates[section.id]) {
      App.reviewStates[section.id] = 'reviewed';
      updateSidebarDot(section.id);
    } else if (!App.reviewStates[section.id]) {
      App.reviewStates[section.id] = 'unreviewed';
    }
  });

  updateProgressBar();
  updateAllBadges();

  // Show the active section
  navigateTo(App.activeSection);

  // If static mode, disable buttons after rendering
  if (App.mode === 'static') {
    disableAllDecisionButtons();
  }
}

function renderTriageSection(sectionId) {
  var container = document.getElementById('section-' + sectionId);
  if (!container) return;
  container.innerHTML = '';

  // Section heading
  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-' + sectionId;
  heading.setAttribute('tabindex', '-1');
  // Find label
  var label = sectionId;
  for (var s = 0; s < MIGRATION_SECTIONS.length; s++) {
    if (MIGRATION_SECTIONS[s].id === sectionId) {
      label = MIGRATION_SECTIONS[s].label;
      break;
    }
  }
  heading.textContent = label;
  container.appendChild(heading);

  var items = getManifestItemsForSection(sectionId);

  // Zero-item section
  if (items.length === 0) {
    var emptyMsg = document.createElement('p');
    emptyMsg.style.opacity = '0.6';
    emptyMsg.style.fontStyle = 'italic';
    emptyMsg.textContent = 'No items found in this section.';
    container.appendChild(emptyMsg);
    return;
  }

  // Group by tier, render 3 -> 2 -> 1
  var groups = groupByTier(items);
  var tiers = [3, 2, 1];

  for (var ti = 0; ti < tiers.length; ti++) {
    var tier = tiers[ti];
    var tierItems = groups[tier];
    if (!tierItems || tierItems.length === 0) continue;

    var tierDiv = document.createElement('div');
    tierDiv.className = 'tier-group';
    tierDiv.setAttribute('data-tier', tier);

    // Separate decided and undecided items
    var decided = [];
    var undecided = [];
    // For tier 1, also track overrides (excluded auto-includes)
    var overrides = [];

    for (var ii = 0; ii < tierItems.length; ii++) {
      var item = tierItems[ii];
      if (isItemDecided(item)) {  // user has acted on this item
        if (tier === 1 && getSnapshotInclude(item.key) === false) {
          overrides.push(item);
        } else {
          decided.push(item);
        }
      } else {
        undecided.push(item);
      }
    }

    // Tier header
    var tierLabel = tier === 3 ? 'Flagged' : tier === 2 ? 'Needs decision' : 'Auto-included';
    var tierHeader = document.createElement('div');
    tierHeader.className = 'tier-group-header';
    tierHeader.setAttribute('role', 'button');
    tierHeader.setAttribute('aria-expanded', 'true');

    var expandKey = sectionId + '-' + tier;
    // Tier 1 collapsed by default unless previously expanded
    var isExpanded = App.tierExpanded[expandKey];
    if (isExpanded === undefined) {
      isExpanded = (tier !== 1);
    }
    tierHeader.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

    var indicator = document.createElement('span');
    indicator.className = 'tier-indicator tier-' + tier;
    tierHeader.appendChild(indicator);

    var headerText = document.createElement('span');
    headerText.textContent = tierLabel + ' (' + tierItems.length + ')';
    tierHeader.appendChild(headerText);

    // Toggle expand/collapse
    tierHeader.onclick = (function(key, headerEl) {
      return function() {
        var expanded = headerEl.getAttribute('aria-expanded') === 'true';
        App.tierExpanded[key] = !expanded;
        headerEl.setAttribute('aria-expanded', !expanded ? 'true' : 'false');
        var itemsContainer = headerEl.nextElementSibling;
        // Skip the tier1-summary if it exists
        while (itemsContainer && !itemsContainer.classList.contains('tier-group-items')) {
          itemsContainer = itemsContainer.nextElementSibling;
        }
        if (itemsContainer) {
          if (!expanded) {
            itemsContainer.classList.remove('collapsed');
          } else {
            itemsContainer.classList.add('collapsed');
          }
        }
        // Expanding tier 1 transitions to in-progress
        if (!expanded && tier === 1) {
          var currentState = App.reviewStates[sectionId];
          if (currentState === 'unreviewed' || !currentState) {
            App.reviewStates[sectionId] = 'in-progress';
            updateSidebarDot(sectionId);
            updateProgressBar();
          }
        }
      };
    })(expandKey, tierHeader);

    tierHeader.setAttribute('tabindex', '0');
    tierHeader.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });

    tierDiv.appendChild(tierHeader);

    // Tier 1 summary line (shown when collapsed)
    if (tier === 1 && !isExpanded && undecided.length > 0) {
      var summary = document.createElement('div');
      summary.className = 'tier1-summary';
      summary.textContent = undecided.length + ' standard item' +
        (undecided.length !== 1 ? 's' : '') + ' auto-included';
      summary.onclick = function() { tierHeader.click(); };
      tierDiv.appendChild(summary);
    }

    // Overrides surface above collapsed tier-1 items
    if (tier === 1 && overrides.length > 0) {
      for (var oi = 0; oi < overrides.length; oi++) {
        tierDiv.appendChild(buildDecidedCard(overrides[oi], false));
      }
    }

    // Items container
    var itemsDiv = document.createElement('div');
    itemsDiv.className = 'tier-group-items';
    if (!isExpanded) itemsDiv.classList.add('collapsed');

    // Show decided items first (collapsed cards)
    for (var di = 0; di < decided.length; di++) {
      itemsDiv.appendChild(buildDecidedCard(decided[di], getSnapshotInclude(decided[di].key)));
    }

    // Show undecided items (full cards)
    for (var ui = 0; ui < undecided.length; ui++) {
      itemsDiv.appendChild(buildTriageCard(undecided[ui]));
    }

    tierDiv.appendChild(itemsDiv);
    container.appendChild(tierDiv);
  }

  // Section footer
  var footer = document.createElement('div');
  footer.className = 'section-footer';

  var decidedCount = 0;
  for (var fc = 0; fc < items.length; fc++) {
    if (isItemDecided(items[fc])) decidedCount++;
  }

  var statsSpan = document.createElement('span');
  statsSpan.className = 'section-stats';
  statsSpan.textContent = decidedCount + ' / ' + items.length + ' decided';
  footer.appendChild(statsSpan);

  var reviewBtn = document.createElement('button');
  reviewBtn.type = 'button';
  reviewBtn.className = 'mark-reviewed-btn';
  var isReviewed = App.reviewStates[sectionId] === 'reviewed';
  if (isReviewed) {
    reviewBtn.classList.add('reviewed');
    reviewBtn.textContent = '✓ Reviewed';
  } else {
    reviewBtn.textContent = 'Mark section reviewed';
  }
  reviewBtn.setAttribute('aria-label', isReviewed ?
    label + ' section reviewed' : 'Mark ' + label + ' section reviewed');
  reviewBtn.onclick = function() {
    if (App.mode === 'static') return;
    App.reviewStates[sectionId] = 'reviewed';
    updateSidebarDot(sectionId);
    updateProgressBar();
    renderTriageSection(sectionId);
    // Re-show the section
    var sec = document.getElementById('section-' + sectionId);
    if (sec) sec.classList.add('active');
  };
  footer.appendChild(reviewBtn);
  container.appendChild(footer);
}

// ── Apply Rebuild Response (Phase 5 calls this) ──
function applyRebuildResponse(data) {
  App.snapshot = data.snapshot;
  App.containerfile = data.containerfile;
  App.renderId = data.render_id;
  App.revision = data.revision;
  App.triageManifest = data.triage_manifest;

  // Check inventory changes for review state
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked) return;
    var items = getManifestItemsForSection(section.id);
    var keys = [];
    for (var k = 0; k < items.length; k++) {
      keys.push(items[k].key + ':' + items[k].tier);
    }
    keys.sort();
    var newInventory = keys.join(',');
    var oldInventory = App.prevInventories[section.id] || '';

    if (newInventory !== oldInventory && App.reviewStates[section.id] === 'reviewed') {
      App.reviewStates[section.id] = 'in-progress';
    }
    App.prevInventories[section.id] = newInventory;

    // Zero-item auto-complete
    if (items.length === 0) {
      App.reviewStates[section.id] = 'reviewed';
    }
  });

  renderAllSections();
  renderContainerfilePreview();
  resetChangeCounter();
}

// ── Editor (Task 5.1) ──
// ── Editor State ──
var editorInstance = null;
var currentEditorFile = null;
var autosaveTimer = null;
var autosaveHadFailure = false;

var editorState = {
  mode: 'empty',  // 'empty' | 'readonly' | 'editing-clean' | 'editing-dirty'
  activeTab: 'config',
  files: {config: [], 'drop-in': [], quadlet: []},
  tabState: {
    config:    {selectedPath: null, scrollTop: 0},
    'drop-in': {selectedPath: null, scrollTop: 0},
    quadlet:   {selectedPath: null, scrollTop: 0}
  },
  pendingNavAction: null
};

function collectEditorFiles() {
  var snap = App.snapshot;
  var files = {config: [], 'drop-in': [], quadlet: []};

  if (snap.config && snap.config.files) {
    for (var i = 0; i < snap.config.files.length; i++) {
      var f = snap.config.files[i];
      var content = f.content || '';
      files.config.push({
        path: f.path || f.name, family: 'config', ref: f,
        originalContent: content, savedContent: content, bufferContent: content
      });
    }
  }

  if (snap.services && snap.services.drop_ins) {
    for (var j = 0; j < snap.services.drop_ins.length; j++) {
      var d = snap.services.drop_ins[j];
      var dc = d.content || '';
      files['drop-in'].push({
        path: d.path || d.name, family: 'drop-in', ref: d,
        originalContent: dc, savedContent: dc, bufferContent: dc
      });
    }
  }

  if (snap.containers && snap.containers.quadlet_units) {
    for (var k = 0; k < snap.containers.quadlet_units.length; k++) {
      var q = snap.containers.quadlet_units[k];
      var qc = q.content || '';
      files.quadlet.push({
        path: q.path || q.name, family: 'quadlet', ref: q,
        originalContent: qc, savedContent: qc, bufferContent: qc
      });
    }
  }

  return files;
}

function findFileByPath(path) {
  var families = ['config', 'drop-in', 'quadlet'];
  for (var i = 0; i < families.length; i++) {
    var list = editorState.files[families[i]];
    for (var j = 0; j < list.length; j++) {
      if (list[j].path === path) return list[j];
    }
  }
  return null;
}

function isFileDirty(file) { return file.bufferContent !== file.savedContent; }
function isFileModified(file) { return file.savedContent !== file.originalContent; }
function isAnyFileModifiedInFamily(family) {
  var list = editorState.files[family];
  for (var i = 0; i < list.length; i++) {
    if (isFileModified(list[i])) return true;
  }
  return false;
}

function announceEditor(message) {
  var live = document.getElementById('editor-live');
  if (live) live.textContent = message;
}

// ── Persistence helpers ──
// All save-like transitions must route through this to ensure durable persistence.
function persistSave(file) {
  file.savedContent = file.bufferContent;
  file.ref.content = file.savedContent;
  scheduleAutosave();
}

function persistRevert(file) {
  file.savedContent = file.originalContent;
  file.bufferContent = file.originalContent;
  file.ref.content = file.originalContent;
  scheduleAutosave();
}

// ── File path display helper ──
function buildPathDisplay(filePath) {
  var container = document.createElement('div');
  container.className = 'file-path-display';
  var lastSlash = filePath.lastIndexOf('/');
  if (lastSlash >= 0) {
    var dirPart = document.createElement('span');
    dirPart.style.opacity = '0.6';
    dirPart.textContent = filePath.substring(0, lastSlash + 1);
    container.appendChild(dirPart);
    var namePart = document.createElement('span');
    namePart.style.fontWeight = '600';
    namePart.textContent = filePath.substring(lastSlash + 1);
    container.appendChild(namePart);
  } else {
    container.textContent = filePath;
  }
  return container;
}

// ── Content pane state machine ──
function showEmptyState() {
  editorState.mode = 'empty';
  currentEditorFile = null;
  var pane = document.getElementById('editor-content-pane');
  if (!pane) return;
  pane.innerHTML = '';
  var empty = document.createElement('div');
  empty.className = 'editor-empty';
  empty.textContent = 'Select a file to view';

}

function showFileReadOnly(file) {
  syncEditorBuffer();
  if (editorInstance) {
    editorInstance = null;
  }

  editorState.mode = 'readonly';
  currentEditorFile = file;
  editorState.tabState[file.family].selectedPath = file.path;
  updateFileListSelection(file.path);

  var pane = document.getElementById('editor-content-pane');
  if (!pane) return;
  pane.innerHTML = '';

  // Toolbar with path + Edit button
  var toolbar = document.createElement('div');
  toolbar.className = 'editor-toolbar';
  toolbar.appendChild(buildPathDisplay(file.path));

  var actions = document.createElement('div');
  actions.className = 'toolbar-actions';
  var editBtn = document.createElement('button');
  editBtn.className = 'btn-edit';
  editBtn.textContent = 'Edit';
  editBtn.id = 'editor-edit-btn';

  if (App.mode === 'static') {
    editBtn.disabled = true;
    editBtn.setAttribute('aria-disabled', 'true');
    editBtn.title = 'Editing requires refine mode. Run: inspectah refine <tarball>';
  } else {
    editBtn.onclick = function() { enterEditMode(); };
  }
  actions.appendChild(editBtn);
  toolbar.appendChild(actions);
  pane.appendChild(toolbar);

  // Read-only content
  var content = document.createElement('pre');
  content.className = 'editor-readonly-content';

  content.id = 'editor-readonly-content';
  pane.appendChild(content);

  editBtn.focus();
  announceEditor(file.path.split('/').pop() + ' selected');
