    // seport-PROTO-PORT
    var seportSuffix = key.substring(7);
    if (snap.selinux && snap.selinux.port_labels) {
      for (var spi = 0; spi < snap.selinux.port_labels.length; spi++) {
        var sp = snap.selinux.port_labels[spi];
        if (sp.protocol + '-' + sp.port === seportSuffix) {
          sp.include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('semod-') === 0) {
    // semod is custom_modules which is []string - no include field to set
    // No-op for now
  } else if (key.indexOf('sysctl-') === 0) {
    var sysKey = key.substring(7);
    if (snap.kernel_boot && snap.kernel_boot.sysctl_overrides) {
      for (var ski = 0; ski < snap.kernel_boot.sysctl_overrides.length; ski++) {
        if (snap.kernel_boot.sysctl_overrides[ski].key === sysKey) {
          snap.kernel_boot.sysctl_overrides[ski].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('kmod-') === 0) {
    var modName = key.substring(5);
    if (snap.kernel_boot && snap.kernel_boot.non_default_modules) {
      for (var ki = 0; ki < snap.kernel_boot.non_default_modules.length; ki++) {
        if (snap.kernel_boot.non_default_modules[ki].name === modName) {
          snap.kernel_boot.non_default_modules[ki].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('conn-') === 0) {
    var connName = key.substring(5);
    if (snap.network && snap.network.connections) {
      for (var coi = 0; coi < snap.network.connections.length; coi++) {
        if (snap.network.connections[coi].name === connName) {
          snap.network.connections[coi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('fw-') === 0) {
    var fwName = key.substring(3);
    if (snap.network && snap.network.firewall_zones) {
      for (var fi = 0; fi < snap.network.firewall_zones.length; fi++) {
        if (snap.network.firewall_zones[fi].name === fwName) {
          snap.network.firewall_zones[fi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('fstab-') === 0) {
    var mountPoint = key.substring(6);
    if (snap.storage && snap.storage.fstab_entries) {
      for (var fsi = 0; fsi < snap.storage.fstab_entries.length; fsi++) {
        if (snap.storage.fstab_entries[fsi].mount_point === mountPoint) {
          snap.storage.fstab_entries[fsi].include = include;
          return;
        }
      }
    }
  } else if (key.indexOf('secret-') === 0) {
    // Secrets are redaction entries — no include field on the redaction itself.
    // Look up the backing config file via source_path from the triage manifest.
    var manifest = App.triageManifest || [];
    for (var si = 0; si < manifest.length; si++) {
      if (manifest[si].key === key && manifest[si].source_path) {
        var srcPath = manifest[si].source_path;
        if (snap.config && snap.config.files) {
          for (var sci = 0; sci < snap.config.files.length; sci++) {
            if (snap.config.files[sci].path === srcPath) {
              snap.config.files[sci].include = include;
              return;
            }
          }
        }
      }
    }
  }
}

// ── Version Changes Detail Section ──
function renderVersionChangesSection() {
  var container = document.getElementById('section-version-changes');
  if (!container) return;
  container.innerHTML = '';

  var snap = App.snapshot;
  var changes = (snap.rpm && snap.rpm.version_changes) ? snap.rpm.version_changes : [];

  // If no version changes, hide the sidebar entry and bail
  if (changes.length === 0) {
    var navLink = document.querySelector('[data-section="version-changes"]');
    if (navLink) navLink.parentElement.style.display = 'none';
    return;
  }

  // Heading
  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-version-changes';
  heading.setAttribute('tabindex', '-1');
  heading.textContent = 'Package Version Changes (' + changes.length + ')';
  container.appendChild(heading);

  // Subtitle
  var subtitle = document.createElement('p');
  subtitle.className = 'vc-section-subtitle';
  subtitle.textContent = 'Packages with version differences between your host and the target base image';
  container.appendChild(subtitle);

  // Count upgrades/downgrades for filter labels
  var upgradeCount = 0;
  var downgradeCount = 0;
  for (var c = 0; c < changes.length; c++) {
    if (changes[c].direction === 'upgrade') upgradeCount++;
    else if (changes[c].direction === 'downgrade') downgradeCount++;
  }

  // Filter bar
  var filterBar = document.createElement('div');
  filterBar.className = 'vc-filter-bar';

  var filterGroup = document.createElement('div');
  filterGroup.setAttribute('role', 'radiogroup');
  filterGroup.setAttribute('aria-label', 'Filter version changes');

  var filters = [
    {value: 'all', label: 'All (' + changes.length + ')'},
    {value: 'upgrade', label: 'Upgrades (' + upgradeCount + ')'},
    {value: 'downgrade', label: 'Downgrades (' + downgradeCount + ')'}
  ];

  for (var fi = 0; fi < filters.length; fi++) {
    var radio = document.createElement('button');
    radio.type = 'button';
    radio.setAttribute('role', 'radio');
    radio.setAttribute('aria-checked', fi === 0 ? 'true' : 'false');
    radio.setAttribute('data-filter', filters[fi].value);
    radio.tabIndex = fi === 0 ? 0 : -1;
    radio.textContent = filters[fi].label;
    radio.onclick = function() {
      var radios = filterGroup.querySelectorAll('[role="radio"]');
      for (var ri = 0; ri < radios.length; ri++) {
        radios[ri].setAttribute('aria-checked', 'false');
        radios[ri].tabIndex = -1;
      }
      this.setAttribute('aria-checked', 'true');
      this.tabIndex = 0;
      applyVersionFilter(this.dataset.filter);
    };
    filterGroup.appendChild(radio);
  }

  // ARIA-compliant radio-group keyboard model: arrow keys move AND select
  filterGroup.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      e.preventDefault();
      var radios = filterGroup.querySelectorAll('[role="radio"]');
      var current = filterGroup.querySelector('[aria-checked="true"]');
      var idx = Array.prototype.indexOf.call(radios, current);
      var next = e.key === 'ArrowRight'
        ? (idx + 1) % radios.length
        : (idx - 1 + radios.length) % radios.length;
      radios[idx].setAttribute('aria-checked', 'false');
      radios[idx].tabIndex = -1;
      radios[next].setAttribute('aria-checked', 'true');
      radios[next].tabIndex = 0;
      radios[next].focus();
      applyVersionFilter(radios[next].dataset.filter);
    }
  });

  filterBar.appendChild(filterGroup);
  container.appendChild(filterBar);

  // Table
  var tableWrap = document.createElement('div');
  tableWrap.className = 'vc-detail-table-wrap';

  var table = document.createElement('table');
  table.className = 'vc-detail-table';
  table.id = 'vc-detail-table';

  // Table header
  var thead = document.createElement('thead');
  var headerRow = document.createElement('tr');
  var cols = ['Package', 'Your Host', '', 'Target Image', 'Change'];
  for (var hi = 0; hi < cols.length; hi++) {
    var th = document.createElement('th');
    th.setAttribute('scope', 'col');
    if (hi === 2) {
      th.className = 'vc-arrow-col';
      th.setAttribute('aria-hidden', 'true');
    }
    th.textContent = cols[hi];
    headerRow.appendChild(th);
  }
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Table body
  var tbody = document.createElement('tbody');
  tbody.id = 'vc-detail-tbody';

  // Sort: downgrades first, then upgrades, alphabetical within each
  var sorted = changes.slice().sort(function(a, b) {
    if (a.direction === 'downgrade' && b.direction !== 'downgrade') return -1;
    if (a.direction !== 'downgrade' && b.direction === 'downgrade') return 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  for (var si = 0; si < sorted.length; si++) {
    var item = sorted[si];
    var tr = document.createElement('tr');
    tr.setAttribute('data-vc-direction', item.direction || 'unknown');

    // Package name
    var tdName = document.createElement('td');
    tdName.textContent = item.name || '';
    tr.appendChild(tdName);

    // Host version
    var tdHost = document.createElement('td');
    tdHost.textContent = item.host_version || '';
    tr.appendChild(tdHost);

    // Arrow
    var tdArrow = document.createElement('td');
    tdArrow.className = 'vc-arrow-col';
    tdArrow.setAttribute('aria-hidden', 'true');
    tdArrow.textContent = '→';
    tr.appendChild(tdArrow);

    // Target version (base image)
    var tdTarget = document.createElement('td');
    tdTarget.textContent = item.base_version || '';
    tr.appendChild(tdTarget);

    // Change direction
    var tdChange = document.createElement('td');
    var changeLabel = item.direction === 'upgrade' ? 'Upgrade' : 'Downgrade';
    tdChange.className = item.direction === 'upgrade' ? 'vc-dir-upgrade' : 'vc-dir-downgrade';
    tdChange.textContent = changeLabel;
    tr.appendChild(tdChange);

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  tableWrap.appendChild(table);
  container.appendChild(tableWrap);
}

function applyVersionFilter(filter) {
  var tbody = document.getElementById('vc-detail-tbody');
  if (!tbody) return;

  var rows = tbody.querySelectorAll('tr[data-vc-direction]');
  var visibleCount = 0;

  for (var i = 0; i < rows.length; i++) {
    var dir = rows[i].getAttribute('data-vc-direction');
    if (filter === 'all' || dir === filter) {
      rows[i].style.display = '';
      visibleCount++;
    } else {
      rows[i].style.display = 'none';
    }
  }

  // Remove any existing empty-state row
  var existingEmpty = tbody.querySelector('.vc-empty-row');
  if (existingEmpty) {
    tbody.removeChild(existingEmpty);
  }

  // If filter returns zero results, show empty state
  if (visibleCount === 0 && filter !== 'all') {
    var emptyRow = document.createElement('tr');
    emptyRow.className = 'vc-empty-row';
    var emptyTd = document.createElement('td');
    emptyTd.setAttribute('colspan', '5');
    var label = filter === 'downgrade' ? 'downgrades' : 'upgrades';
    emptyTd.textContent = 'No ' + label + ' detected.';
    emptyRow.appendChild(emptyTd);
    tbody.appendChild(emptyRow);
  }
}

// ── Section Renderers ──
function renderAllSections() {
  var main = document.getElementById('main-content');
  if (!main) return;

  // Remove existing sections but keep the static banner if present
  var banner = document.getElementById('static-banner');
  var children = main.querySelectorAll('.report-section');
  for (var i = 0; i < children.length; i++) {
    main.removeChild(children[i]);
  }

  // Create section containers
  MIGRATION_SECTIONS.forEach(function(section) {
    var div = document.createElement('div');
    div.className = 'report-section';
    div.id = 'section-' + section.id;
    main.appendChild(div);
  });

  // Render overview
  renderOverview();

  // Render each triage section and set initial review states
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked && !section.countBadge) return;
    renderTriageSection(section.id);
  });

  // Render editor section (hidden until refine mode activates it)
  renderEditorSection();

  // Render version changes detail section (informational, not tracked)
  renderVersionChangesSection();

  // Initialize review states for zero-item sections
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked) return;
    var items = getManifestItemsForSection(section.id);
    // Store inventory for rebuild comparison
    var keys = [];
    for (var k = 0; k < items.length; k++) {
      keys.push(items[k].key + ':' + items[k].tier);
    }
    keys.sort();
    App.prevInventories[section.id] = keys.join(',');

    // Auto-complete zero-item sections
    if (items.length === 0 && !App.reviewStates[section.id]) {
      App.reviewStates[section.id] = 'reviewed';
      updateSidebarDot(section.id);
    } else if (!App.reviewStates[section.id]) {
      App.reviewStates[section.id] = 'unreviewed';
    }
  });

  updateProgressBar();
  updateAllBadges();

  // Show the active section
  navigateTo(App.activeSection);

  // If static mode, disable buttons after rendering
  if (App.mode === 'static') {
    disableAllDecisionButtons();
  }
}

// ── Third-party repo detection (JS-side) ──
function isThirdPartyRepoJS(repoName) {
  var standard = ['baseos', 'appstream', 'rhel', 'fedora', 'crb', 'codeready'];
  var lower = repoName.toLowerCase();
  for (var i = 0; i < standard.length; i++) {
    if (lower.indexOf(standard[i]) !== -1) return false;
  }
  return true;
}

// ── Informational Wrapper Builder ──
function buildInformationalWrapper(items, sectionId) {
  var wrapper = document.createElement('div');
  wrapper.className = 'info-wrapper collapsed';

  var header = document.createElement('button');
  header.className = 'info-wrapper-header';
  header.setAttribute('aria-expanded', 'false');
  header.innerHTML = '<span class="tier-chevron">&#9656;</span> Informational — ' + items.length + ' item' + (items.length !== 1 ? 's' : '');

  var body = document.createElement('div');
  body.className = 'info-wrapper-body';
  body.hidden = true;

  header.onclick = function() {
    var expanded = body.hidden;
    body.hidden = !expanded;
    header.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    wrapper.classList.toggle('collapsed', !expanded);
    var chevron = header.querySelector('.tier-chevron');
    if (chevron) chevron.classList.toggle('expanded', expanded);
  };

  wrapper.appendChild(header);
  wrapper.appendChild(body);

  // Render each informational item as read-only (no toggles, no decision buttons)
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var card = buildInfoReadOnlyCard(item);
    body.appendChild(card);
  }

  return wrapper;
}

// ── Read-only card for informational wrapper items ──
function buildInfoReadOnlyCard(item) {
  var card = document.createElement('div');
  card.className = 'triage-card tier-' + item.tier + ' info-readonly';
  card.setAttribute('data-key', item.key);
  card.style.opacity = '0.85';

  // Name
  var nameEl = document.createElement('div');
  nameEl.className = 'card-name';
  nameEl.textContent = item.name || item.key;

  // Meta
  if (item.meta) {
    var metaEl = document.createElement('div');
    metaEl.className = 'card-meta';
    metaEl.textContent = item.meta;

  // Reason / guidance text

    reasonEl.className = 'card-reason';
    reasonEl.textContent = item.reason;
    card.appendChild(reasonEl);
  }

}

// ── View Contents Button ──
// Returns a "View contents" button for config file items that have
// content in the snapshot, or null if not applicable.
function buildViewContentsButton(item) {
  if (item.key.indexOf('cfg-') !== 0) return null;
  var cfgPath = item.key.substring(4);
  var snap = App.snapshot;
  if (!snap || !snap.config || !snap.config.files) return null;
  var fileEntry = null;
  for (var i = 0; i < snap.config.files.length; i++) {
    if (snap.config.files[i].path === cfgPath) {
      fileEntry = snap.config.files[i];
      break;
    }
  }
  if (!fileEntry || !fileEntry.content) return null;

  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'view-contents-btn';
  btn.textContent = 'View contents';
  btn.setAttribute('aria-label', 'View contents of ' + cfgPath);
  btn.onclick = function(e) {
    e.stopPropagation();
    openFileViewer(cfgPath, fileEntry.content, btn);
  };
  return btn;
}

// ── File Viewer Modal ──
function openFileViewer(filePath, content, returnFocusEl) {
  // Remove any existing viewer
  var existing = document.getElementById('file-viewer-modal');
  if (existing) existing.remove();

  var backdrop = document.createElement('div');
  backdrop.className = 'file-viewer-backdrop';
  backdrop.id = 'file-viewer-modal';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', 'File contents: ' + filePath);

  var content_div = document.createElement('div');
  content_div.className = 'file-viewer-content';

  var header = document.createElement('div');
  header.className = 'file-viewer-header';

  var title = document.createElement('h3');
  title.textContent = filePath;
  header.appendChild(title);

  var closeBtn = document.createElement('button');
  closeBtn.className = 'file-viewer-close';
  closeBtn.type = 'button';
  closeBtn.setAttribute('aria-label', 'Close');
  closeBtn.textContent = '✕';
  header.appendChild(closeBtn);

  content_div.appendChild(header);

  var body = document.createElement('pre');
  body.className = 'file-viewer-body';
  var code = document.createElement('code');
  code.textContent = content;
  body.appendChild(code);
  content_div.appendChild(body);

  backdrop.appendChild(content_div);
  document.body.appendChild(backdrop);

  function closeViewer() {
    var modal = document.getElementById('file-viewer-modal');
    if (modal) modal.remove();
    if (returnFocusEl) returnFocusEl.focus();
  }

  closeBtn.onclick = closeViewer;
  backdrop.addEventListener('click', function(e) {
    if (e.target === backdrop) closeViewer();
  });
  document.addEventListener('keydown', function handler(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeViewer();
      document.removeEventListener('keydown', handler);
    }
  });

  // Focus trap
  closeBtn.focus();
  var focusable = content_div.querySelectorAll('button, [tabindex]');
  content_div.addEventListener('keydown', function(e) {
    if (e.key !== 'Tab') return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  });
}

// ── Informational Tier Builder ──
// Replaces buildInformationalWrapper with a structured, category-grouped tier.
function buildInformationalTier(items, sectionId) {
  var tier = document.createElement('div');
  tier.className = 'info-tier';

  // Tier header (collapsed by default)
  var expandKey = sectionId + '-info';
  var isExpanded = App.tierExpanded[expandKey] || false;

  var tierHeader = document.createElement('div');
  tierHeader.className = 'info-tier-header';
  tierHeader.setAttribute('role', 'button');
  tierHeader.setAttribute('tabindex', '0');
  tierHeader.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

  var chevron = document.createElement('span');
  chevron.className = 'tier-chevron' + (isExpanded ? ' expanded' : '');
  chevron.textContent = '▸';
  chevron.setAttribute('aria-hidden', 'true');
  tierHeader.appendChild(chevron);

  var indicator = document.createElement('span');
  indicator.className = 'tier-indicator tier-info';
  tierHeader.appendChild(indicator);

  var headerText = document.createElement('span');
  headerText.textContent = 'Informational (' + items.length + ')';
  tierHeader.appendChild(headerText);
  chevron.setAttribute('aria-hidden', 'true');
  tierHeader.appendChild(chevron);

  tierHeader.onclick = function() {
    App.tierExpanded[expandKey] = !isExpanded;
    renderTriageSection(sectionId);
  };
  tierHeader.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      this.click();
    }
  });

  tier.appendChild(tierHeader);

  if (!isExpanded) return tier;

  // Category label mapping
  var CATEGORY_LABELS = {
    'sub:network': 'Network connections',
    'sub:firewall': 'Firewall zones',
    'sub:fstab': 'Filesystems',
    'sub:sysctl': 'Sysctl parameters',
    'sub:services-default': 'Default-state services',
    'sub:cron': 'Cron jobs',
    'sub:timers': 'Systemd timers'
  };

  // Group items by category
  var categories = {};
  for (var i = 0; i < items.length; i++) {
    var catKey = items[i].group || '';
    if (!categories[catKey]) categories[catKey] = [];
    categories[catKey].push(items[i]);
  }

  var catKeys = Object.keys(categories).sort();
  for (var c = 0; c < catKeys.length; c++) {
    var ck = catKeys[c];
    var catItems = categories[ck];
    var catLabel = CATEGORY_LABELS[ck] || (ck ? ck.replace(/^sub:/, '').charAt(0).toUpperCase() + ck.replace(/^sub:/, '').slice(1) : 'Other');

    var catDiv = document.createElement('div');
    catDiv.className = 'info-category';

    var catExpandKey = sectionId + '-infocat-' + ck;
    var catExpanded = App.tierExpanded[catExpandKey] || false;

    var catHeader = document.createElement('div');
    catHeader.className = 'info-category-header';
    catHeader.setAttribute('role', 'button');
    catHeader.setAttribute('tabindex', '0');
    catHeader.setAttribute('aria-expanded', catExpanded ? 'true' : 'false');

    var catChevron = document.createElement('span');
    catChevron.className = 'tier-chevron' + (catExpanded ? ' expanded' : '');
    catChevron.textContent = '▸';
    catChevron.setAttribute('aria-hidden', 'true');
    catHeader.appendChild(catChevron);

    var catText = document.createElement('span');
    catText.textContent = catLabel + ' (' + catItems.length + ')';
    catHeader.appendChild(catText);

    catHeader.onclick = (function(key, sid) {
      return function() {
        App.tierExpanded[key] = !App.tierExpanded[key];
        renderTriageSection(sid);
      };
    })(catExpandKey, sectionId);
    catHeader.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });

    catDiv.appendChild(catHeader);

    if (catExpanded) {
      var cardDiv = document.createElement('div');
      cardDiv.className = 'info-category-card';

      var table = document.createElement('table');
      table.className = 'info-category-table';

      for (var ci = 0; ci < catItems.length; ci++) {
        var tr = document.createElement('tr');
        var tdName = document.createElement('td');
        tdName.textContent = catItems[ci].name || catItems[ci].key;
        tr.appendChild(tdName);
        var tdMeta = document.createElement('td');
        tdMeta.textContent = catItems[ci].meta || '';
        tr.appendChild(tdMeta);
        table.appendChild(tr);
      }

      cardDiv.appendChild(table);
      catDiv.appendChild(cardDiv);
    }

    tier.appendChild(catDiv);
  }

  return tier;
}

// ── Modprobe.d informational accordion ──
// Shows modprobe.d policy files from the snapshot as a read-only
// accordion for hardware migration awareness.
function buildModprobeAccordion() {
  var snap = App.snapshot;
  if (!snap || !snap.kernel_boot || !snap.kernel_boot.modprobe_d) return null;
  var files = snap.kernel_boot.modprobe_d;
  if (files.length === 0) return null;

  var wrapper = document.createElement('div');
  wrapper.className = 'info-wrapper collapsed';
  wrapper.style.marginTop = '1rem';

  var header = document.createElement('button');
  header.className = 'info-wrapper-header';
  header.setAttribute('aria-expanded', 'false');
  header.innerHTML = '<span class="tier-chevron">&#9656;</span> Module policy files — ' +
    files.length + ' file' + (files.length !== 1 ? 's' : '');

  var body = document.createElement('div');
  body.className = 'info-wrapper-body';
  body.hidden = true;

  var subheader = document.createElement('p');
  subheader.style.fontSize = '12px';
  subheader.style.opacity = '0.6';
  subheader.style.margin = '0 0 8px 0';
  subheader.textContent = 'These modprobe configuration files will be included in the image via the config tree. Review if migrating to different hardware.';
  body.appendChild(subheader);

  var table = document.createElement('table');
  table.className = 'accordion-table';

  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var tr = document.createElement('tr');

    var tdPath = document.createElement('td');
    tdPath.textContent = f.path || '';
    tr.appendChild(tdPath);

    var tdMeta = document.createElement('td');
    tdMeta.className = 'accordion-meta';
    // Summarize directive types from the content
    var directives = summarizeModprobeDirectives(f.content || '');
    tdMeta.textContent = directives;
    tr.appendChild(tdMeta);

    table.appendChild(tr);
  }
  body.appendChild(table);

  header.onclick = function() {
    var expanded = body.hidden;
    body.hidden = !expanded;
    header.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    wrapper.classList.toggle('collapsed', !expanded);
    var chevron = header.querySelector('.tier-chevron');
    if (chevron) chevron.classList.toggle('expanded', expanded);
  };

  wrapper.appendChild(header);
  wrapper.appendChild(body);
  return wrapper;
}

// Summarize modprobe.d directive types (options, blacklist, install, etc.)
function summarizeModprobeDirectives(content) {
  var types = {};
  var lines = content.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].replace(/^\s+/, '');
    if (line === '' || line.charAt(0) === '#') continue;
    var keyword = line.split(/\s+/)[0];
    if (keyword) types[keyword] = (types[keyword] || 0) + 1;
  }
  var parts = [];
  for (var k in types) {
    if (types.hasOwnProperty(k)) {
      parts.push(k + ' (' + types[k] + ')');
    }
  }
  return parts.length > 0 ? parts.join(', ') : 'empty';
}

function renderTriageSection(sectionId) {
  var container = document.getElementById('section-' + sectionId);
  if (!container) return;
  container.innerHTML = '';

  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-' + sectionId;
  heading.setAttribute('tabindex', '-1');
  var label = sectionId;
  for (var s = 0; s < MIGRATION_SECTIONS.length; s++) {
    if (MIGRATION_SECTIONS[s].id === sectionId) {
      label = MIGRATION_SECTIONS[s].label;
      break;
    }
  }
  heading.textContent = label;

  if (sectionId === 'nonrpm') {
    var nrSnap = App.snapshot;
    var totalNr = 0, reviewedNr = 0;
    if (nrSnap && nrSnap.non_rpm_software && nrSnap.non_rpm_software.items) {
      totalNr = nrSnap.non_rpm_software.items.length;
      for (var nri = 0; nri < nrSnap.non_rpm_software.items.length; nri++) {
        var nrStatus = nrSnap.non_rpm_software.items[nri].review_status;
        if (nrStatus === 'reviewed' || nrStatus === 'migration_planned') reviewedNr++;
      }
    }
    heading.textContent = label + ' (' + reviewedNr + ' of ' + totalNr + ' reviewed)';
  }

  container.appendChild(heading);

  if (sectionId === 'nonrpm') {
    var snap = App.snapshot;
    if (!snap.non_rpm_software || !snap.non_rpm_software.items || snap.non_rpm_software.items.length === 0) {
      var emptyMsg = document.createElement('div');
      emptyMsg.style.cssText = 'padding:24px;text-align:center;opacity:0.6;font-size:14px;';
      if (snap.non_rpm_software) {
        emptyMsg.textContent = 'No non-RPM software detected.';
      } else {
        emptyMsg.textContent = 'Non-RPM scanning was not performed. Re-run inspectah to detect non-package software.';
      }
      container.appendChild(emptyMsg);
      return;
    }
  }

  var allItems = getManifestItemsForSection(sectionId);
  if (allItems.length === 0) {
    var emptyMsg = document.createElement('p');
    emptyMsg.style.opacity = '0.6';
    emptyMsg.style.fontStyle = 'italic';
    emptyMsg.textContent = 'No items found in this section.';
    container.appendChild(emptyMsg);
    return;
  }

  // ── Two-pass item splitting ──
  // Pass 1: Items that render in the main section (actionable + kmod display-only)
  // Pass 2: Items that render in the Informational wrapper (display_only, non-kmod)
  var mainItems = [];
  var informationalItems = [];
  for (var si = 0; si < allItems.length; si++) {
    var sItem = allItems[si];
    if (sItem.display_only && sItem.key.indexOf('kmod-') !== 0) {
      informationalItems.push(sItem);
    } else {
      mainItems.push(sItem);
    }
  }

  var groups = groupByTier(mainItems);

  // Split tier 2 into "Included" (default_include=true) and "Needs decision" (default_include=false)
  var tier2All = groups[2] || [];
  var tier2Included = [];
  var tier2NeedsDecision = [];
  for (var s = 0; s < tier2All.length; s++) {
    if (tier2All[s].default_include === false) {
      tier2NeedsDecision.push(tier2All[s]);
    } else {
      tier2Included.push(tier2All[s]);
    }
  }

  // Render order: Flagged → Needs Decision → Included → Auto-included
  var tierSlots = [
    { key: 3, items: groups[3] || [], label: 'Flagged', indicator: 'tier-3' },
    { key: '2-decide', items: tier2NeedsDecision, label: 'Needs decision', indicator: 'tier-2-decide' },
    { key: 2, items: tier2Included, label: 'Included', indicator: 'tier-2' },
    { key: 1, items: groups[1] || [], label: 'Auto-included', indicator: 'tier-1' }
  ];

  for (var ti = 0; ti < tierSlots.length; ti++) {
    var tier = tierSlots[ti].key;
    var tierItems = tierSlots[ti].items;
    if (tierItems.length === 0) continue;

    var tierDiv = document.createElement('div');
    tierDiv.className = 'tier-group';
    tierDiv.setAttribute('data-tier', String(tier));

    var tierLabel = tierSlots[ti].label;
    var tierHeader = document.createElement('div');
    tierHeader.className = 'tier-group-header';
    tierHeader.setAttribute('role', 'button');
    var expandKey = sectionId + '-' + tier;
    var isExpanded = App.tierExpanded[expandKey];
    if (isExpanded === undefined) isExpanded = (tier !== 1);
    tierHeader.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');

    var indicator = document.createElement('span');
    indicator.className = 'tier-indicator ' + tierSlots[ti].indicator;
    tierHeader.appendChild(indicator);
    var headerText = document.createElement('span');
    headerText.textContent = tierLabel + ' (' + tierItems.length + ')';
    tierHeader.appendChild(headerText);

    var tierChevron = document.createElement('span');
    tierChevron.className = 'tier-chevron' + (isExpanded ? ' expanded' : '');
    tierChevron.textContent = '▸';
    tierChevron.setAttribute('aria-hidden', 'true');
    tierHeader.appendChild(tierChevron);

    tierHeader.setAttribute('tabindex', '0');
    tierHeader.onclick = (function(key, sId, t) {
      return function() {
        var exp = App.tierExpanded[key];
        if (exp === undefined) exp = (t !== 1);
        App.tierExpanded[key] = !exp;
        renderTriageSection(sId);
        restoreFocus(sId, 'tier-header', String(t));
      };
    })(expandKey, sectionId, tier);
    tierHeader.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        this.click();
      }
    });

    tierDiv.appendChild(tierHeader);

    if (isExpanded) {
      var itemsDiv = document.createElement('div');
      itemsDiv.className = 'tier-group-items';

      // Separate grouped vs ungrouped items
      var groupedMap = {};
      var ungrouped = [];
      for (var i = 0; i < tierItems.length; i++) {
        var item = tierItems[i];
        if (item.group) {
          if (!groupedMap[item.group]) groupedMap[item.group] = [];
          groupedMap[item.group].push(item);
        } else {
          ungrouped.push(item);
        }
      }

      // Render ungrouped items first (individual cards)
      for (var u = 0; u < ungrouped.length; u++) {
        var card;
        var uItem = ungrouped[u];
        var uIsSecret = uItem.is_secret || uItem.section === 'secrets';
        if (uIsSecret) {
          // Secrets keep three-state card pattern (higher friction)
          if (isItemDecided(uItem)) {
            card = buildSecretDecidedCard(uItem);
          } else {
            card = buildSecretCard(uItem);
          }
        } else if (uItem.display_only) {
          // Display-only: no toggle, informational only
          card = buildInfoReadOnlyCard(uItem);
        } else if (uItem.card_type === 'notification') {
          // Notifications keep acknowledge pattern
          card = buildNotificationCard(uItem);
        } else {
          // Everything else: toggle card
          card = buildToggleCard(uItem, sectionId);
        }
        itemsDiv.appendChild(card);
      }

      // Render grouped items as accordions
      var groupNames = Object.keys(groupedMap).sort();
      for (var g = 0; g < groupNames.length; g++) {
        var gName = groupNames[g];
        var gItems = groupedMap[gName];
        var isDisplayOnlyGroup = gItems[0] && gItems[0].display_only;

        // Services summary bar: collapse sub:services-default into a compact bar
        if (gName === 'sub:services-default' && tier === 1) {
          itemsDiv.appendChild(buildServicesSummaryBar(gItems, sectionId));
          continue;
        }

        if (isDisplayOnlyGroup) {
          itemsDiv.appendChild(buildDisplayAccordion(gName, gItems));
        } else {
          var opts = {};
          // Check manifest-level always_included on the group's items
          var hasAlwaysIncluded = gItems[0] && gItems[0].always_included;
          if (gName.indexOf('base:') === 0) {
            // Base-image group: suppress toggles, label as "Base image"
            var baseRepo = gName.substring(5);
            opts.alwaysIncluded = true;
            opts.displayName = 'Base image (' + baseRepo + ')';
          } else if (gName.indexOf('user:') === 0) {
            // User-added repo group
            var userRepo = gName.substring(5);
            opts.displayName = userRepo;
            if (isThirdPartyRepoJS(userRepo)) {
              opts.badge = 'third-party';
            }
          } else if (gName.indexOf('repo:') === 0) {
            // Legacy repo: prefix fallback
            var repoName = gName.substring(5);
            opts.displayName = repoName;
            if (repoName === 'baseos' || repoName === 'BaseOS') {
              opts.alwaysIncluded = true;
            }
            if (isThirdPartyRepoJS(repoName)) {
              opts.badge = 'third-party';
            }
          }
          // Honor manifest-level always_included regardless of prefix
          if (hasAlwaysIncluded) {
            opts.alwaysIncluded = true;
          }
          itemsDiv.appendChild(buildOutputAccordion(gName, gItems, opts));
        }
      }

      tierDiv.appendChild(itemsDiv);
    }

    container.appendChild(tierDiv);
  }

  // ── Informational tier (non-kmod display-only items, category-grouped) ──
  if (informationalItems.length > 0) {
    container.appendChild(buildInformationalTier(informationalItems, sectionId));
  }

  // ── Modprobe.d informational accordion (system section only) ──
  if (sectionId === 'system') {
    var modprobeAccordion = buildModprobeAccordion();
    if (modprobeAccordion) {
      container.appendChild(modprobeAccordion);
    }
  }

  // Section footer (suppressed for nonrpm — uses its own review UX)
  if (sectionId !== 'nonrpm') {
  var footer = document.createElement('div');
  footer.className = 'section-footer';

  var decidedCount = 0;
  var accountableTotal = 0;
  for (var fc = 0; fc < allItems.length; fc++) {
    if (isPassiveItem(allItems[fc])) continue;
    accountableTotal++;
    if (isItemDecided(allItems[fc]) || (allItems[fc].display_only && getSnapshotAcknowledged(allItems[fc].key))) decidedCount++;
  }

  var statsSpan = document.createElement('span');
  statsSpan.className = 'section-stats';
  statsSpan.textContent = decidedCount + ' / ' + accountableTotal + ' decided';
  footer.appendChild(statsSpan);

  var reviewBtn = document.createElement('button');
  reviewBtn.type = 'button';
  reviewBtn.className = 'mark-reviewed-btn';
  var isReviewed = App.reviewStates[sectionId] === 'reviewed';
  if (isReviewed) {
    reviewBtn.classList.add('reviewed');
    reviewBtn.textContent = '✓ Reviewed';
  } else {
    reviewBtn.textContent = 'Mark section reviewed';
  }
  reviewBtn.setAttribute('aria-label', isReviewed ?
    label + ' section reviewed' : 'Mark ' + label + ' section reviewed');
  reviewBtn.onclick = function() {
    if (App.mode === 'static') return;
    App.reviewStates[sectionId] = 'reviewed';
    updateSidebarDot(sectionId);
    updateProgressBar();
    renderTriageSection(sectionId);
    var sec = document.getElementById('section-' + sectionId);
    if (sec) sec.classList.add('active');
  };
  footer.appendChild(reviewBtn);
  container.appendChild(footer);
  }

  // Store inventory for rebuild comparison
  var keys = [];
  for (var k = 0; k < allItems.length; k++) {
    keys.push(allItems[k].key + ':' + allItems[k].tier);
  }
  keys.sort();
  var newInv = keys.join(',');
  var oldInv = App.prevInventories[sectionId];
  if (oldInv && oldInv !== newInv && App.reviewStates[sectionId] === 'reviewed') {
    App.reviewStates[sectionId] = 'in-progress';
    updateSidebarDot(sectionId);
    updateProgressBar();
  }
  App.prevInventories[sectionId] = newInv;
}

// ── Preview Pane Splitter ──
(function() {
  var splitter = document.getElementById('preview-splitter');
  var previewPane = document.getElementById('preview-panel');
  var collapseBtn = document.getElementById('preview-collapse-btn');
  if (!splitter || !previewPane) return;

  var lastWidth = 360;

  // Click on collapsed splitter to expand
  splitter.addEventListener('click', function(e) {
    if (previewPane.classList.contains('collapsed')) {
      togglePreviewCollapse();
    }
  });

  // Pointer drag
  splitter.addEventListener('mousedown', function(e) {
    if (previewPane.classList.contains('collapsed')) return;
    e.preventDefault();
    var startX = e.clientX;
    var startWidth = previewPane.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(ev) {
      var newWidth = Math.min(Math.max(startWidth + (startX - ev.clientX), 200), window.innerWidth * 0.6);
      previewPane.style.width = newWidth + 'px';
      splitter.setAttribute('aria-valuenow', Math.round(newWidth));
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      lastWidth = previewPane.offsetWidth;
      savePreviewState();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Keyboard resize
  splitter.addEventListener('keydown', function(e) {
    if (previewPane.classList.contains('collapsed') && e.key !== 'Enter') return;
    var current = previewPane.offsetWidth;
    var step = 10;
    switch (e.key) {
      case 'ArrowLeft': current += step; break;
      case 'ArrowRight': current -= step; break;
      case 'Home': current = 200; break;
      case 'End': current = Math.round(window.innerWidth * 0.6); break;
      case 'Enter': togglePreviewCollapse(); return;
      default: return;
    }
    e.preventDefault();
    current = Math.min(Math.max(current, 200), window.innerWidth * 0.6);
    previewPane.style.width = current + 'px';
    splitter.setAttribute('aria-valuenow', Math.round(current));
    lastWidth = current;
    savePreviewState();
  });

  // localStorage persistence
  function savePreviewState() {
    try {
      localStorage.setItem('inspectah-preview-pane', JSON.stringify({
        width: previewPane.classList.contains('collapsed') ? lastWidth : previewPane.offsetWidth,
        collapsed: previewPane.classList.contains('collapsed')
      }));
    } catch (e) { /* localStorage unavailable */ }
  }

  function loadPreviewState() {
    try {
      var saved = JSON.parse(localStorage.getItem('inspectah-preview-pane'));
      if (saved) {
        lastWidth = saved.width || 360;
        if (!saved.collapsed) {
          previewPane.style.width = lastWidth + 'px';
          splitter.setAttribute('aria-valuenow', Math.round(lastWidth));
        } else {
          previewPane.style.width = lastWidth + 'px';
          togglePreviewCollapse();
        }
      }
    } catch (e) { /* fallback to defaults */ }
  }

  // Collapse / expand toggle
  window.togglePreviewCollapse = function() {
    var isCollapsed = previewPane.classList.contains('collapsed');
    if (isCollapsed) {
      // Expand
      previewPane.classList.remove('collapsed');
      splitter.classList.remove('collapsed');
      previewPane.style.width = lastWidth + 'px';
      splitter.setAttribute('aria-valuenow', Math.round(lastWidth));
      if (collapseBtn) {
        collapseBtn.setAttribute('aria-expanded', 'true');
        collapseBtn.setAttribute('aria-label', 'Collapse preview panel');
        collapseBtn.innerHTML = '&#x25B6;';
      }
      splitter.focus();
    } else {
      // Collapse
      lastWidth = previewPane.offsetWidth || lastWidth;
      previewPane.classList.add('collapsed');
      splitter.classList.add('collapsed');
      splitter.setAttribute('aria-valuenow', '0');
      if (collapseBtn) {
        collapseBtn.setAttribute('aria-expanded', 'false');
        collapseBtn.setAttribute('aria-label', 'Expand preview panel');
        collapseBtn.innerHTML = '&#x25C0;';
      }
      // Focus the splitter (visible separator with role="separator" and tabindex="0")
      // instead of the collapse button which is inside the zero-width hidden pane
      splitter.focus();
    }
    savePreviewState();
  };

  loadPreviewState();
})();

// ── Apply Rebuild Response (Phase 5 calls this) ──
function applyRebuildResponse(data) {
  App.snapshot = data.snapshot;
  App.containerfile = data.containerfile;
  App.renderId = data.render_id;
  App.revision = data.revision;
  App.triageManifest = data.triage_manifest;

  // Check inventory changes for review state
  MIGRATION_SECTIONS.forEach(function(section) {
    if (!section.tracked) return;
    var items = getManifestItemsForSection(section.id);
    var keys = [];
    for (var k = 0; k < items.length; k++) {
      keys.push(items[k].key + ':' + items[k].tier);
    }
    keys.sort();
    var newInventory = keys.join(',');
    var oldInventory = App.prevInventories[section.id] || '';

    if (newInventory !== oldInventory && App.reviewStates[section.id] === 'reviewed') {
      App.reviewStates[section.id] = 'in-progress';
    }
    App.prevInventories[section.id] = newInventory;

    // Zero-item auto-complete
    if (items.length === 0) {
      App.reviewStates[section.id] = 'reviewed';
    }
  });

  renderAllSections();
  renderContainerfilePreview();
  resetChangeCounter();
}

// ── Editor (Task 5.1) ──
// ── Editor State ──
var editorInstance = null;
var currentEditorFile = null;
var autosaveTimer = null;
var autosaveHadFailure = false;

var editorState = {
  mode: 'empty',  // 'empty' | 'readonly' | 'editing-clean' | 'editing-dirty'
  activeTab: 'config',
  files: {config: [], 'drop-in': [], quadlet: []},
  tabState: {
    config:    {selectedPath: null, scrollTop: 0},
    'drop-in': {selectedPath: null, scrollTop: 0},
    quadlet:   {selectedPath: null, scrollTop: 0}
  },
  pendingNavAction: null
};

function collectEditorFiles() {
  var snap = App.snapshot;
  var files = {config: [], 'drop-in': [], quadlet: []};

  if (snap.config && snap.config.files) {
    for (var i = 0; i < snap.config.files.length; i++) {
      var f = snap.config.files[i];
      var content = f.content || '';
      files.config.push({
        path: f.path || f.name, family: 'config', ref: f,
        originalContent: content, savedContent: content, bufferContent: content
      });
    }
  }

  if (snap.services && snap.services.drop_ins) {
    for (var j = 0; j < snap.services.drop_ins.length; j++) {
      var d = snap.services.drop_ins[j];
      var dc = d.content || '';
      files['drop-in'].push({
        path: d.path || d.name, family: 'drop-in', ref: d,
        originalContent: dc, savedContent: dc, bufferContent: dc
      });
    }
  }

  if (snap.containers && snap.containers.quadlet_units) {
    for (var k = 0; k < snap.containers.quadlet_units.length; k++) {
      var q = snap.containers.quadlet_units[k];
      var qc = q.content || '';
      files.quadlet.push({
        path: q.path || q.name, family: 'quadlet', ref: q,
        originalContent: qc, savedContent: qc, bufferContent: qc
      });
    }
  }

  return files;
}

function findFileByPath(path) {
  var families = ['config', 'drop-in', 'quadlet'];
  for (var i = 0; i < families.length; i++) {
    var list = editorState.files[families[i]];
    for (var j = 0; j < list.length; j++) {
      if (list[j].path === path) return list[j];
    }
  }
  return null;
}

function isFileDirty(file) { return file.bufferContent !== file.savedContent; }
function isFileModified(file) { return file.savedContent !== file.originalContent; }
function isAnyFileModifiedInFamily(family) {
  var list = editorState.files[family];
  for (var i = 0; i < list.length; i++) {
    if (isFileModified(list[i])) return true;
  }
  return false;
}

function announceEditor(message) {
  var live = document.getElementById('editor-live');
  if (live) live.textContent = message;
}

// ── Persistence helpers ──
// All save-like transitions must route through this to ensure durable persistence.
function persistSave(file) {
  file.savedContent = file.bufferContent;
  file.ref.content = file.savedContent;
  scheduleAutosave();
}

function persistRevert(file) {
  file.savedContent = file.originalContent;
  file.bufferContent = file.originalContent;
  file.ref.content = file.originalContent;
  scheduleAutosave();
}

// ── File path display helper ──
function buildPathDisplay(filePath) {
  var container = document.createElement('div');
  container.className = 'file-path-display';
  var lastSlash = filePath.lastIndexOf('/');
  if (lastSlash >= 0) {
    var dirPart = document.createElement('span');
    dirPart.style.opacity = '0.6';
    dirPart.textContent = filePath.substring(0, lastSlash + 1);
    container.appendChild(dirPart);
    var namePart = document.createElement('span');
    namePart.style.fontWeight = '600';
    namePart.textContent = filePath.substring(lastSlash + 1);
    container.appendChild(namePart);
  } else {
    container.textContent = filePath;
  }
  return container;
}

function showFileReadOnly(file) {
  syncEditorBuffer();
  if (editorInstance) {
    editorInstance = null;
  }

  editorState.mode = 'readonly';
  currentEditorFile = file;
  editorState.tabState[file.family].selectedPath = file.path;
  updateFileListSelection(file.path);

  var pane = document.getElementById('editor-content-pane');
  if (!pane) return;
  pane.innerHTML = '';

  // Toolbar with path + Edit button
  var toolbar = document.createElement('div');
  toolbar.className = 'editor-toolbar';
  toolbar.appendChild(buildPathDisplay(file.path));

  var actions = document.createElement('div');
  actions.className = 'toolbar-actions';
  var editBtn = document.createElement('button');
  editBtn.className = 'btn-edit';
  editBtn.textContent = 'Edit';
  editBtn.id = 'editor-edit-btn';

  if (App.mode === 'static') {
    editBtn.disabled = true;
    editBtn.setAttribute('aria-disabled', 'true');
    editBtn.title = 'Editing requires refine mode. Run: inspectah refine <tarball>';
  } else {
    editBtn.onclick = function() { enterEditMode(); };
  }
  actions.appendChild(editBtn);
  toolbar.appendChild(actions);
  pane.appendChild(toolbar);

  // Read-only content
  var content = document.createElement('pre');
  content.className = 'editor-readonly-content';
  content.textContent = file.savedContent;
  content.id = 'editor-readonly-content';
  pane.appendChild(content);

  editBtn.focus();
  announceEditor(file.path.split('/').pop() + ' selected');
}

function enterEditMode() {
  if (!currentEditorFile || App.mode === 'static') return;

  editorState.mode = 'editing-clean';
  currentEditorFile.bufferContent = currentEditorFile.savedContent;

  var pane = document.getElementById('editor-content-pane');
  if (!pane) return;
  pane.innerHTML = '';

  // Toolbar with Revert + Save
  var toolbar = document.createElement('div');
  toolbar.className = 'editor-toolbar';
  toolbar.id = 'editor-edit-toolbar';

  var pathDisplay = buildPathDisplay(currentEditorFile.path);
  var badge = document.createElement('span');
  badge.className = 'unsaved-badge';
  badge.id = 'editor-unsaved-badge';
  badge.textContent = 'unsaved';
  badge.style.display = 'none';
  pathDisplay.appendChild(badge);
  toolbar.appendChild(pathDisplay);

  var actions = document.createElement('div');
  actions.className = 'toolbar-actions';
  var revertBtn = document.createElement('button');
  revertBtn.className = 'btn-revert';
  revertBtn.textContent = 'Revert';
  revertBtn.onclick = function() { revertFile(); };
  actions.appendChild(revertBtn);

  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn-save';
  saveBtn.textContent = 'Save';
  saveBtn.id = 'editor-save-btn';
  saveBtn.disabled = true;
  saveBtn.onclick = function() { saveFileAndExit(); };
  actions.appendChild(saveBtn);

  toolbar.appendChild(actions);
  pane.appendChild(toolbar);

  // CodeMirror editor with low-precedence Escape handler
  var editorArea = document.createElement('div');
  editorArea.style.flex = '1';
  editorArea.style.overflow = 'auto';
  pane.appendChild(editorArea);

  var escapeExtension = CM.Prec.low(CM.keymap.of([{
    key: 'Escape',
    run: function() {
      handleEditorEscape();
      return true;
    }
  }]));

  editorInstance = CM.createEditor(editorArea, currentEditorFile.savedContent, {
    onChange: function(newContent) {
      if (!currentEditorFile) return;
      currentEditorFile.bufferContent = newContent;
      var isDirty = isFileDirty(currentEditorFile);
      if (isDirty && editorState.mode !== 'editing-dirty') {
        editorState.mode = 'editing-dirty';
        updateEditToolbarState();
      } else if (!isDirty && editorState.mode === 'editing-dirty') {
        editorState.mode = 'editing-clean';
        updateEditToolbarState();
      }
    },
    extensions: [escapeExtension]
  });

  announceEditor('Editing ' + currentEditorFile.path.split('/').pop());
}

function updateEditToolbarState() {
  var badge = document.getElementById('editor-unsaved-badge');
  var saveBtn = document.getElementById('editor-save-btn');
  var isDirty = editorState.mode === 'editing-dirty';
  if (badge) badge.style.display = isDirty ? '' : 'none';
  if (saveBtn) saveBtn.disabled = !isDirty;
}

function syncEditorBuffer() {
  if (editorInstance && currentEditorFile) {
    currentEditorFile.bufferContent = editorInstance.state.doc.toString();
  }
}

// Save checkpoint (Ctrl+S) — persist and stay in edit mode
function saveCheckpoint() {
  if (!currentEditorFile) return;
  syncEditorBuffer();
  persistSave(currentEditorFile);
  editorState.mode = 'editing-clean';
  updateEditToolbarState();
  updateFileModifiedDots();
  announceEditor(currentEditorFile.path.split('/').pop() + ' saved');
}

// Save and exit (toolbar Save button) — persist and return to read-only
function saveFileAndExit() {
  if (!currentEditorFile) return;
  syncEditorBuffer();
  persistSave(currentEditorFile);
  editorInstance = null;
  updateFileModifiedDots();
  announceEditor(currentEditorFile.path.split('/').pop() + ' saved');
  showFileReadOnly(currentEditorFile);
}

// Revert — full reset to originalContent, persist, return to read-only
function revertFile() {
  if (!currentEditorFile) return;
  persistRevert(currentEditorFile);
  editorInstance = null;
  updateFileModifiedDots();
  announceEditor(currentEditorFile.path.split('/').pop() + ' reverted to original');
  showFileReadOnly(currentEditorFile);
}

// Exit edit mode without saving (used by modal Discard and clean exits)
function exitEditModeClean() {
  if (editorInstance) {
    editorInstance = null;
  }
  editorState.mode = 'readonly';
}

function handleEditorEscape() {
  if (editorState.mode === 'editing-dirty') {
    editorState.pendingNavAction = function() {
      exitEditModeClean();
      showFileReadOnly(currentEditorFile);
    };
    showUnsavedModal();
  } else if (editorState.mode === 'editing-clean') {
    exitEditModeClean();
    showFileReadOnly(currentEditorFile);
  }
}

function handleFileClick(file) {
  if (file === currentEditorFile && editorState.mode !== 'empty') return;

  function doSwitch() {
    exitEditModeClean();
    showFileReadOnly(file);
  }

  if (editorState.mode === 'editing-dirty') {
    editorState.pendingNavAction = doSwitch;
    showUnsavedModal();
  } else {
    if (editorState.mode.startsWith('editing')) exitEditModeClean();
    showFileReadOnly(file);
  }
}

// ── Unsaved changes modal ──
function showUnsavedModal() {
  var file = currentEditorFile;
  if (!file) return;

  var backdrop = document.createElement('div');
  backdrop.className = 'editor-modal-backdrop';
  backdrop.id = 'editor-modal';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-labelledby', 'editor-modal-title');

  var modal = document.createElement('div');
  modal.className = 'editor-modal';

  var title = document.createElement('h3');
  title.id = 'editor-modal-title';
  title.textContent = 'Unsaved changes';
  modal.appendChild(title);

  var body = document.createElement('p');
  body.textContent = 'You have unsaved changes to ' + file.path.split('/').pop() + '. What would you like to do?';
  modal.appendChild(body);

  var actions = document.createElement('div');
  actions.className = 'editor-modal-actions';

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-modal-cancel';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = function() { dismissModal(false); };

  var discardBtn = document.createElement('button');
  discardBtn.className = 'btn-modal-discard';
  discardBtn.textContent = 'Discard';
  discardBtn.onclick = function() {
    // Drop buffer to savedContent (preserve checkpoint saves)
    currentEditorFile.bufferContent = currentEditorFile.savedContent;
    currentEditorFile.ref.content = currentEditorFile.savedContent;
    announceEditor('Changes discarded for ' + currentEditorFile.path.split('/').pop());
    dismissModal(true);
  };

  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn-modal-save';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = function() {
    syncEditorBuffer();
    persistSave(currentEditorFile);
    updateFileModifiedDots();
    announceEditor(currentEditorFile.path.split('/').pop() + ' saved');
    dismissModal(true);
  };

  actions.appendChild(cancelBtn);
  actions.appendChild(discardBtn);
  actions.appendChild(saveBtn);
  modal.appendChild(actions);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  cancelBtn.focus();

  var focusables = [cancelBtn, discardBtn, saveBtn];
  backdrop.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { e.preventDefault(); dismissModal(false); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      var idx = focusables.indexOf(document.activeElement);
      var next = e.shiftKey ? (idx - 1 + focusables.length) % focusables.length : (idx + 1) % focusables.length;
      focusables[next].focus();
    }
  });

  backdrop.addEventListener('click', function(e) {
    if (e.target === backdrop) dismissModal(false);
  });
}

function dismissModal(proceed) {
  var modal = document.getElementById('editor-modal');
  if (modal) modal.remove();

  if (proceed && editorState.pendingNavAction) {
    exitEditModeClean();
    var action = editorState.pendingNavAction;
    editorState.pendingNavAction = null;
    action();
  } else {
    editorState.pendingNavAction = null;
    if (editorInstance) editorInstance.focus();
  }
}

// ── Tab bar ──
function renderEditorTabBar(container) {
  var tablist = document.createElement('div');
  tablist.className = 'editor-tabs';
  tablist.setAttribute('role', 'tablist');
  tablist.setAttribute('aria-label', 'File categories');

  var tabs = [
    {id: 'config', label: 'Config', count: editorState.files.config.length},
    {id: 'drop-in', label: 'Drop-ins', count: editorState.files['drop-in'].length},
    {id: 'quadlet', label: 'Quadlets', count: editorState.files.quadlet.length}
  ];

  tabs.forEach(function(tab) {
    var btn = document.createElement('button');
    btn.className = 'editor-tab';
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', tab.id === editorState.activeTab ? 'true' : 'false');
    btn.setAttribute('aria-controls', 'editor-panel-' + tab.id);
    btn.setAttribute('tabindex', tab.id === editorState.activeTab ? '0' : '-1');
    btn.id = 'editor-tab-' + tab.id;
    btn.setAttribute('data-tab', tab.id);
    btn.textContent = tab.label + ' (' + tab.count + ')';

    if (isAnyFileModifiedInFamily(tab.id)) {
      var dot = document.createElement('span');
      dot.className = 'tab-dot';
      dot.setAttribute('aria-hidden', 'true');
      btn.appendChild(dot);
    }

    btn.onclick = function() { switchTab(tab.id); };
    tablist.appendChild(btn);
  });

  // Manual activation: Arrow/Home/End moves focus, Enter/Space activates
  tablist.addEventListener('keydown', function(e) {
    var tabBtns = Array.prototype.slice.call(tablist.querySelectorAll('[role="tab"]'));
    var idx = tabBtns.indexOf(document.activeElement);
    if (idx === -1) return;

    // Enter/Space activates the focused tab
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      var family = tabBtns[idx].getAttribute('data-tab');
      switchTab(family);
      return;
    }

    // Arrow/Home/End moves focus only (does not activate)
    var newIdx = idx;
    if (e.key === 'ArrowRight') newIdx = (idx + 1) % tabBtns.length;
    else if (e.key === 'ArrowLeft') newIdx = (idx - 1 + tabBtns.length) % tabBtns.length;
    else if (e.key === 'Home') newIdx = 0;
    else if (e.key === 'End') newIdx = tabBtns.length - 1;
    else return;
    e.preventDefault();
    tabBtns[idx].setAttribute('tabindex', '-1');
    tabBtns[newIdx].setAttribute('tabindex', '0');
    tabBtns[newIdx].focus();
  });

  container.appendChild(tablist);
}

function switchTab(family) {
  if (family === editorState.activeTab) return;

  var currentPanel = document.getElementById('editor-panel-' + editorState.activeTab);
  if (currentPanel) editorState.tabState[editorState.activeTab].scrollTop = currentPanel.scrollTop;

  function doSwitch() {
    editorState.activeTab = family;
    document.querySelectorAll('.editor-tab').forEach(function(t) {
      var isActive = t.getAttribute('data-tab') === family;
      t.setAttribute('aria-selected', isActive ? 'true' : 'false');
      t.setAttribute('tabindex', isActive ? '0' : '-1');
    });
    ['config', 'drop-in', 'quadlet'].forEach(function(f) {
      var p = document.getElementById('editor-panel-' + f);
      if (p) p.style.display = f === family ? '' : 'none';
    });

    renderEditorFileList(family);

    var savedPath = editorState.tabState[family].selectedPath;
    if (savedPath) {
      var file = findFileByPath(savedPath);
      if (file) { showFileReadOnly(file); return; }
    }

    showEmptyState();
    var fileItems = document.querySelectorAll('#editor-panel-' + family + ' [role="option"]');
    if (fileItems.length > 0) {
      fileItems[0].focus();
    } else {
      var tabBtn = document.getElementById('editor-tab-' + family);
      if (tabBtn) tabBtn.focus();
    }

    announceEditor('Showing ' + family + ' files, ' + editorState.files[family].length + ' files');
  }

  if (editorState.mode === 'editing-dirty') {
    editorState.pendingNavAction = doSwitch;
    showUnsavedModal();
  } else {
    if (editorState.mode.startsWith('editing')) exitEditModeClean();
    doSwitch();
  }
}

// ── File list rendering ──
function renderEditorFileList(family) {
  var panel = document.getElementById('editor-panel-' + family);
  if (!panel) return;
  panel.innerHTML = '';

  var files = editorState.files[family];
  if (files.length === 0) {
    var emptyMsg = document.createElement('div');
    emptyMsg.className = 'editor-tab-empty';
    var labels = {config: 'config files', 'drop-in': 'systemd drop-in files', quadlet: 'quadlet unit files'};
    emptyMsg.textContent = 'No ' + labels[family] + ' detected.';
    panel.appendChild(emptyMsg);
    return;
  }

  var list = document.createElement('div');
  list.className = 'editor-file-list';
  list.setAttribute('role', 'listbox');
  list.setAttribute('aria-label', family + ' files');

  var savedSelection = editorState.tabState[family].selectedPath;

  files.forEach(function(file, idx) {
    var item = document.createElement('div');
    item.className = 'editor-file-item';
    if (file.path === savedSelection) item.classList.add('selected');
    item.setAttribute('role', 'option');
    item.setAttribute('tabindex', idx === 0 ? '0' : '-1');
    item.setAttribute('aria-selected', file.path === savedSelection ? 'true' : 'false');
    item.setAttribute('data-file-path', file.path);

    if (isFileModified(file)) {
      item.setAttribute('aria-label', file.path.split('/').pop() + ', modified');
      var dot = document.createElement('span');
      dot.className = 'file-dot';
      dot.setAttribute('aria-hidden', 'true');
      item.appendChild(dot);
    }

    var pathSpan = document.createElement('span');
    pathSpan.className = 'file-full-path';
    pathSpan.textContent = file.path;
    item.appendChild(pathSpan);

    item.onclick = function() { handleFileClick(file); };
    list.appendChild(item);
  });

  // Roving tabindex keyboard navigation
  list.addEventListener('keydown', function(e) {
    var items = Array.prototype.slice.call(list.querySelectorAll('[role="option"]'));
    var idx = items.indexOf(document.activeElement);
    if (idx === -1) return;
    if (e.key === 'ArrowDown' && idx < items.length - 1) {
      e.preventDefault();
      items[idx].setAttribute('tabindex', '-1');
      items[idx + 1].setAttribute('tabindex', '0');
      items[idx + 1].focus();
    } else if (e.key === 'ArrowUp' && idx > 0) {
      e.preventDefault();
      items[idx].setAttribute('tabindex', '-1');
      items[idx - 1].setAttribute('tabindex', '0');
      items[idx - 1].focus();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      items[idx].click();
    }
  });

  panel.appendChild(list);
  panel.scrollTop = editorState.tabState[family].scrollTop || 0;
}

function updateFileListSelection(path) {
  var items = document.querySelectorAll('#editor-panel-' + editorState.activeTab + ' [role="option"]');
  items.forEach(function(item) {
    var isSelected = item.getAttribute('data-file-path') === path;
    item.classList.toggle('selected', isSelected);
    item.setAttribute('aria-selected', isSelected ? 'true' : 'false');
  });
}

function updateFileModifiedDots() {
  document.querySelectorAll('.editor-tab').forEach(function(tab) {
    var family = tab.getAttribute('data-tab');
    var existingDot = tab.querySelector('.tab-dot');
    var needsDot = isAnyFileModifiedInFamily(family);
    if (needsDot && !existingDot) {
      var dot = document.createElement('span');
      dot.className = 'tab-dot';
      dot.setAttribute('aria-hidden', 'true');
      tab.appendChild(dot);
    } else if (!needsDot && existingDot) {
      existingDot.remove();
    }
  });
  renderEditorFileList(editorState.activeTab);
}

// ── Section renderer ──
function renderEditorSection() {
  var container = document.getElementById('section-editor');
  if (!container) return;
  container.innerHTML = '';

  var heading = document.createElement('h2');
  heading.className = 'section-heading';
  heading.id = 'heading-editor';
  heading.setAttribute('tabindex', '-1');
  heading.textContent = 'Edit Files';
  container.appendChild(heading);

  editorState.files = collectEditorFiles();

  var totalFiles = editorState.files.config.length +
                   editorState.files['drop-in'].length +
                   editorState.files.quadlet.length;

  if (totalFiles === 0) {
    var navLink = document.querySelector('[data-section="editor"]');
    if (navLink) navLink.parentElement.style.display = 'none';
    return;
  }

  var layout = document.createElement('div');
  layout.className = 'editor-layout';

  var filePanel = document.createElement('div');
  filePanel.className = 'editor-file-panel';
  renderEditorTabBar(filePanel);

  ['config', 'drop-in', 'quadlet'].forEach(function(fam) {
    var panel = document.createElement('div');
    panel.id = 'editor-panel-' + fam;
    panel.setAttribute('role', 'tabpanel');
    panel.setAttribute('aria-labelledby', 'editor-tab-' + fam);
    panel.style.display = fam === editorState.activeTab ? '' : 'none';
    panel.style.flex = '1';
    panel.style.overflowY = 'auto';
    filePanel.appendChild(panel);
  });

  layout.appendChild(filePanel);

  var contentPane = document.createElement('div');
  contentPane.className = 'editor-content-pane';
  contentPane.id = 'editor-content-pane';
  var emptyEl = document.createElement('div');
  emptyEl.className = 'editor-empty';
  emptyEl.textContent = 'Select a file to view';
  contentPane.appendChild(emptyEl);
  layout.appendChild(contentPane);

  container.appendChild(layout);

  var liveRegion = document.createElement('div');
  liveRegion.id = 'editor-live';
  liveRegion.setAttribute('aria-live', 'polite');
  liveRegion.className = 'sr-only';
  container.appendChild(liveRegion);

  renderEditorFileList(editorState.activeTab);
}

function initEditor() {
  renderEditorFileList(editorState.activeTab);
}

// ── Editor keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  // E to enter edit mode — ONLY when content pane has focus (read-only content or Edit button)
  if (e.key === 'e' && !e.ctrlKey && !e.metaKey && !e.altKey &&
      editorState.mode === 'readonly') {
    var contentPane = document.getElementById('editor-content-pane');
    if (contentPane && contentPane.contains(document.activeElement)) {
      e.preventDefault();
      enterEditMode();
      return;
    }
  }

  // Ctrl+S / Cmd+S to checkpoint save
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && editorState.mode.startsWith('editing')) {
    e.preventDefault();
    if (editorState.mode === 'editing-dirty') {
      saveCheckpoint();
    }
    return;
  }
});

// beforeunload for dirty state
window.addEventListener('beforeunload', function(e) {
  if (editorState.mode === 'editing-dirty') {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── Autosave (Task 5.2) ──
function setAutosaveStatus(status, isRecovery) {
  var el = document.getElementById('autosave-status');
  var liveRegion = document.getElementById('autosave-live');
  if (!el) return;

  switch (status) {
    case 'saving':
      el.textContent = 'Saving...';
      // Visual only — NOT announced via aria-live
      break;
    case 'saved':
      el.textContent = 'Saved ' + new Date().toLocaleTimeString();
      // Only announce recovery from failure
      if (isRecovery && liveRegion) {
        liveRegion.textContent = 'Saved';
      }
      break;
    case 'failed':
      el.textContent = 'Save failed — retrying';
      if (liveRegion) {
        liveRegion.textContent = 'Save failed';
      }
      break;
  }
}

function scheduleAutosave() {
  if (App.mode !== 'refine') return;
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(function() {
    autosaveTimer = null;
    performAutosave();
  }, 500);
}

function performAutosave() {
  if (App.mode !== 'refine') return;

  // Save current editor content back to snapshot
  if (editorInstance && currentEditorFile) {
    currentEditorFile.ref.content = editorInstance.state.doc.toString();
  }

  setAutosaveStatus('saving');

  try {
    var xhr = new XMLHttpRequest();
    xhr.open('PUT', '/api/snapshot', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          App.revision = data.revision || App.revision;
        } catch (e) {}
        var wasFailure = autosaveHadFailure;
        autosaveHadFailure = false;
        setAutosaveStatus('saved', wasFailure);
      } else if (xhr.status === 409) {
        // Stale revision — silent discard per spec
        // No UI change, no announcement
      } else {
        autosaveHadFailure = true;
        setAutosaveStatus('failed');
        // Retry after 2 seconds
        setTimeout(performAutosave, 2000);
      }
    };
    xhr.onerror = function() {
      autosaveHadFailure = true;
      setAutosaveStatus('failed');
      setTimeout(performAutosave, 2000);
    };
    xhr.send(JSON.stringify({
      snapshot: App.snapshot,
      revision: App.revision
    }));
  } catch (e) {
    autosaveHadFailure = true;
    setAutosaveStatus('failed');
    setTimeout(performAutosave, 2000);
  }
}

function cancelPendingAutosave() {
  if (autosaveTimer) {
    clearTimeout(autosaveTimer);
    autosaveTimer = null;
  }
}

// ── Rebuild + Download (Task 5.3) ──
function triggerRebuild() {
  if (App.mode !== 'refine') return;

  var btn = document.getElementById('rebuild-btn');
  var statusEl = document.getElementById('rebuild-status');
  if (!btn || !statusEl) return;

  // Cancel pending autosave before rebuild
  cancelPendingAutosave();

  // Save current editor content back to snapshot
  if (editorInstance && currentEditorFile) {
    currentEditorFile.ref.content = editorInstance.state.doc.toString();
  }

  btn.disabled = true;
  btn.textContent = 'Rebuilding...';
  statusEl.textContent = '';

  try {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/render', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      btn.disabled = false;
      btn.textContent = 'Rebuild';

      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          applyRebuildResponse(data);
          statusEl.textContent = 'Rebuild complete — downloading...';
          statusEl.setAttribute('tabindex', '-1');
          statusEl.focus();

          // Trigger tarball download
          if (data.render_id) {
            downloadTarball(data.render_id);
          }
        } catch (e) {
          statusEl.textContent = 'Rebuild failed: invalid response';
          btn.focus();
        }
      } else {
        statusEl.textContent = 'Rebuild failed: ' + (xhr.statusText || 'server error');
        btn.focus();
      }
    };
    xhr.onerror = function() {
      btn.disabled = false;
      btn.textContent = 'Rebuild';
      statusEl.textContent = 'Rebuild failed: network error';
      btn.focus();
    };
    xhr.send(JSON.stringify({
      snapshot: App.snapshot,
      revision: App.revision
    }));
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Rebuild';
    statusEl.textContent = 'Rebuild failed: ' + e.message;
    btn.focus();
  }
}

function downloadTarball(renderId) {
  var a = document.createElement('a');
  a.href = '/api/tarball?render_id=' + encodeURIComponent(renderId);
  a.download = '';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Theme toggle ──
function toggleTheme() {
  document.body.classList.toggle('pf-v6-theme-dark');
  document.body.classList.toggle('pf-v6-theme-light');
  localStorage.setItem('inspectah-theme',
    document.body.classList.contains('pf-v6-theme-dark') ? 'dark' : 'light');
}

// Restore saved theme
(function() {
  var saved = localStorage.getItem('inspectah-theme');
  if (saved === 'light') {
    document.body.classList.remove('pf-v6-theme-dark');
    document.body.classList.add('pf-v6-theme-light');
  }
})();

// ── Focus next undecided card after a decision ──
function focusNextUndecided(sectionId) {
  var container = document.getElementById('section-' + sectionId);
  if (!container) return;

  var selectors = [
    '.notification-full button.btn-primary',
    '.triage-card .card-actions button',
    '.toggle-card .item-toggle',
  ];

  for (var s = 0; s < selectors.length; s++) {
    var targets = container.querySelectorAll(selectors[s]);
    for (var i = 0; i < targets.length; i++) {
      if (!targets[i].disabled) {
        targets[i].focus();
        return;
      }
    }
  }

  var heading = document.getElementById('heading-' + sectionId);
  if (heading) heading.focus();
}

// ── Focus restoration after re-renders ──
function restoreFocus(sectionId, targetType, targetId) {
  var container = document.getElementById('section-' + sectionId);
  if (!container) return;

  var target = null;
  if (targetType === 'accordion-header') {
    var acc = container.querySelector('[data-group="' + targetId + '"]');
    if (acc) target = acc.querySelector('.accordion-header');
  } else if (targetType === 'accordion-toggle') {
    var acc2 = container.querySelector('[data-group="' + targetId + '"]');
    if (acc2) target = acc2.querySelector('.accordion-toggle');
  } else if (targetType === 'notification-ack') {
    var wrapper = container.querySelector('[data-key="' + targetId + '"]');
    if (wrapper) target = wrapper.querySelector('.notification-full button.btn-primary');
  } else if (targetType === 'dep-chevron') {
    var row = container.querySelector('[data-dep-key="' + targetId + '"]');
    if (row) target = row.querySelector('.dep-chevron');
  } else if (targetType === 'tier-header') {
    var tierDiv = container.querySelector('[data-tier="' + targetId + '"]');
    if (tierDiv) target = tierDiv.querySelector('.tier-group-header');
  } else if (targetType === 'item-toggle') {
    var toggleCard = container.querySelector('[data-key="' + targetId + '"]');
    if (toggleCard) target = toggleCard.querySelector('.item-toggle');
  }

  if (target) {
    target.focus();
  } else {
    var heading = document.getElementById('heading-' + sectionId);
    if (heading) heading.focus();
  }
}

// ── Sidebar overlay (narrow viewport) ──
function toggleSidebarOverlay() {
  var sidebar = document.getElementById('sidebar');
  var backdrop = document.getElementById('sidebar-backdrop');
  var btn = document.getElementById('hamburger-btn');
  if (!sidebar || !backdrop || !btn) return;

  var isOpen = sidebar.classList.contains('overlay-open');
  if (isOpen) {
    closeSidebarOverlay();
  } else {
    sidebar.classList.add('overlay-open');
    backdrop.classList.add('active');
    btn.setAttribute('aria-expanded', 'true');
    btn.setAttribute('aria-label', 'Close navigation');

    // Focus the first link in the sidebar
    var firstLink = sidebar.querySelector('.pf-v6-c-nav__link');
    if (firstLink) firstLink.focus();

    // Add focus trap and Escape listener
    sidebar._trapHandler = function(e) {
      if (e.key === 'Escape') {
        e.preventDefault();
        closeSidebarOverlay();
        return;
      }
      if (e.key !== 'Tab') return;

      var focusable = sidebar.querySelectorAll(
        'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])'
      );
      if (focusable.length === 0) return;

      var first = focusable[0];
      var last = focusable[focusable.length - 1];

      if (e.shiftKey) {
        if (document.activeElement === first) {
          e.preventDefault();
          last.focus();
        }
      } else {
        if (document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    };
    document.addEventListener('keydown', sidebar._trapHandler);
  }
}

function closeSidebarOverlay() {
  var sidebar = document.getElementById('sidebar');
  var backdrop = document.getElementById('sidebar-backdrop');
  var btn = document.getElementById('hamburger-btn');
  if (!sidebar || !backdrop || !btn) return;

  sidebar.classList.remove('overlay-open');
  backdrop.classList.remove('active');
  btn.setAttribute('aria-expanded', 'false');
  btn.setAttribute('aria-label', 'Open navigation');
  btn.focus();

  if (sidebar._trapHandler) {
    document.removeEventListener('keydown', sidebar._trapHandler);
    sidebar._trapHandler = null;
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
