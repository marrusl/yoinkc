<!--
  Browser smoke test matrix (manual verification):
  - Static mode (file://): renders, banner shows, controls disabled
  - Refine mode (http://): renders, controls enabled, no banner
  - Sidebar navigation: all destinations, grouped keyboard, focus moves
  - Tier rendering: Red → Yellow → Green ordering
  - Include/exclude + undo: decision → badge increments → undo → badge decrements
  - Editor: edit config file → content saved to snapshot
  - Autosave: changes persist across page sections
  - Rebuild: rebuild → tarball downloads → manifest refreshes → counter resets
  - Theme toggle: dark ↔ light, persists across reload
  - Narrow viewport: hamburger → overlay → Escape closes → focus returns
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>inspectah Report</title>
  <style>{{.PatternFlyCSS}}</style>
  <style>
    /* SPA-specific overrides for PatternFly */
    /* ── Theme variable definitions ── */
    .pf-v6-theme-dark {
      --pf-t--global--background--color--primary-default: #1b1d21;
      --pf-t--global--background--color--secondary-default: #252729;
      --pf-t--global--background--color--hover: rgba(255,255,255,0.05);
      --pf-t--global--border--color--default: #444;
      --pf-t--global--color--status--info--default: #2b9af3;
      --pf-t--global--text--color--primary: #e0e0e0;
      color-scheme: dark;
      color: #e0e0e0;
      background-color: #1b1d21;
    }

    .pf-v6-theme-light {
      --pf-t--global--background--color--primary-default: #f8f7f5;
      --pf-t--global--background--color--secondary-default: #f0f0f0;
      --pf-t--global--background--color--hover: rgba(0,0,0,0.06);
      --pf-t--global--border--color--default: #d2d2d2;
      --pf-t--global--color--status--info--default: #0066cc;
      --pf-t--global--text--color--primary: #151515;
      color-scheme: light;
      color: #151515;
      background-color: #f8f7f5;
    }

    /* Dark mode: make theme toggle button visible */
    .pf-v6-theme-dark .pf-v6-c-button.pf-m-plain {
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Skip-to-content: hidden until focused */
    .pf-v6-c-skip-to-content__link {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .pf-v6-c-skip-to-content__link:focus {
      position: fixed;
      top: 0;
      left: 0;
      width: auto;
      height: auto;
      padding: 0.5rem 1rem;
      z-index: 9999;
      background: var(--pf-t--global--background--color--primary--default);
      color: var(--pf-t--global--color--brand--default);
      outline: 2px solid var(--pf-t--global--color--brand--default);
    }

    .pf-v6-c-page {
      display: flex;
      min-height: calc(100vh - 64px);
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-page__sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--pf-t--global--border--color--default, #444);
      overflow-y: auto;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-page__main {
      flex: 1;
      min-width: 0;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .preview-panel {
      width: 360px;
      flex-shrink: 0;
      border-left: none;
      overflow-y: auto;
      padding: 1rem;
      background: var(--pf-t--global--background--color--primary-default);
      transition: width 0.05s ease-out;
    }
    .preview-panel.collapsed {
      width: 0 !important;
      padding: 0;
      overflow: hidden;
    }

    .preview-splitter {
      width: 6px;
      cursor: col-resize;
      background: var(--pf-t--global--border--color--default, #444);
      flex-shrink: 0;
      transition: background 0.1s;
      position: relative;
    }
    .preview-splitter:hover {
      background: var(--pf-t--global--color--brand--default, #06c);
    }
    .preview-splitter:focus-visible {
      outline: 2px solid var(--pf-t--global--color--brand--default, #06c);
      outline-offset: -2px;
    }
    .preview-splitter.collapsed {
      width: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--pf-t--global--text--color--subtle, #888);
    }
    .preview-splitter.collapsed::after {
      content: '\25C0';
    }
    .preview-splitter.collapsed:hover {
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }

    .preview-header h2 {
      font-size: 1rem;
      margin: 0;
    }

    .preview-header-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .preview-collapse-btn {
      position: sticky;
      top: 0.5rem;
      align-self: flex-start;
      flex-shrink: 0;
      background: var(--pf-t--global--background--color--primary-default);
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      color: var(--pf-t--global--text--color--regular);
      cursor: pointer;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      line-height: 1;
      z-index: 10;
    }
    .preview-collapse-btn:hover {
      background: var(--pf-t--global--background--color--secondary-default);
    }
    /* Dark mode: explicit border/color for collapse button visibility */
    .pf-v6-theme-dark .preview-collapse-btn {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
    }

    #containerfile-preview code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #containerfile-preview {
      margin: 0;
      padding: 0.75rem;
      border-radius: 4px;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .pf-v6-c-masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-masthead__main h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    .pf-v6-c-masthead__content {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .pf-v6-c-nav__link {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      text-decoration: none;
      color: inherit;
      border-radius: 4px;
      gap: 0.5rem;
    }

    .pf-v6-c-nav__link:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
      color: inherit;
    }

    .pf-v6-c-nav__link[aria-current="page"] {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.08));
      font-weight: 600;
    }

    .pf-v6-c-nav__item {
      list-style: none;
    }

    .pf-v6-c-nav__list {
      padding: 0.5rem 0;
      margin: 0;
    }

    .review-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #8b949e;
    }

    .review-dot.in-progress {
      background: #d29922;
    }

    .review-dot.reviewed {
      background: #3fb950;
    }

    .autosave-status {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    #changes-badge {
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 12px;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      color: #fff;
    }

    /* Progress bar */
    .review-progress {
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      opacity: 0.8;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
    }

    .review-progress-bar {
      height: 4px;
      background: var(--pf-t--global--border--color--default, #444);
      border-radius: 2px;
      margin-top: 0.375rem;
      overflow: hidden;
    }

    .review-progress-fill {
      height: 100%;
      background: #3fb950;
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    /* Triage badge counts in sidebar */
    .triage-badge {
      font-size: 0.65rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 8px;
      margin-left: auto;
      font-weight: 600;
    }

    .triage-badge.tier-3 {
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
    }

    .triage-badge.tier-2 {
      background: rgba(210, 153, 34, 0.2);
      color: #d29922;
    }

    /* Section heading */
    .section-heading {
      font-size: 1.25rem;
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      color: var(--pf-t--global--text--color--primary);
    }

    /* Tier group */
    .tier-group {
      margin-bottom: 1.5rem;
    }

    .tier-group-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }

    .tier-group-header:hover {
      background: var(--pf-t--global--background--color--hover, rgba(128,128,128,0.08));
    }

    .tier-chevron {
      margin-left: auto;
      font-size: 0.7rem;
      transition: transform 0.15s ease;
      display: inline-block;
    }

    .tier-chevron.expanded {
      transform: rotate(90deg);
    }

    .tier-group-header .tier-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .tier-indicator.tier-3 { background: #f85149; }
    .tier-indicator.tier-2-decide { background: #d29922; }
    .tier-indicator.tier-2 { background: #3fb950; }
    .tier-indicator.tier-1 { background: #3fb950; }

    .tier-group-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tier-group-items.collapsed {
      display: none;
    }

    /* Tier 1 collapsed summary */
    .tier1-summary {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      background: rgba(63, 185, 80, 0.08);
      border-left: 3px solid #3fb950;
      color: #3fb950;
      cursor: pointer;
    }

    /* Triage card */
    .triage-card {
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      position: relative;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .triage-card.tier-3 {
      border-left: 3px solid #f85149;
    }

    .triage-card.tier-2 {
      border-left: 3px solid #d29922;
    }

    .triage-card.tier-1 {
      border-left: 3px solid #3fb950;
    }

    .triage-card .card-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .triage-card .card-meta {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 0.25rem;
    }

    .triage-card .card-reason {
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .triage-card .card-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .triage-card .card-actions button {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      background: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .btn-primary {
      background: #4493f8;
      color: #fff;
      border-color: #4493f8 !important;
    }

    .btn-primary:hover {
      background: #3a7fd4;
    }

    .btn-outline {
      background: transparent;
      color: inherit;
      border-color: var(--pf-t--global--border--color--default, #666) !important;
    }

    .btn-outline:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* Decided card (collapsed) */
    .decided-card {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      border: 1px solid var(--pf-t--global--border--color--default, #333);
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .decided-card .decided-label {
      font-size: 0.75rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      font-weight: 600;
    }

    .decided-label.included {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    .decided-label.excluded {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }

    .decided-label.acknowledged {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    .decided-label.skipped {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }

    /* Secrets decided labels: inverted colors */
    .decided-label.secret-kept {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }

    .decided-label.secret-excluded {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    /* ── Three-state secret card badges ── */
    .secret-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .secret-badge.badge-excluded {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }

    .secret-badge.badge-inline {
      background: rgba(210, 153, 34, 0.15);
      color: #d29922;
    }

    .secret-badge.badge-flagged {
      background: rgba(210, 186, 34, 0.15);
      color: #c9b21a;
    }

    .secret-explanation {
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .secret-consequence {
      margin-bottom: 0.5rem;
    }

    .secret-consequence summary {
      font-size: 0.75rem;
      cursor: pointer;
      opacity: 0.7;
      user-select: none;
    }

    .secret-consequence pre {
      font-size: 0.75rem;
      margin: 0.25rem 0 0 0;
      padding: 0.375rem 0.5rem;
      border-radius: 4px;
      background: var(--pf-t--global--background--color--primary-default);
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Collapsed secret card (post-decision) */
    .secret-collapsed {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      border: 1px solid var(--pf-t--global--border--color--default, #333);
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .secret-collapsed .secret-collapsed-icon {
      flex-shrink: 0;
    }

    .secret-collapsed .secret-collapsed-path {
      font-weight: 600;
      font-size: 0.8rem;
      margin-right: 0.25rem;
    }

    .secret-collapsed .secret-collapsed-summary {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .secret-collapsed .undo-btn {
      margin-left: auto;
      font-size: 0.75rem;
      cursor: pointer;
      color: #4493f8;
      background: none;
      border: none;
      text-decoration: underline;
      flex-shrink: 0;
    }

    .decided-card .undo-link {
      margin-left: auto;
      font-size: 0.75rem;
      cursor: pointer;
      color: #4493f8;
      background: none;
      border: none;
      text-decoration: underline;
    }

    /* Default-included collapsed card */
    .default-included-card {
      border: 1px solid var(--pf-t--global--border--color--default, #333);
      border-radius: 4px;
      background: var(--pf-t--global--background--color--secondary-default);
      margin-bottom: 4px;
    }
    .default-included-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .default-included-row:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }
    .default-included-chevron {
      flex-shrink: 0;
      font-size: 0.7rem;
      transition: transform 0.15s ease;
      opacity: 0.6;
    }
    .default-included-chevron.expanded {
      transform: rotate(90deg);
    }
    .default-included-name {
      font-weight: 600;
      font-size: 0.8rem;
    }
    .default-included-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      font-weight: 600;
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
      flex-shrink: 0;
    }
    .default-included-badge.excluded {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }
    .default-included-meta {
      font-size: 0.75rem;
      opacity: 0.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .default-included-action {
      margin-left: auto;
      font-size: 0.75rem;
      cursor: pointer;
      color: #4493f8;
      background: none;
      border: none;
      text-decoration: underline;
      flex-shrink: 0;
    }
    .default-included-body {
      padding: 0.5rem 0.75rem 0.75rem;
      border-top: 1px solid var(--pf-t--global--border--color--default, #333);
    }
    .default-included-body .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .default-included-body .card-actions button {
      background: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .default-included-body .card-reason {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }

    /* ── Toggle switch card ── */
    .toggle-card {
      border: 1px solid var(--pf-t--global--border--color--default, #333);
      border-radius: 4px;
      background: var(--pf-t--global--background--color--secondary-default);
      margin-bottom: 4px;
    }
    .toggle-card-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0.375rem 0.75rem;
      font-size: 0.85rem;
      min-height: 36px;
    }
    .toggle-card-row[data-excluded="true"] .toggle-card-content {
      opacity: 0.65;
    }
    .item-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--pf-t--global--color--nonstatus--gray--default, #6a6e73);
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s ease-out;
      padding: 0;
    }
    .item-toggle[aria-checked="true"] {
      background: var(--pf-t--global--color--brand--default, #0066cc);
    }
    .item-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.15s ease-out;
    }
    .item-toggle[aria-checked="true"]::after {
      transform: translateX(16px);
    }
    /* Touch target: minimum 44x44px clickable area */
    .item-toggle::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -4px;
      width: 44px;
      height: 44px;
    }
    .item-toggle:focus-visible {
      outline: 2px solid var(--pf-t--global--color--brand--default, #0066cc);
      outline-offset: 2px;
    }
    .toggle-card-divider {
      width: 1px;
      height: 20px;
      background: var(--pf-t--global--border--color--default, #444);
      flex-shrink: 0;
      margin: 0 12px;
    }
    .toggle-card-content {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
      transition: opacity 0.15s ease-out;
    }
    .toggle-card-name {
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .toggle-card-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .toggle-card-badge.badge-included {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }
    .toggle-card-badge.badge-excluded {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }
    .toggle-card-meta {
      font-size: 0.75rem;
      opacity: 0.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .toggle-card-expand {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      opacity: 0.6;
      padding: 0.25rem;
      color: inherit;
      transition: transform 0.15s ease;
    }
    .toggle-card-expand:focus-visible {
      outline: 2px solid var(--pf-t--global--color--brand--default, #0066cc);
      outline-offset: 2px;
    }
    .toggle-card-expand[aria-expanded="true"] {
      transform: rotate(90deg);
    }
    .toggle-card-detail {
      padding: 0.5rem 0.75rem 0.75rem;
      padding-left: calc(36px + 12px + 1px + 12px + 0.75rem);
      border-top: 1px solid var(--pf-t--global--border--color--default, #333);
    }
    .toggle-card-detail .detail-reason {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }
    .toggle-card-detail .detail-meta {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }

    /* Dark theme override for toggle */
    .pf-v6-theme-dark .item-toggle[aria-checked="true"] {
      background: var(--pf-t--global--color--brand--200, #4394e5);
    }

    /* Section footer */
    .section-footer {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .section-footer .section-stats {
      opacity: 0.7;
    }

    .mark-reviewed-btn {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .mark-reviewed-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    .mark-reviewed-btn.reviewed {
      background: rgba(63, 185, 80, 0.12);
      color: #3fb950;
      border-color: #3fb950;
    }

    /* Tier 3 warning banner on card */
    .card-warning {
      font-size: 0.8rem;
      padding: 0.375rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: #f85149;
    }

    /* Overview section */
    .overview-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .stat-card .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .overview-warnings {
      margin-top: 1rem;
    }

    .warning-item {
      font-size: 0.85rem;
      padding: 0.375rem 0.5rem;
      margin-bottom: 0.375rem;
      border-radius: 4px;
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      color: #d29922;
    }

    /* Version changes overview block */
    .overview-version-changes {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .overview-version-changes h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .version-changes-stats {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .vc-stat-card {
      padding: 0.625rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default);
      min-width: 120px;
    }

    .vc-stat-card .vc-stat-value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .vc-stat-card .vc-stat-label {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    .vc-stat-card.vc-upgrade .vc-stat-value {
      color: #3e8635;
    }
    .pf-v6-theme-dark .vc-stat-card.vc-upgrade .vc-stat-value {
      color: #5ba352;
    }

    .vc-stat-card.vc-downgrade .vc-stat-value {
      color: #c9190b;
    }
    .pf-v6-theme-dark .vc-stat-card.vc-downgrade .vc-stat-value {
      color: #ef6e64;
    }

    .vc-downgrade-callout {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      border-radius: 4px;
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      color: #d29922;
    }

    .vc-downgrade-callout strong {
      font-weight: 600;
    }

    .vc-view-all {
      font-size: 0.85rem;
      color: var(--pf-t--global--color--status--info--default, #2b9af3);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: none;
    }

    .vc-view-all:hover {
      text-decoration: underline;
    }

    /* Version changes detail section */
    .vc-section-subtitle {
      font-size: 0.85rem;
      opacity: 0.7;
      margin: -0.75rem 0 1rem 0;
    }

    .vc-filter-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .vc-filter-bar [role="radiogroup"] {
      display: flex;
      gap: 0;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 6px;
      overflow: hidden;
    }

    .vc-filter-bar [role="radio"] {
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      border: none;
      border-right: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default);
      color: var(--pf-t--global--text--color--primary);
      user-select: none;
      outline: none;
      white-space: nowrap;
    }

    .vc-filter-bar [role="radio"]:last-child {
      border-right: none;
    }

    .vc-filter-bar [role="radio"][aria-checked="true"] {
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      color: #fff;
      font-weight: 600;
    }

    .vc-filter-bar [role="radio"]:focus-visible {
      box-shadow: 0 0 0 2px var(--pf-t--global--color--status--info--default, #2b9af3);
      z-index: 1;
      position: relative;
    }

    .vc-detail-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .vc-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .vc-detail-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      opacity: 0.7;
      border-bottom: 2px solid var(--pf-t--global--border--color--default, #444);
      white-space: nowrap;
    }

    .vc-detail-table td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, rgba(255,255,255,0.06));
    }

    .vc-detail-table tr:last-child td {
      border-bottom: none;
    }

    .vc-detail-table .vc-arrow-col {
      width: 2rem;
      text-align: center;
      opacity: 0.5;
    }

    .vc-detail-table .vc-dir-upgrade {
      color: #3e8635;
    }
    .pf-v6-theme-dark .vc-detail-table .vc-dir-upgrade {
      color: #5ba352;
    }

    .vc-detail-table .vc-dir-downgrade {
      color: #c9190b;
    }
    .pf-v6-theme-dark .vc-detail-table .vc-dir-downgrade {
      color: #ef6e64;
    }

    .vc-detail-table .vc-empty-row td {
      text-align: center;
      font-style: italic;
      opacity: 0.6;
      padding: 1rem 0.75rem;
    }

    .vc-sidebar-badge {
      font-size: 0.7rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 8px;
      margin-left: auto;
      background: rgba(43, 154, 243, 0.15);
      color: var(--pf-t--global--color--status--info--default, #2b9af3);
      font-weight: 600;
    }

    /* Section container */
    .report-section {
      display: none;
    }

    .report-section.active {
      display: block;
    }

    /* Static mode banner */
    .static-banner {
      padding: 0.5rem 1rem;
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #d29922;
    }

    /* Copy button */
    .copy-btn {
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .copy-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* ── Editor section ── */
    .editor-layout {
      display: flex;
      gap: 0;
      min-height: 400px;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 4px;
      overflow: hidden;
    }

    .editor-file-panel {
      width: 340px;
      flex-shrink: 0;
      border-right: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      flex-direction: column;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .editor-tabs {
      display: flex;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      flex-shrink: 0;
    }

    .editor-tab {
      padding: 0.5rem 0.625rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: inherit;
      opacity: 0.6;
      white-space: nowrap;
    }

    .editor-tab:hover { opacity: 0.8; }

    .editor-tab[aria-selected="true"] {
      opacity: 1;
      font-weight: 600;
      border-bottom-color: var(--pf-t--global--color--status--info--default, #4493f8);
      color: var(--pf-t--global--color--status--info--default, #4493f8);
    }

    .editor-tab .tab-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      margin-left: 4px;
      vertical-align: middle;
    }

    .editor-file-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem 0;
    }

    .editor-file-item {
      padding: 0.375rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      word-break: break-all;
      overflow-wrap: anywhere;
      outline-offset: -2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .editor-file-item:hover,
    .editor-file-item:focus {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    .editor-file-item.selected {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.1));
      font-weight: 600;
    }

    .editor-file-item .file-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      flex-shrink: 0;
    }

    .editor-file-item .file-full-path { font-weight: 500; }

    .editor-content-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .editor-toolbar {
      padding: 0.625rem 1rem;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .editor-toolbar .file-path-display {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .editor-toolbar .unsaved-badge {
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(68, 147, 248, 0.15);
      color: var(--pf-t--global--color--status--info--default, #4493f8);
    }

    .editor-toolbar .toolbar-actions {
      display: flex;
      gap: 0.375rem;
    }

    .editor-toolbar .btn-edit,
    .editor-toolbar .btn-save {
      padding: 4px 12px;
      background: var(--pf-t--global--color--status--info--default, #4493f8);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .editor-toolbar .btn-edit:disabled,
    .editor-toolbar .btn-save:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .editor-toolbar .btn-revert {
      padding: 4px 12px;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .editor-readonly-content {
      flex: 1;
      padding: 0.75rem 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      margin: 0;
    }

    .editor-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      opacity: 0.5;
      font-style: italic;
    }

    .editor-content-pane .cm-editor {
      flex: 1;
      font-size: 0.8rem;
    }

    .editor-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .editor-modal {
      background: var(--pf-t--global--background--color--primary-default, #1b1d21);
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .editor-modal h3 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .editor-modal p { margin: 0 0 1.25rem 0; font-size: 0.85rem; opacity: 0.8; }

    .editor-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .editor-modal-actions button {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .editor-modal-actions .btn-modal-cancel {
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .editor-modal-actions .btn-modal-discard {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .editor-modal-actions .btn-modal-save {
      background: var(--pf-t--global--color--status--info--default, #4493f8);
      color: #fff;
      border: none;
      font-weight: 600;
    }

    .editor-tab-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      opacity: 0.5;
      font-style: italic;
      font-size: 0.85rem;
      padding: 2rem;
      text-align: center;
    }

    /* Rebuild bar */
    .rebuild-bar {
      display: none;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default, rgba(0,0,0,0.15));
      align-items: center;
      gap: 1rem;
    }

    .rebuild-bar.active {
      display: flex;
    }

    .rebuild-btn {
      font-size: 0.85rem;
      padding: 0.375rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      background: #4493f8;
      color: #fff;
      border: 1px solid #4493f8;
      font-weight: 600;
    }

    .rebuild-btn:hover {
      background: #3a7fd4;
    }

    .rebuild-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .rebuild-status {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .rebuild-status:focus {
      outline: 2px solid #4493f8;
      outline-offset: 2px;
    }

    /* ── Hamburger button (narrow viewports only) ── */
    .hamburger-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
      color: inherit;
      font-size: 1.25rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1;
    }

    .hamburger-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* ── Sidebar overlay backdrop ── */
    .sidebar-overlay-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    .sidebar-overlay-backdrop.active {
      display: block;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .review-progress-fill {
        transition: none;
      }
      .preview-panel {
        transition: none;
      }
      .preview-splitter {
        transition: none;
      }
    }

    /* ── Narrow viewport (< 1200px) ── */
    @media (max-width: 1199px) {
      .hamburger-btn {
        display: inline-block;
      }

      .pf-v6-c-page__sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 280px;
        z-index: 1000;
        background: var(--pf-t--global--background--color--primary-default);
        transform: translateX(-100%);
        overflow-y: auto;
      }

      .pf-v6-c-page__sidebar.overlay-open {
        transform: translateX(0);
      }

      .preview-panel {
        display: none;
      }
      .preview-splitter {
        display: none;
      }

      .pf-v6-c-page__main {
        padding: 1rem;
      }
    }

    /* ── Accordion cards ── */
    .accordion-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .accordion-card.accordion-disabled {
      opacity: 0.4;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
    }
    .accordion-chevron {
      font-size: 11px;
      margin-right: 10px;
      transition: transform 0.15s;
    }
    .accordion-info {
      flex: 1;
    }
    .accordion-name {
      font-weight: 600;
      font-size: 14px;
    }
    .accordion-badge {
      background: rgba(210,153,34,0.15);
      color: #d29922;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 8px;
    }
    .accordion-subtitle {
      display: block;
      font-size: 12px;
      opacity: 0.5;
      margin-top: 2px;
    }
    .accordion-always-label {
      font-size: 11px;
      opacity: 0.35;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .accordion-toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: #3fb950;
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .accordion-toggle.toggle-off {
      background: rgba(255,255,255,0.15);
    }
    .accordion-toggle-knob {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      right: 2px;
      transition: all 0.15s;
    }
    .accordion-toggle.toggle-off .accordion-toggle-knob {
      right: auto;
      left: 2px;
    }
    .accordion-table {
      width: 100%;
      border-collapse: collapse;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 8px 14px;
      font-size: 13px;
    }
    .accordion-table td {
      padding: 6px 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .accordion-meta {
      opacity: 0.6;
    }
    .notification-card-wrapper {
      margin-bottom: 8px;
    }
    .notification-collapsed {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
    }
    .dep-badge {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 8px;
    }
    .dep-chevron {
      background: none;
      border: none;
      color: inherit;
      font-size: 11px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.5;
      margin-left: 4px;
    }
    .dep-chevron:hover, .dep-chevron:focus {
      opacity: 1;
    }
    .dep-row ul {
      margin: 4px 0 8px 24px;
      padding: 0;
      list-style: disc;
      font-size: 12px;
      opacity: 0.6;
      columns: 2;
      column-gap: 24px;
    }
    .dep-row li {
      padding: 1px 0;
    }
    .dep-list-static {
      display: block;
      font-size: 11px;
      opacity: 0.4;
      margin-top: 2px;
    }
    /* ── Informational wrapper ── */
    .info-wrapper {
      border-left: 3px solid var(--pf-t--global--border--color--default, #666);
      margin-top: 1rem;
      opacity: 0.85;
    }
    .info-wrapper-header {

<body class="pf-v6-theme-dark">

<!-- Skip link for accessibility -->

<!-- Top toolbar -->

  </div>
  <div class="pf-v6-c-masthead__content">
    <button class="hamburger-btn" id="hamburger-btn" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar" onclick="toggleSidebarOverlay()">&#x2630;</button>

<!-- Rebuild bar (shown in refine mode) -->
<div class="rebuild-bar" id="rebuild-bar" role="region" aria-label="Rebuild controls">

<div class="pf-v6-c-page">
  <!-- Sidebar navigation -->
  <!-- Sidebar overlay backdrop (narrow viewports) -->
  <div class="sidebar-overlay-backdrop" id="sidebar-backdrop" onclick="closeSidebarOverlay()"></div>

  <aside class="pf-v6-c-page__sidebar" id="sidebar" role="navigation" aria-label="Section navigation">

      <span id="review-progress-text">Review progress: 0 / 7</span>
      <div class="review-progress-bar">
        <div class="review-progress-fill" id="review-progress-fill" style="width:0%"></div>
      </div>

      <!-- Section links built by renderSidebar() -->
    </nav>
  </aside>

  <!-- Main content -->
  <main class="pf-v6-c-page__main" id="main-content" role="main">
    <!-- Sections rendered here by JS -->

  <!-- Resizable splitter between main content and preview -->

       aria-orientation="vertical"

      <div class="preview-header-actions">
        <button class="copy-btn" type="button" onclick="copyContainerfile()" aria-label="Copy Containerfile to clipboard">Copy</button>
      </div>
    </div>
    <div id="changes-badge" style="display:none" role="status">0 changes pending</div>
    <pre id="containerfile-preview"><code></code></pre>
  </aside>
