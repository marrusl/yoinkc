<!--
  Browser smoke test matrix (manual verification):
  - Static mode (file://): renders, banner shows, controls disabled
  - Refine mode (http://): renders, controls enabled, no banner
  - Sidebar navigation: all destinations, grouped keyboard, focus moves
  - Tier rendering: Red → Yellow → Green ordering
  - Include/exclude + undo: decision → badge increments → undo → badge decrements
  - Editor: edit config file → content saved to snapshot
  - Autosave: changes persist across page sections
  - Rebuild: rebuild → tarball downloads → manifest refreshes → counter resets
  - Theme toggle: dark ↔ light, persists across reload
  - Narrow viewport: hamburger → overlay → Escape closes → focus returns
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>inspectah Report</title>
  <style>{{.PatternFlyCSS}}</style>
  <style>
    /* SPA-specific overrides for PatternFly */
    /* ── Theme variable definitions ── */
    .pf-v6-theme-dark {
      --pf-t--global--background--color--primary-default: #1b1d21;
      --pf-t--global--background--color--secondary-default: #252729;
      --pf-t--global--background--color--hover: rgba(255,255,255,0.05);
      --pf-t--global--border--color--default: #444;
      --pf-t--global--color--status--info--default: #2b9af3;
      --pf-t--global--text--color--primary: #e0e0e0;
      color-scheme: dark;
      color: #e0e0e0;
      background-color: #1b1d21;
    }

    .pf-v6-theme-light {
      --pf-t--global--background--color--primary-default: #ffffff;
      --pf-t--global--background--color--secondary-default: #f0f0f0;
      --pf-t--global--background--color--hover: rgba(0,0,0,0.06);
      --pf-t--global--border--color--default: #d2d2d2;
      --pf-t--global--color--status--info--default: #0066cc;
      --pf-t--global--text--color--primary: #151515;
      color-scheme: light;
      color: #151515;
      background-color: #ffffff;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .pf-v6-c-page {
      display: flex;
      min-height: calc(100vh - 64px);
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-page__sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--pf-t--global--border--color--default, #444);
      overflow-y: auto;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-page__main {
      flex: 1;
      min-width: 0;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .preview-panel {
      width: 360px;
      flex-shrink: 0;
      border-left: 1px solid var(--pf-t--global--border--color--default, #444);
      overflow-y: auto;
      padding: 1rem;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .preview-header h2 {
      font-size: 1rem;
      margin: 0;
    }

    #containerfile-preview code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #containerfile-preview {
      margin: 0;
      padding: 0.75rem;
      border-radius: 4px;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .pf-v6-c-masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--pf-t--global--background--color--primary-default);
    }

    .pf-v6-c-masthead__main h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    .pf-v6-c-masthead__content {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .pf-v6-c-nav__link {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      text-decoration: none;
      color: inherit;
      border-radius: 4px;
      gap: 0.5rem;
    }

    .pf-v6-c-nav__link:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
      color: inherit;
    }

    .pf-v6-c-nav__link[aria-current="page"] {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.08));
      font-weight: 600;
    }

    .pf-v6-c-nav__item {
      list-style: none;
    }

    .pf-v6-c-nav__list {
      padding: 0.5rem 0;
      margin: 0;
    }

    .review-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: #8b949e;
    }

    .review-dot.in-progress {
      background: #d29922;
    }

    .review-dot.reviewed {
      background: #3fb950;
    }

    .autosave-status {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    #changes-badge {
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 12px;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      color: #fff;
    }

    /* Progress bar */
    .review-progress {
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      opacity: 0.8;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
    }

    .review-progress-bar {
      height: 4px;
      background: var(--pf-t--global--border--color--default, #444);
      border-radius: 2px;
      margin-top: 0.375rem;
      overflow: hidden;
    }

    .review-progress-fill {
      height: 100%;
      background: #3fb950;
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    /* Triage badge counts in sidebar */
    .triage-badge {
      font-size: 0.65rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 8px;
      margin-left: auto;
      font-weight: 600;
    }

    .triage-badge.tier-3 {
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
    }

    .triage-badge.tier-2 {
      background: rgba(210, 153, 34, 0.2);
      color: #d29922;
    }

    /* Section heading */
    .section-heading {
      font-size: 1.25rem;
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      color: var(--pf-t--global--text--color--primary);
    }

    /* Tier group */
    .tier-group {
      margin-bottom: 1.5rem;
    }

    .tier-group-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      cursor: pointer;
      user-select: none;
    }

    .tier-group-header .tier-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .tier-indicator.tier-3 { background: #f85149; }
    .tier-indicator.tier-2 { background: #d29922; }
    .tier-indicator.tier-1 { background: #3fb950; }

    .tier-group-items {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tier-group-items.collapsed {
      display: none;
    }

    /* Tier 1 collapsed summary */
    .tier1-summary {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      background: rgba(63, 185, 80, 0.08);
      border-left: 3px solid #3fb950;
      color: #3fb950;
      cursor: pointer;
    }

    /* Triage card */
    .triage-card {
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      position: relative;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .triage-card.tier-3 {
      border-left: 3px solid #f85149;
    }

    .triage-card.tier-2 {
      border-left: 3px solid #d29922;
    }

    .triage-card.tier-1 {
      border-left: 3px solid #3fb950;
    }

    .triage-card .card-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .triage-card .card-meta {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 0.25rem;
    }

    .triage-card .card-reason {
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .triage-card .card-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .triage-card .card-actions button {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background: #4493f8;
      color: #fff;
      border-color: #4493f8 !important;
    }

    .btn-primary:hover {
      background: #3a7fd4;
    }

    .btn-outline {
      background: transparent;
      color: inherit;
      border-color: var(--pf-t--global--border--color--default, #666) !important;
    }

    .btn-outline:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* Decided card (collapsed) */
    .decided-card {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      border: 1px solid var(--pf-t--global--border--color--default, #333);
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .decided-card .decided-label {
      font-size: 0.75rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      font-weight: 600;
    }

    .decided-label.included {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    .decided-label.excluded {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }

    .decided-label.acknowledged {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    .decided-label.skipped {
      background: rgba(139, 148, 158, 0.15);
      color: #8b949e;
    }

    /* Secrets decided labels: inverted colors */
    .decided-label.secret-kept {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }

    .decided-label.secret-excluded {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }

    .decided-card .undo-link {
      margin-left: auto;
      font-size: 0.75rem;
      cursor: pointer;
      color: #4493f8;
      background: none;
      border: none;
      text-decoration: underline;
    }

    /* Section footer */
    .section-footer {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .section-footer .section-stats {
      opacity: 0.7;
    }

    .mark-reviewed-btn {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .mark-reviewed-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    .mark-reviewed-btn.reviewed {
      background: rgba(63, 185, 80, 0.12);
      color: #3fb950;
      border-color: #3fb950;
    }

    /* Tier 3 warning banner on card */
    .card-warning {
      font-size: 0.8rem;
      padding: 0.375rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: #f85149;
    }

    /* Overview section */
    .overview-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .stat-card .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .overview-warnings {
      margin-top: 1rem;
    }

    .warning-item {
      font-size: 0.85rem;
      padding: 0.375rem 0.5rem;
      margin-bottom: 0.375rem;
      border-radius: 4px;
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      color: #d29922;
    }

    /* Section container */
    .report-section {
      display: none;
    }

    .report-section.active {
      display: block;
    }

    /* Static mode banner */
    .static-banner {
      padding: 0.5rem 1rem;
      background: rgba(210, 153, 34, 0.1);
      border: 1px solid rgba(210, 153, 34, 0.3);
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #d29922;
    }

    /* Copy button */
    .copy-btn {
      font-size: 0.75rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .copy-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* ── Editor section ── */
    .editor-layout {
      display: flex;
      gap: 0;
      min-height: 400px;
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 4px;
      overflow: hidden;
    }

    .editor-file-panel {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      flex-direction: column;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .editor-tabs {
      display: flex;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      flex-shrink: 0;
    }

    .editor-tab {
      padding: 0.5rem 0.625rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: inherit;
      opacity: 0.6;
      white-space: nowrap;
    }

    .editor-tab:hover { opacity: 0.8; }

    .editor-tab[aria-selected="true"] {
      opacity: 1;
      font-weight: 600;
      border-bottom-color: var(--pf-t--global--color--status--info--default, #4493f8);
      color: var(--pf-t--global--color--status--info--default, #4493f8);
    }

    .editor-tab .tab-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      margin-left: 4px;
      vertical-align: middle;
    }

    .editor-file-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem 0;
    }

    .editor-file-item {
      padding: 0.375rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      outline-offset: -2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .editor-file-item:hover,
    .editor-file-item:focus {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    .editor-file-item.selected {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.1));
      font-weight: 600;
    }

    .editor-file-item .file-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pf-t--global--color--status--info--default, #2b9af3);
      flex-shrink: 0;
    }

    .editor-file-item .file-path { color: inherit; opacity: 0.6; }
    .editor-file-item .file-name { font-weight: 600; }

    .editor-content-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--pf-t--global--background--color--secondary-default);
    }

    .editor-toolbar {
      padding: 0.625rem 1rem;
      border-bottom: 1px solid var(--pf-t--global--border--color--default, #444);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .editor-toolbar .file-path-display {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .editor-toolbar .unsaved-badge {
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(68, 147, 248, 0.15);
      color: var(--pf-t--global--color--status--info--default, #4493f8);
    }

    .editor-toolbar .toolbar-actions {
      display: flex;
      gap: 0.375rem;
    }

    .editor-toolbar .btn-edit,
    .editor-toolbar .btn-save {
      padding: 4px 12px;
      background: var(--pf-t--global--color--status--info--default, #4493f8);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .editor-toolbar .btn-edit:disabled,
    .editor-toolbar .btn-save:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .editor-toolbar .btn-revert {
      padding: 4px 12px;
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .editor-readonly-content {
      flex: 1;
      padding: 0.75rem 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      margin: 0;
    }

    .editor-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      opacity: 0.5;
      font-style: italic;
    }

    .editor-content-pane .cm-editor {
      flex: 1;
      font-size: 0.8rem;
    }

    .editor-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .editor-modal {
      background: var(--pf-t--global--background--color--primary-default, #1b1d21);
      border: 1px solid var(--pf-t--global--border--color--default, #444);
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .editor-modal h3 { margin: 0 0 0.5rem 0; font-size: 1rem; }
    .editor-modal p { margin: 0 0 1.25rem 0; font-size: 0.85rem; opacity: 0.8; }

    .editor-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .editor-modal-actions button {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .editor-modal-actions .btn-modal-cancel {
      background: transparent;
      color: inherit;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
    }

    .editor-modal-actions .btn-modal-discard {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .editor-modal-actions .btn-modal-save {
      background: var(--pf-t--global--color--status--info--default, #4493f8);
      color: #fff;
      border: none;
      font-weight: 600;
    }

    .editor-tab-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      opacity: 0.5;
      font-style: italic;
      font-size: 0.85rem;
      padding: 2rem;
      text-align: center;
    }

    /* Rebuild bar */
    .rebuild-bar {
      display: none;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--pf-t--global--border--color--default, #444);
      background: var(--pf-t--global--background--color--secondary-default, rgba(0,0,0,0.15));
      align-items: center;
      gap: 1rem;
    }

    .rebuild-bar.active {
      display: flex;
    }

    .rebuild-btn {
      font-size: 0.85rem;
      padding: 0.375rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      background: #4493f8;
      color: #fff;
      border: 1px solid #4493f8;
      font-weight: 600;
    }

    .rebuild-btn:hover {
      background: #3a7fd4;
    }

    .rebuild-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .rebuild-status {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .rebuild-status:focus {
      outline: 2px solid #4493f8;
      outline-offset: 2px;
    }

    /* ── Hamburger button (narrow viewports only) ── */
    .hamburger-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--pf-t--global--border--color--default, #666);
      color: inherit;
      font-size: 1.25rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1;
    }

    .hamburger-btn:hover {
      background: var(--pf-t--global--background--color--hover, rgba(255,255,255,0.05));
    }

    /* ── Sidebar overlay backdrop ── */
    .sidebar-overlay-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    .sidebar-overlay-backdrop.active {
      display: block;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .review-progress-fill {
        transition: none;
      }
    }

    /* ── Narrow viewport (< 1200px) ── */
    @media (max-width: 1199px) {
      .hamburger-btn {
        display: inline-block;
      }

      .pf-v6-c-page__sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 280px;
        z-index: 1000;
        background: var(--pf-t--global--background--color--primary-default);
        transform: translateX(-100%);
        overflow-y: auto;
      }

      .pf-v6-c-page__sidebar.overlay-open {
        transform: translateX(0);
      }

      .preview-panel {
        display: none;
      }

      .pf-v6-c-page__main {
        padding: 1rem;
      }
    }

    /* ── Accordion cards ── */
    .accordion-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .accordion-card.accordion-disabled {
      opacity: 0.4;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
    }
    .accordion-chevron {
      font-size: 11px;
      margin-right: 10px;
      transition: transform 0.15s;
    }
    .accordion-info {
      flex: 1;
    }
    .accordion-name {
      font-weight: 600;
      font-size: 14px;
    }
    .accordion-badge {
      background: rgba(210,153,34,0.15);
      color: #d29922;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 8px;
    }
    .accordion-subtitle {
      display: block;
      font-size: 12px;
      opacity: 0.5;
      margin-top: 2px;
    }
    .accordion-always-label {
      font-size: 11px;
      opacity: 0.35;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .accordion-toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: #3fb950;
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .accordion-toggle.toggle-off {
      background: rgba(255,255,255,0.15);
    }
    .accordion-toggle-knob {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      right: 2px;
      transition: all 0.15s;
    }
    .accordion-toggle.toggle-off .accordion-toggle-knob {
      right: auto;
      left: 2px;
    }
    .accordion-table {
      width: 100%;
      border-collapse: collapse;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 8px 14px;
      font-size: 13px;
    }
    .accordion-table td {
      padding: 6px 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .accordion-meta {
      opacity: 0.6;
    }
  </style>
</head>
<body class="pf-v6-theme-dark">

<!-- Top toolbar -->

  </div>
  <div class="pf-v6-c-masthead__content">
    <button class="hamburger-btn" id="hamburger-btn" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar" onclick="toggleSidebarOverlay()">&#x2630;</button>
    <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Toggle theme" onclick="toggleTheme()">&#x263E;</button>
    <span class="autosave-status" id="autosave-status"></span>
    <span id="autosave-live" class="sr-only" aria-live="polite"></span>
  </div>
</header>

<!-- Rebuild bar (shown in refine mode) -->
<div class="rebuild-bar" id="rebuild-bar" role="region" aria-label="Rebuild controls">
  <button class="rebuild-btn" id="rebuild-btn" type="button" onclick="triggerRebuild()" aria-label="Rebuild Containerfile from current decisions">Rebuild</button>
  <span class="rebuild-status" id="rebuild-status" tabindex="-1" role="status"></span>

<div class="pf-v6-c-page">
  <!-- Sidebar navigation -->
  <!-- Sidebar overlay backdrop (narrow viewports) -->
  <div class="sidebar-overlay-backdrop" id="sidebar-backdrop" onclick="closeSidebarOverlay()"></div>

  <aside class="pf-v6-c-page__sidebar" id="sidebar" role="navigation" aria-label="Section navigation">
