<body>
  <a class="pf-v6-c-skip-to-content" href="#main-content">Skip to main content</a>
  <div class="pf-v6-c-page">
    <header class="pf-v6-c-masthead">
      <div class="pf-v6-c-masthead__main">
        <span class="pf-v6-c-masthead__brand">inspectah Architect</span>
      </div>
      <div class="pf-v6-c-masthead__content">
        <button id="theme-toggle" class="pf-v6-c-button pf-m-plain" title="Switch to light theme" aria-label="Toggle theme">&#9728;</button>
      </div>
    </header>
    <div class="architect-layout">
      <div class="architect-sidebar" id="fleet-sidebar">
        <div class="sidebar-title">Fleets</div>
        <div id="fleet-list"></div>
      </div>
      <div class="architect-center" id="main-content">
        <div class="layer-tree-title">Layer Topology</div>
        <div id="layer-tree"></div>
      </div>
      <div class="architect-drawer" id="package-drawer">
        <div class="drawer-header" id="drawer-header"></div>
        <div class="drawer-body" id="drawer-body"></div>
      </div>
    </div>
    <div class="architect-toolbar" id="architect-toolbar" role="toolbar" aria-label="Actions">
      <span class="toolbar-summary" id="toolbar-summary"></span>
      <button id="btn-export" class="pf-v6-c-button pf-m-primary" type="button" title="Export Containerfiles as tar.gz">Export Containerfiles</button>
    </div>
    <div id="toast" class="pf-v6-c-alert pf-m-info architect-toast"></div>
    <div id="containerfile-modal" class="cf-modal-overlay" style="display:none">
      <div class="cf-modal">
        <div class="cf-modal-header">
          <span class="cf-modal-title" id="cf-modal-title"></span>
          <button class="cf-modal-close" onclick="closeCfModal()">&times;</button>
        </div>
        <pre class="cf-modal-body" id="cf-modal-body"></pre>
      </div>
    </div>
  </div>
  <script>
    window.__TOPOLOGY__ = TOPOLOGY_JSON_PLACEHOLDER;
  </script>
  <script>
(function() {
  'use strict';
  var topology = window.__TOPOLOGY__;
  var selectedLayer = 'base';
  var activeFleet = null;
  var openMenuPkg = null;
  var fleetList = document.getElementById('fleet-list');
  var layerTree = document.getElementById('layer-tree');
  var drawerHeader = document.getElementById('drawer-header');
  var drawerBody = document.getElementById('drawer-body');
  var toolbarSummary = document.getElementById('toolbar-summary');
  var toast = document.getElementById('toast');
  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    function applyTheme(theme) {
      if (theme === 'dark') { document.documentElement.classList.add('pf-v6-theme-dark'); }
      else { document.documentElement.classList.remove('pf-v6-theme-dark'); }
      btn.textContent = theme === 'light' ? '☽' : '☀';
      btn.title = theme === 'light' ? 'Switch to dark theme' : 'Switch to light theme';
      localStorage.setItem('inspectah-architect-theme', theme);
    }
    applyTheme(localStorage.getItem('inspectah-architect-theme') || 'dark');
    btn.addEventListener('click', function() {
      var isDark = document.documentElement.classList.contains('pf-v6-theme-dark');
      applyTheme(isDark ? 'light' : 'dark');
    });
  })();
  function esc(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function showToast(msg, ms) { if (!toast) return; toast.textContent = msg; toast.classList.add('visible'); setTimeout(function() { toast.classList.remove('visible'); }, ms || 3500); }
  function getLayer(name) { for (var i = 0; i < topology.layers.length; i++) { if (topology.layers[i].name === name) return topology.layers[i]; } return null; }
  function getFleetColor(idx) { return 'fleet-color-' + (idx % 6); }
  function getLayerColor(idx) { return 'layer-color-' + (idx % 6); }
  function getLayerFleetIndex(layerName) { for (var i = 0; i < topology.fleets.length; i++) { if (topology.fleets[i].name === layerName) return i; } return -1; }
  function layerHostCount(layer) { var count = 0; for (var i = 0; i < layer.fleets.length; i++) { for (var j = 0; j < topology.fleets.length; j++) { if (topology.fleets[j].name === layer.fleets[i]) { count += topology.fleets[j].host_count; } } } if (layer.parent === null) return totalHosts(); return count; }
  function totalHosts() { var n = 0; for (var i = 0; i < topology.fleets.length; i++) n += topology.fleets[i].host_count; return n; }
  function renderSidebar() {
    var html = '';
    for (var i = 0; i < topology.fleets.length; i++) {
      var f = topology.fleets[i];
      var layer = getLayer(f.name);
      var baseLayer = getLayer('base');
      var pkgCount = layer ? layer.packages.length : f.total_packages;
      if (layer && layer.parent === 'base' && baseLayer) { pkgCount += baseLayer.packages.length; }
      var active = (activeFleet === f.name) ? ' fleet-active' : '';
      html += '<li class="pf-v6-c-nav__item"><a class="fleet-card ' + getFleetColor(i) + active + '" data-fleet="' + esc(f.name) + '" href="#">' +
        '<div class="fleet-card-name">' + esc(f.name) + '</div>' +
        '<div class="fleet-card-meta">' + (f.host_count > 0 ? f.host_count + ' hosts &middot; ' : '') + pkgCount + ' pkgs</div></a></li>';
    }
    fleetList.innerHTML = html;
  }
  function renderTree() {
    var html = '<div class="layer-tree-title">Layer Topology</div>';
    var base = null; var derived = [];
    for (var i = 0; i < topology.layers.length; i++) { var l = topology.layers[i]; if (l.parent === null) base = l; else derived.push(l); }
    if (base) { var baseFleetIdx = (topology.fleets.length === 1) ? 0 : -1; html += renderLayerCard(base, false, baseFleetIdx); }
    if (derived.length > 0) { html += '<div class="derived-group">'; for (var j = 0; j < derived.length; j++) { var fleetIdx = getLayerFleetIndex(derived[j].name); html += '<div class="derived-connector">' + renderLayerCard(derived[j], true, fleetIdx) + '</div>'; } html += '</div>'; }
    layerTree.innerHTML = html;
  }
  function renderLayerCard(layer, isDerived, fleetIdx) {
    var sel = (layer.name === selectedLayer) ? ' layer-selected' : '';
    var cls = isDerived ? ' layer-derived' : '';
    var colorCls = (fleetIdx >= 0) ? ' ' + getLayerColor(fleetIdx) : ' layer-color-base';
    var fleetLabel = layer.fleets.length > 0 ? layer.fleets.join(', ') : '';
    var hosts = layerHostCount(layer);
    return '<div class="layer-card' + cls + sel + colorCls + '" data-layer="' + esc(layer.name) + '">' +
      '<div class="layer-card-header"><span class="layer-card-name">' + esc(layer.name) + '</span>' +
      '<div class="layer-card-badges">' +
        '<button class="layer-preview-btn" data-preview-layer="' + esc(layer.name) + '" title="View Containerfile">📄 View</button>' +
        (hosts > 0 ? '<span class="layer-badge layer-badge-hosts" title="Number of hosts served by this layer">' + hosts + ' host' + (hosts !== 1 ? 's' : '') + '</span>' : '') +
        '<span class="layer-badge layer-badge-pkg">' + layer.packages.length + ' pkg' + (layer.packages.length !== 1 ? 's' : '') + '</span>' +
        (layer.fan_out > 0 ? '<span class="layer-badge layer-badge-fanout" title="Number of derived layers that rebuild when this layer changes">fan-out: ' + layer.fan_out + '</span>' : '') +
        '<span class="layer-badge layer-badge-turbulence" title="Estimated update impact">turbulence: ' + layer.turbulence.toFixed(1) + '</span>' +
      '</div></div>' +
      (fleetLabel ? '<div class="layer-card-detail">Serves: ' + esc(fleetLabel) + '</div>' : '') + '</div>';
  }
  function renderDrawer() {
    var layer = getLayer(selectedLayer);
    if (!layer) { drawerHeader.innerHTML = '<div class="drawer-header-title">No layer selected</div>'; drawerBody.innerHTML = '<div class="drawer-empty">Select a layer to view packages.</div>'; return; }
    drawerHeader.innerHTML = '<div class="drawer-header-title">' + esc(layer.name) + '</div><div class="drawer-header-meta">' + layer.packages.length + ' packages' + (layer.configs.length > 0 ? ' &middot; ' + layer.configs.length + ' configs' : '') + '</div>';
    var html = '';
    if (layer.packages.length > 0) { html += '<div class="drawer-section-label">Packages</div>'; var sorted = layer.packages.slice().sort(); for (var i = 0; i < sorted.length; i++) { html += renderPackageRow(sorted[i], layer); } }
    else { html += '<div class="drawer-empty">No packages in this layer.</div>'; }
    if (layer.configs.length > 0) { html += '<div class="drawer-section-label">Configs (read-only)</div>'; for (var c = 0; c < layer.configs.length; c++) { html += '<div class="config-row"><span class="pkg-icon">📄</span> ' + esc(layer.configs[c]) + '</div>'; } }
    drawerBody.innerHTML = html;
  }
  function renderPackageRow(pkg, fromLayer) {
    var isDerived = fromLayer.parent !== null;
    var actionsHtml = '';
    if (isDerived) {
      var moveImpact = calcImpact(pkg, fromLayer.parent, 'move');
      actionsHtml += '<span class="action-with-impact"><button class="moveup-btn" data-pkg="' + esc(pkg) + '" data-from="' + esc(fromLayer.name) + '" data-to="' + esc(fromLayer.parent) + '" title="' + esc(moveImpact.text) + '">↑ Move up</button>' + impactBadgeHtml(moveImpact) + '</span>';
      var siblings = [];
      for (var i = 0; i < topology.layers.length; i++) { var l = topology.layers[i]; if (l.parent !== null && l.name !== fromLayer.name) { siblings.push(l); } }
      if (siblings.length > 0) {
        var menuOpen = (openMenuPkg === fromLayer.name + '/' + pkg) ? ' open' : '';
        actionsHtml += '<div class="move-dropdown"><button class="move-btn" data-pkg="' + esc(pkg) + '" data-from="' + esc(fromLayer.name) + '">Copy to ▾</button><div class="move-menu' + menuOpen + '" data-menu-for="' + esc(fromLayer.name + '/' + pkg) + '">';
        for (var s = 0; s < siblings.length; s++) { var copyImpact = calcImpact(pkg, siblings[s].name, 'copy'); actionsHtml += '<button class="move-menu-item copy-action" data-pkg="' + esc(pkg) + '" data-from="' + esc(fromLayer.name) + '" data-to="' + esc(siblings[s].name) + '" title="' + esc(copyImpact.text) + '"><span class="menu-item-label">→ ' + esc(siblings[s].name) + '</span>' + impactBadgeHtml(copyImpact) + '</button>'; }
        actionsHtml += '</div></div>';
      }
    }
    return '<div class="pkg-row"><span class="pkg-name"><span class="pkg-icon">📦</span> ' + esc(pkg) + '</span>' + (actionsHtml ? '<span class="pkg-actions">' + actionsHtml + '</span>' : '') + '</div>';
  }
  function renderToolbar() { var hosts = totalHosts(); toolbarSummary.textContent = topology.fleets.length + ' fleet' + (topology.fleets.length !== 1 ? 's' : '') + ' · ' + hosts + ' host' + (hosts !== 1 ? 's' : '') + ' · ' + topology.layers.length + ' layer' + (topology.layers.length !== 1 ? 's' : ''); }
  function render() { renderSidebar(); renderTree(); renderDrawer(); renderToolbar(); }
  function selectLayer(name) { selectedLayer = name; openMenuPkg = null; render(); }
  function turbulenceLevel(value) { if (value < 3) return 'low'; if (value < 8) return 'med'; return 'high'; }
  function calcImpact(pkg, targetLayerName, action) {
    var target = getLayer(targetLayerName);
    if (!target) return { text: '', level: 'low', fanOut: 0, oldTurb: 0, newTurb: 0 };
    var verb = (action === 'move') ? 'Moving' : 'Copying';
    var newPkgCount = target.packages.length + 1;
    var affectedImages = target.fan_out + 1;
    var newTurbulence = target.parent !== null ? Math.max(1.0, target.fan_out * (newPkgCount / 50.0)) : target.fan_out * (newPkgCount / 50.0);
    return { text: verb + ' ' + pkg + ' to ' + targetLayerName + ' affects ' + affectedImages + ' image' + (affectedImages !== 1 ? 's' : '') + '. Turbulence: ' + target.turbulence.toFixed(1) + ' → ' + newTurbulence.toFixed(1), level: turbulenceLevel(newTurbulence), fanOut: affectedImages, oldTurb: target.turbulence, newTurb: newTurbulence };
  }
  function impactBadgeHtml(impact) { return '<span class="impact-badge impact-' + impact.level + '" title="' + esc(impact.text) + '">' + impact.fanOut + ' img' + (impact.fanOut !== 1 ? 's' : '') + ' · ' + impact.oldTurb.toFixed(1) + '→' + impact.newTurb.toFixed(1) + '</span>'; }
  function movePackage(pkg, from, to) {
    fetch('/api/move', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ package: pkg, from: from, to: to }) })
    .then(function(resp) { if (!resp.ok) { return resp.json().then(function(d) { throw new Error(d.error || 'HTTP ' + resp.status); }); } return resp.json(); })
    .then(function(data) { topology = data; openMenuPkg = null; showToast('Moved ' + pkg + ' from ' + from + ' to ' + to, 3000); render(); })
    .catch(function(err) { showToast('Move failed: ' + err.message, 5000); });
  }
  function copyPkg(pkg, from, to) {
    fetch('/api/copy', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ package: pkg, from: from, to: to }) })
    .then(function(resp) { if (!resp.ok) { return resp.json().then(function(d) { throw new Error(d.error || 'HTTP ' + resp.status); }); } return resp.json(); })
    .then(function(data) { topology = data; openMenuPkg = null; showToast('Copied ' + pkg + ' to ' + to, 3000); render(); })
    .catch(function(err) { showToast('Copy failed: ' + err.message, 5000); });
  }
  function showCfModal(layerName) {
    fetch('/api/preview/' + encodeURIComponent(layerName)).then(function(resp) { if (!resp.ok) throw new Error('HTTP ' + resp.status); return resp.text(); })
    .then(function(content) {
      document.getElementById('cf-modal-title').textContent = layerName + '/Containerfile';
      var highlighted = esc(content).replace(/^(FROM|RUN|COPY|ADD|ENV|EXPOSE|CMD|ENTRYPOINT|WORKDIR|LABEL|ARG|VOLUME|USER|STOPSIGNAL|HEALTHCHECK|SHELL|ONBUILD)\b/gm, '<span class="cf-kw">$1</span>');
      document.getElementById('cf-modal-body').innerHTML = highlighted;
      document.getElementById('containerfile-modal').style.display = '';
    }).catch(function(err) { showToast('Preview failed: ' + err.message, 5000); });
  }
  window.closeCfModal = function() { document.getElementById('containerfile-modal').style.display = 'none'; };
  document.getElementById('containerfile-modal').addEventListener('click', function(e) { if (e.target === this) closeCfModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeCfModal(); });
  function exportTopology() {
    var btn = document.getElementById('btn-export');
    if (btn) { btn.disabled = true; btn.textContent = 'Exporting…'; }
    fetch('/api/export').then(function(resp) { if (!resp.ok) throw new Error('HTTP ' + resp.status); return resp.blob(); })
    .then(function(blob) { var url = URL.createObjectURL(blob); var a = document.createElement('a'); a.href = url; a.download = 'architect-export.tar.gz'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast('Containerfiles exported.', 3000); })
    .catch(function(err) { showToast('Export failed: ' + err.message, 5000); })
    .finally(function() { if (btn) { btn.disabled = false; btn.textContent = 'Export Containerfiles'; } });
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.move-dropdown')) { if (openMenuPkg !== null) { openMenuPkg = null; renderDrawer(); } } });
  layerTree.addEventListener('click', function(e) {
    var previewBtn = e.target.closest('.layer-preview-btn');
    if (previewBtn) { e.stopPropagation(); showCfModal(previewBtn.dataset.previewLayer); return; }
    var card = e.target.closest('.layer-card');
    if (card && card.dataset.layer) { selectLayer(card.dataset.layer); }
  });
  fleetList.addEventListener('click', function(e) { e.preventDefault(); var card = e.target.closest('.fleet-card'); if (card && card.dataset.fleet) { activeFleet = card.dataset.fleet; selectLayer(card.dataset.fleet); } });
  drawerBody.addEventListener('click', function(e) {
    var moveupBtn = e.target.closest('.moveup-btn');
    if (moveupBtn) { e.stopPropagation(); movePackage(moveupBtn.dataset.pkg, moveupBtn.dataset.from, moveupBtn.dataset.to); return; }
    var moveBtnEl = e.target.closest('.move-btn');
    if (moveBtnEl) { e.stopPropagation(); var key = moveBtnEl.dataset.from + '/' + moveBtnEl.dataset.pkg; openMenuPkg = (openMenuPkg === key) ? null : key; renderDrawer(); return; }
    var menuItem = e.target.closest('.move-menu-item');
    if (menuItem) { e.stopPropagation(); if (menuItem.classList.contains('copy-action')) { copyPkg(menuItem.dataset.pkg, menuItem.dataset.from, menuItem.dataset.to); } else { movePackage(menuItem.dataset.pkg, menuItem.dataset.from, menuItem.dataset.to); } return; }
  });
  var exportBtn = document.getElementById('btn-export');
  if (exportBtn) { exportBtn.addEventListener('click', function() { exportTopology(); }); }
  render();
})();
  </script>
</body>
</html>
